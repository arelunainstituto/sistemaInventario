<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Definir Nova Senha - Sistema de Inventário</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: {
            50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',
            500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e'
        } } } } };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        @keyframes slideUp { 0% { transform: translateY(30px); opacity: 0 } 100% { transform: translateY(0); opacity: 1 } }
        @keyframes fadeIn { 0% { opacity: 0 } 100% { opacity: 1 } }
        @keyframes float { 0%,100% { transform: translateY(0) rotate(0) } 50% { transform: translateY(-20px) rotate(180deg) } }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100dvh; }
        .glass-effect { background: rgba(255,255,255,.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.2); }
        .animate-slide-up { animation: slideUp .6s ease-out } .animate-fade-in { animation: fadeIn 1s ease-out }
        .floating-shape { position: absolute; border-radius: 50%; background: rgba(255,255,255,.1); animation: float 6s ease-in-out infinite; }
        .floating-shape:nth-child(1){width:clamp(60px,15vw,120px);height:clamp(60px,15vw,120px);top:10%;left:10%}
        .floating-shape:nth-child(2){width:clamp(80px,20vw,160px);height:clamp(80px,20vw,160px);top:70%;right:10%;animation-delay:2s}
        .floating-shape:nth-child(3){width:clamp(40px,10vw,80px);height:clamp(40px,10vw,80px);top:40%;left:5%;animation-delay:4s}
        @media (max-width:640px){ .floating-shape{opacity:.3} input,button{font-size:16px!important} }
    </style>
</head>

<body class="gradient-bg relative overflow-x-hidden">
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>

    <main class="relative z-10 flex items-center justify-center min-h-[100dvh] p-4 sm:p-6">
        <div class="w-full max-w-sm sm:max-w-md">
            <div class="text-center mb-6 sm:mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 bg-white/20 rounded-full mb-3 sm:mb-4 glass-effect">
                    <i class="fas fa-key text-2xl sm:text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Definir nova senha</h1>
                <p class="text-sm text-white/80">Recuperação de acesso ao sistema</p>
            </div>

            <div class="glass-effect rounded-2xl sm:rounded-3xl p-6 sm:p-8 shadow-2xl animate-slide-up relative">
                <!-- Estado: validando o link -->
                <div id="checking" class="py-8 text-center text-white">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-white mx-auto mb-4"></div>
                    <p class="text-sm">Validando o link de recuperação…</p>
                </div>

                <!-- Estado: link inválido/expirado -->
                <div id="invalidState" class="hidden py-6 text-center text-white">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-red-500/20 border border-red-500/30 mb-3">
                        <i class="fas fa-link-slash text-red-200"></i>
                    </div>
                    <p class="text-sm text-red-100 mb-1">Link de recuperação inválido ou expirado.</p>
                    <p id="invalidDetail" class="text-xs text-white/70 mb-4">Solicite um novo link de recuperação.</p>
                    <a href="login.html" class="inline-block text-sm text-white/90 underline hover:text-white">Ir para o login</a>
                </div>

                <!-- Estado: formulário de nova senha -->
                <form id="resetForm" class="hidden space-y-4 sm:space-y-6">
                    <div class="space-y-2">
                        <label for="newPassword" class="block text-sm font-semibold text-white/90"><i class="fas fa-key mr-2"></i>Nova Senha</label>
                        <div class="relative">
                            <input type="password" id="newPassword" required minlength="6" autocomplete="new-password"
                                class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-white/10 border border-white/20 rounded-xl focus:ring-4 focus:ring-white/20 focus:border-white/40 transition-all text-white placeholder-white/60 pr-10" placeholder="••••••••">
                            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-white/60 hover:text-white p-1" aria-label="Mostrar/ocultar"><i class="fas fa-eye"></i></button>
                        </div>
                        <p class="text-xs text-white/60">Mínimo de 6 caracteres</p>
                    </div>
                    <div class="space-y-2">
                        <label for="confirmPassword" class="block text-sm font-semibold text-white/90"><i class="fas fa-check-circle mr-2"></i>Confirmar Nova Senha</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" required autocomplete="new-password"
                                class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-white/10 border border-white/20 rounded-xl focus:ring-4 focus:ring-white/20 focus:border-white/40 transition-all text-white placeholder-white/60 pr-10" placeholder="••••••••">
                            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-white/60 hover:text-white p-1" aria-label="Mostrar/ocultar"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-white/20 hover:bg-white/30 active:bg-white/40 text-white font-bold py-2.5 sm:py-3 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all hover:scale-[1.02] active:scale-[0.98] focus:ring-4 focus:ring-white/20 disabled:opacity-60 disabled:cursor-not-allowed">
                        <i class="fas fa-save mr-2"></i>Salvar nova senha
                    </button>

                    <div id="successMessage" class="hidden p-3 sm:p-4 rounded-xl text-xs sm:text-sm" style="background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3);color:rgb(187,247,208)">
                        <i class="fas fa-check-circle mr-2"></i><span id="successText"></span>
                    </div>
                    <div id="errorMessage" class="hidden p-3 sm:p-4 bg-red-500/20 border border-red-500/30 rounded-xl text-red-100 text-xs sm:text-sm">
                        <i class="fas fa-exclamation-triangle mr-2"></i><span id="errorText"></span>
                    </div>
                </form>
            </div>

            <div class="text-center mt-6 text-white/60 text-xs animate-fade-in">
                <p>&copy; Grupo AreLuna. Todos os direitos reservados.</p>
            </div>
        </div>
    </main>

    <script>
        // Parse o token do hash do link de recovery
        // (#access_token=…&refresh_token=…&type=recovery&…) ANTES de tudo.
        const hashParams      = new URLSearchParams((location.hash || '').replace(/^#/, ''));
        const recoveryToken   = hashParams.get('access_token');
        const recoveryRefresh = hashParams.get('refresh_token') || '';
        const recoveryType    = hashParams.get('type');
        // Erro devolvido pelo Supabase (ex.: link expirado:
        // #error=access_denied&error_code=otp_expired&error_description=…).
        const recoveryError   = hashParams.get('error_description') || hashParams.get('error') || hashParams.get('error_code');

        // Tira o token da barra de endereços / histórico assim que capturado.
        if (location.hash) { try { history.replaceState(null, '', location.pathname + location.search); } catch (_) {} }

        // Cliente ISOLADO: storageKey próprio + persistSession:false → NÃO herda a
        // sessão de um usuário já logado neste navegador. detectSessionInUrl:false
        // → validamos o token manualmente via setSession (o auto-processamento de
        // URL combinado com persistSession:false trava o getSession). Assim só há
        // sessão aqui se o link trouxer um token de recovery válido — fecha o
        // bypass de trocar a senha sem o link.
        // NB: nome 'sb' (não 'supabase') — o CDN já cria o global window.supabase
        // (a biblioteca); declarar const supabase colidiria com ele.
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { storageKey: 'inv-recovery-auth', persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
        });

        let recoveryReady = false;
        const $ = id => document.getElementById(id);

        function markReady() {
            if (recoveryReady) return;
            recoveryReady = true;
            $('checking').classList.add('hidden');
            $('invalidState').classList.add('hidden');
            $('resetForm').classList.remove('hidden');
            $('newPassword').focus();
        }
        function showInvalid(msg) {
            if (recoveryReady) return;
            if (msg) { const el = $('invalidDetail'); if (el) el.textContent = msg; }
            $('checking').classList.add('hidden');
            $('resetForm').classList.add('hidden');
            $('invalidState').classList.remove('hidden');
        }

        // Valida o link estabelecendo a sessão de recuperação a partir do token.
        (async () => {
            // URLSearchParams.get() já devolve o valor decodificado — não
            // re-decodificar (um '%' literal faria decodeURIComponent lançar
            // URIError aqui fora do try, repondo o spinner eterno).
            if (recoveryError) { showInvalid(String(recoveryError)); return; }
            if (recoveryType !== 'recovery' || !recoveryToken) { showInvalid(); return; }
            try {
                const { data, error } = await sb.auth.setSession({ access_token: recoveryToken, refresh_token: recoveryRefresh });
                if (error || !data || !data.session) { showInvalid('Não foi possível validar o link. Solicite um novo.'); return; }
                markReady();
            } catch (_) {
                showInvalid('Não foi possível validar o link. Solicite um novo.');
            }
        })();

        // Mostrar/ocultar senha
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function () {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            });
        });

        function showError(msg) { $('errorText').textContent = msg; $('errorMessage').classList.remove('hidden'); }
        function showSuccess(msg) { $('successText').textContent = msg; $('successMessage').classList.remove('hidden'); }

        $('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            $('errorMessage').classList.add('hidden');
            $('successMessage').classList.add('hidden');

            const newPassword = $('newPassword').value;
            const confirmPassword = $('confirmPassword').value;
            if (newPassword !== confirmPassword) return showError('As senhas não coincidem.');
            if (newPassword.length < 6) return showError('A senha deve ter pelo menos 6 caracteres.');

            const btn = $('submitBtn');
            btn.disabled = true;
            try {
                // Reaproveita a lógica da troca obrigatória: além da senha, reseta
                // o relógio de 30 dias e limpa a flag de troca forçada.
                const { error } = await sb.auth.updateUser({
                    password: newPassword,
                    data: { must_change_password: false, last_password_change: new Date().toISOString() }
                });
                if (error) throw error;

                showSuccess('Senha redefinida com sucesso! Redirecionando para o login…');
                // Encerra a sessão de recuperação e leva ao login para entrar com a nova senha.
                try { await sb.auth.signOut(); } catch (_) {}
                try { localStorage.removeItem('access_token'); localStorage.removeItem('user'); localStorage.removeItem('isAuthenticated'); } catch (_) {}
                setTimeout(() => { window.location.href = 'login.html'; }, 1800);
            } catch (err) {
                let msg = err.message || 'Erro ao redefinir a senha.';
                if (/different from the old password|should be different/i.test(msg)) msg = 'A nova senha deve ser diferente da senha anterior.';
                else if (/at least/i.test(msg)) msg = 'A senha deve ter pelo menos 6 caracteres.';
                else if (/session|expired|jwt/i.test(msg)) msg = 'Sua sessão de recuperação expirou. Solicite um novo link.';
                showError(msg);
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
