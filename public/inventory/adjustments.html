<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Ajustes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script src="_searchable-select.js"></script>
<script>
renderInventoryLayout({ activePage: 'adjustments', title: 'Ajustes (Admin)', subtitle: 'Ajustes manuais (+/-) e saídas administrativas (avaria/extravio/perda/quebra/depreciação)' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
        <h3 class="text-base font-bold text-gray-900">Histórico de ajustes</h3>
        <div class="flex gap-2 flex-wrap">
            <a href="import.html" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-emerald-500/20 transition flex items-center gap-2"><i class="fas fa-file-import"></i> Importar planilha</a>
            <button onclick="openAdminExitModal()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-red-500/20 transition flex items-center gap-2"><i class="fas fa-arrow-right-from-bracket"></i> Saída administrativa</button>
            <button onclick="openModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-amber-500/20 transition flex items-center gap-2"><i class="fas fa-sliders"></i> Novo ajuste</button>
        </div>
    </div>
    <p class="text-[11px] text-gray-500 mb-4 -mt-2 flex items-start gap-1.5">
        <i class="fas fa-circle-info text-sky-500 mt-0.5"></i>
        <span>Saídas administrativas são registadas como movimentos de <b>saída</b> e aparecem em <a href="exits.html" class="text-sky-600 hover:underline">Saídas</a>. Esta tela permite o lançamento por estar restrita a Admin.</span>
    </p>
    <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                <tr><th class="text-left p-3">Data/hora</th><th class="text-left p-3">Item</th><th class="text-left p-3">Localização</th><th class="text-right p-3">Δ</th><th class="text-left p-3">Motivo</th><th class="text-left p-3">Justificação</th><th class="text-center p-3">Ações</th></tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-50"></tbody>
        </table>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-gray-800">Novo ajuste</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="form" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-500">Item *</label>
                        <select name="item_id" id="itemSelect" required onchange="onItemChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">— selecione —</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Localização *</label>
                        <select name="location_id" id="locationSelect" required onchange="onLocationChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">—</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Lote (se aplicável)</label>
                        <select name="lot_id" id="lotSelect" onchange="recalcDelta()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">—</option>
                        </select>
                    </div>
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-3">
                        <p class="text-xs text-gray-500">Stock atual no triplo</p>
                        <p id="currentStock" class="text-2xl font-bold text-gray-800">—</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs text-gray-500">Tipo *</label>
                        <select name="sign" id="signSelect" required onchange="recalcDelta()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="1">+ Positivo (sobra)</option>
                            <option value="-1">− Negativo (perda)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Quantidade *</label>
                        <input name="qty" type="number" step="0.0001" min="0" required oninput="recalcDelta()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-3">
                        <p class="text-xs text-gray-500">Stock final</p>
                        <p id="finalStock" class="text-2xl font-bold text-gray-800">—</p>
                        <p id="pctIndicator" class="text-[10px] text-gray-500"></p>
                    </div>
                </div>

                <div id="warnAdmin" class="hidden border border-amber-200 bg-amber-50 rounded-lg p-3 text-xs text-amber-700">
                    ⚠️ Ajuste superior a 5% do stock atual — requer perfil <strong>Inventory_Admin</strong>.
                </div>
                <div id="warnNegative" class="hidden border border-red-200 bg-red-50 rounded-lg p-3 text-xs text-red-700">
                    🔴 Stock final ficará <strong>negativo</strong>. Apenas <strong>Inventory_Admin</strong> com confirmação dupla pode autorizar.
                </div>

                <div>
                    <label class="text-xs text-gray-500">Motivo *</label>
                    <select name="reason_code" id="reasonSelect" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                </div>
                <div>
                    <label class="text-xs text-gray-500">Justificação *</label>
                    <textarea name="justification" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                </div>

                <div class="flex justify-end gap-2 border-t pt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-sm font-medium shadow-sm shadow-amber-500/20 transition flex items-center gap-2"><i class="fas fa-save"></i> Aplicar ajuste</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Saída administrativa (avaria/extravio/perda/quebra/depreciacao).
         Registra como movimento type=saida via POST /api/inventory/exits.
         Disponível só nesta tela porque a tela é restrita a Admin. -->
    <div id="adminExitModal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-gray-800">Saída administrativa</h3>
                <button onclick="closeAdminExitModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="adminExitForm" class="p-6 space-y-4">
                <div class="bg-red-50 border border-red-200 rounded-lg p-3 text-xs text-red-700">
                    <i class="fas fa-circle-exclamation"></i>
                    Esta operação grava um <strong>movimento de saída</strong> com motivo administrativo. Aparecerá em <a href="exits.html" class="underline">Saídas</a>.
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-500">Motivo *</label>
                        <select name="subtype" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="avaria">Avaria</option>
                            <option value="extravio">Extravio</option>
                            <option value="perda">Perda</option>
                            <option value="quebra">Quebra</option>
                            <option value="depreciacao">Ajuste contábil</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Item *</label>
                        <select name="item_id" id="adminExitItem" required onchange="onAdminExitItemChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">— selecione —</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Localização de origem *</label>
                        <select name="location_id" id="adminExitLocation" required onchange="onAdminExitLocationChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">—</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Lote</label>
                        <select name="lot_id" id="adminExitLot" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">— Sugestão FEFO automática —</option>
                        </select>
                        <p id="adminExitLotHint" class="text-[10px] text-blue-600 mt-1"></p>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">Quantidade *</label>
                        <input name="quantity" type="number" step="0.0001" min="0.0001" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-gray-500">Justificação *</label>
                    <textarea name="justification" required rows="3" placeholder="Descreva as circunstâncias (obrigatória para tipos administrativos)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                </div>
                <div class="flex justify-end gap-2 border-t pt-4">
                    <button type="button" onclick="closeAdminExitModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium shadow-sm shadow-red-500/20 transition flex items-center gap-2"><i class="fas fa-save"></i> Registar saída</button>
                </div>
            </form>
        </div>
    </div>
`;

let items = [], allLocations = [], reasons = [], currentStockList = [];

async function bootstrap() {
    try {
        const [it, lo, re] = await Promise.all([
            apiCall('/api/inventory/items?limit=1000'),
            apiCall('/api/inventory/locations'),
            apiCall('/api/inventory/adjustment-reasons')
        ]);
        items = it.data || []; allLocations = lo.data || []; reasons = re.data || [];
        document.getElementById('itemSelect').innerHTML = '<option value="">— selecione —</option>' +
            items.map(i => `<option value="${i.id}" data-controls-lot="${i.controls_lot}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}${i.subcategory?.name ? ' · ' + escapeHtml(i.subcategory.name) : ''}</option>`).join('');
        document.getElementById('reasonSelect').innerHTML = '<option value="">— selecione —</option>' +
            reasons.map(r => `<option value="${r.code}">${escapeHtml(r.label)}</option>`).join('');
        makeSearchable('itemSelect', { placeholder: 'Buscar item por nome, código ou categoria…' });
    } catch (err) { toast(err.message, 'error'); }
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/adjustments?limit=100');
        document.getElementById('tbody').innerHTML = r.data.map(m => {
            // Convenção: from_location preenchido = ajuste negativo; to_location preenchido = positivo.
            // (Conferimos pelo objeto aninhado porque o SELECT não traz os _id crus.)
            const sign = m.from_location ? -1 : 1;
            const loc = m.from_location || m.to_location;
            const cancelBadge = m.is_cancelled
                ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-red-100 text-red-700" title="Foi cancelado por um estorno">Estornado</span>'
                : m.is_reversal
                    ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-amber-100 text-amber-700" title="Movimento de estorno">Estorno</span>'
                    : '';
            const rowCls = m.is_cancelled ? 'opacity-60 line-through' : '';
            return `<tr class="hover:bg-sky-50/30 transition ${rowCls}">
                <td class="p-3 text-xs">${new Date(m.occurred_at).toLocaleString('pt-PT')}</td>
                <td class="p-3 font-medium">${escapeHtml(m.item?.name || '')}<br><span class="text-[10px] text-gray-400 font-mono">${escapeHtml(m.item?.internal_code || '')}</span></td>
                <td class="p-3 text-xs text-gray-600">${escapeHtml(loc?.unit?.name || '')} · ${escapeHtml(loc?.name || '')}</td>
                <td class="p-3 text-right font-bold ${sign > 0 ? 'text-sky-600' : 'text-red-600'}">${sign > 0 ? '+' : '−'}${parseFloat(m.quantity).toFixed(2)}</td>
                <td class="p-3 text-xs">${escapeHtml(m.subtype || '—')}${cancelBadge}</td>
                <td class="p-3 text-xs text-gray-600 max-w-[200px] truncate" title="${escapeHtml(m.justification || '')}">${escapeHtml(m.justification || '—')}</td>
                <td class="p-3 text-center">
                    <button onclick='viewAdjustment(${JSON.stringify({...m, _sign: sign}).replace(/'/g, "&#39;")})' class="text-gray-600 hover:text-blue-600" title="Visualizar"><i class="fas fa-eye"></i></button>
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="7" class="p-6 text-center text-gray-400">Nenhum ajuste registado.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function openModal() {
    document.getElementById('form').reset();
    document.getElementById('locationSelect').innerHTML = '<option value="">—</option>';
    document.getElementById('lotSelect').innerHTML = '<option value="">—</option>';
    document.getElementById('currentStock').textContent = '—';
    document.getElementById('finalStock').textContent = '—';
    document.getElementById('warnAdmin').classList.add('hidden');
    document.getElementById('warnNegative').classList.add('hidden');
    document.getElementById('pctIndicator').textContent = '';
    // Carrega todas as localizações por padrão (item pode estar em qualquer uma)
    document.getElementById('locationSelect').innerHTML = '<option value="">—</option>' +
        allLocations.map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('');
    document.getElementById('modal').classList.remove('hidden');
    makeSearchable('locationSelect', { placeholder: 'Buscar localização…' });
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function onItemChange() {
    const itemId = document.getElementById('itemSelect').value;
    if (!itemId) return;
    try {
        const r = await apiCall(`/api/inventory/exits/stock-by-item/${itemId}`);
        currentStockList = r.data || [];
        // Não filtra localizações — ajuste pode ser feito para criar stock novo
        recalcStockDisplay();
    } catch (err) { toast(err.message, 'error'); }
}

function onLocationChange() {
    const itemOpt = document.getElementById('itemSelect').selectedOptions[0];
    const controlsLot = itemOpt?.dataset?.controlsLot === 'true';
    const locId = document.getElementById('locationSelect').value;

    const lotsHere = currentStockList.filter(s => s.location_id === locId && s.lot);
    if (controlsLot) {
        document.getElementById('lotSelect').innerHTML = '<option value="">— selecione um lote —</option>' +
            lotsHere.map(s => `<option value="${s.lot.id}">${escapeHtml(s.lot.lot_number)} · qty ${parseFloat(s.quantity).toFixed(2)} · val ${s.lot.expiry_date || 'sem'}</option>`).join('');
    } else {
        document.getElementById('lotSelect').innerHTML = '<option value="">— item não controla lote —</option>';
    }
    recalcStockDisplay();
}

function recalcStockDisplay() {
    const locId = document.getElementById('locationSelect').value;
    const lotId = document.getElementById('lotSelect').value;
    const itemOpt = document.getElementById('itemSelect').selectedOptions[0];
    const controlsLot = itemOpt?.dataset?.controlsLot === 'true';
    const stockEl = document.getElementById('currentStock');

    if (!locId) { stockEl.textContent = '—'; stockEl.title = ''; recalcDelta(); return; }

    let current = 0;
    let label = '';
    if (lotId) {
        // Triplo completo (item, localização, lote específico)
        const match = currentStockList.find(s => s.location_id === locId && s.lot?.id === lotId);
        current = match ? parseFloat(match.quantity) : 0;
    } else if (controlsLot) {
        // Item controla lote mas nenhum selecionado: mostra soma total da localização
        // para o utilizador ter contexto (mas precisa escolher lote antes de ajustar)
        current = currentStockList
            .filter(s => s.location_id === locId)
            .reduce((acc, s) => acc + parseFloat(s.quantity || 0), 0);
        label = '⚠️ Selecione um lote para ajustar';
    } else {
        // Item NÃO controla lote: triplo é (item, localização, sem lote)
        const match = currentStockList.find(s => s.location_id === locId && !s.lot);
        current = match ? parseFloat(match.quantity) : 0;
    }
    stockEl.textContent = current.toFixed(2);
    stockEl.title = label;
    document.getElementById('pctIndicator').textContent = label;
    recalcDelta();
}

function recalcDelta() {
    const sign = parseInt(document.getElementById('signSelect').value);
    const qty = parseFloat(document.getElementById('form').qty.value || 0);
    const currentText = document.getElementById('currentStock').textContent;
    const current = parseFloat(currentText) || 0;
    const delta = sign * qty;
    const final = current + delta;

    document.getElementById('finalStock').textContent = isNaN(final) ? '—' : final.toFixed(2);

    const pct = current > 0 ? (Math.abs(delta) / current) * 100 : (qty > 0 ? 100 : 0);
    document.getElementById('pctIndicator').textContent = qty > 0 ? `${pct.toFixed(1)}% sobre stock atual` : '';

    document.getElementById('warnAdmin').classList.toggle('hidden', pct <= 5 || qty === 0);
    document.getElementById('warnNegative').classList.toggle('hidden', final >= 0 || qty === 0);
}

document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const f = e.target;
    const sign = parseInt(f.sign.value);
    const qty = parseFloat(f.qty.value);
    const itemOpt = document.getElementById('itemSelect').selectedOptions[0];
    const controlsLot = itemOpt?.dataset?.controlsLot === 'true';
    if (controlsLot && !f.lot_id.value) {
        toast('Item controla lote — selecione um lote específico antes de ajustar', 'error');
        return;
    }
    const payload = {
        item_id: f.item_id.value,
        location_id: f.location_id.value,
        lot_id: f.lot_id.value || null,
        delta: sign * qty,
        reason_code: f.reason_code.value,
        justification: f.justification.value
    };
    try {
        await apiCall('/api/inventory/adjustments', { method: 'POST', body: JSON.stringify(payload) });
        toast('Ajuste aplicado');
        closeModal();
        load();
    } catch (err) {
        // RN05: stock final negativo — pedir confirmação dupla
        if (err.message && err.message.includes('NEGATIVE_STOCK_CONFIRMATION_REQUIRED')) {
            const c1 = confirm('🔴 Este ajuste deixará o stock NEGATIVO. Continuar?');
            if (!c1) return;
            const c2 = confirm('Confirmação final: tem mesmo a certeza? Esta operação fica registada permanentemente.');
            if (!c2) return;
            try {
                await apiCall('/api/inventory/adjustments', { method: 'POST', body: JSON.stringify({ ...payload, force_negative: true }) });
                toast('Ajuste aplicado (stock negativo)', 'warn');
                closeModal();
                load();
            } catch (e2) { toast(e2.message, 'error'); }
            return;
        }
        toast(err.message, 'error');
    }
});

// =====================================================
// Modal: Saída administrativa (POST /api/inventory/exits com subtype admin)
// =====================================================
let adminExitStock = [];

function openAdminExitModal() {
    document.getElementById('adminExitForm').reset();
    document.getElementById('adminExitItem').innerHTML = '<option value="">— selecione —</option>' +
        items.map(i => `<option value="${i.id}" data-controls-lot="${i.controls_lot}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}${i.subcategory?.name ? ' · ' + escapeHtml(i.subcategory.name) : ''}</option>`).join('');
    document.getElementById('adminExitLocation').innerHTML = '<option value="">—</option>';
    document.getElementById('adminExitLot').innerHTML = '<option value="">— Sugestão FEFO automática —</option>';
    document.getElementById('adminExitLotHint').textContent = '';
    document.getElementById('adminExitModal').classList.remove('hidden');
    makeSearchable('adminExitItem',     { placeholder: 'Buscar item por nome, código ou categoria…' });
    makeSearchable('adminExitLocation', { placeholder: 'Buscar localização…' });
}

function closeAdminExitModal() { document.getElementById('adminExitModal').classList.add('hidden'); }

async function onAdminExitItemChange() {
    const itemId = document.getElementById('adminExitItem').value;
    if (!itemId) return;
    try {
        const r = await apiCall(`/api/inventory/exits/stock-by-item/${itemId}`);
        adminExitStock = r.data || [];
        const locMap = new Map();
        adminExitStock.forEach(s => {
            if (s.location?.can_send !== false) locMap.set(s.location_id, s.location);
        });
        document.getElementById('adminExitLocation').innerHTML = '<option value="">—</option>' +
            Array.from(locMap.values()).map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('');
        makeSearchable('adminExitLocation', { placeholder: 'Buscar localização…' });
    } catch (err) { toast(err.message, 'error'); }
}

function onAdminExitLocationChange() {
    const itemOpt = document.getElementById('adminExitItem').selectedOptions[0];
    const controlsLot = itemOpt?.dataset?.controlsLot === 'true';
    const locId = document.getElementById('adminExitLocation').value;
    const lotsHere = adminExitStock.filter(s => s.location_id === locId);
    if (controlsLot) {
        // Ordena FEFO (validade ascendente, sem validade no fim)
        const sorted = lotsHere.filter(s => s.lot)
            .sort((a, b) => (a.lot.expiry_date || '9999').localeCompare(b.lot.expiry_date || '9999'));
        document.getElementById('adminExitLot').innerHTML =
            '<option value="">— Sugestão FEFO automática —</option>' +
            sorted.map((s, idx) => `<option value="${s.lot.id}">${escapeHtml(s.lot.lot_number)} · qty ${parseFloat(s.quantity).toFixed(2)} · val ${s.lot.expiry_date || 'sem'}${idx === 0 ? ' 🟢 FEFO' : ''}</option>`).join('');
        document.getElementById('adminExitLotHint').textContent = sorted.length
            ? `🟢 = Sugestão FEFO (validade mais próxima: ${sorted[0].lot.expiry_date || 'sem'})`
            : '';
    } else {
        document.getElementById('adminExitLot').innerHTML = '<option value="">— item não controla lote —</option>';
        document.getElementById('adminExitLotHint').textContent = '';
    }
}

document.getElementById('adminExitForm').addEventListener('submit', async e => {
    e.preventDefault();
    const f = e.target;
    const payload = {
        item_id:     f.item_id.value,
        location_id: f.location_id.value,
        quantity:    parseFloat(f.quantity.value),
        lot_id:      f.lot_id.value || null,
        subtype:     f.subtype.value,
        justification: f.justification.value
    };
    try {
        await apiCall('/api/inventory/exits', { method: 'POST', body: JSON.stringify(payload) });
        toast('Saída administrativa registada — ver em Saídas');
        closeAdminExitModal();
    } catch (err) {
        if (err.message && err.message.includes('LOW_STOCK_CONFIRMATION_REQUIRED')) {
            const c1 = confirm('⚠️ Esta saída deixará o stock abaixo do mínimo. Continuar?');
            if (!c1) return;
            try {
                await apiCall('/api/inventory/exits', { method: 'POST', body: JSON.stringify({ ...payload, confirmed_low_stock: true }) });
                toast('Saída administrativa registada (stock abaixo do mínimo)', 'warn');
                closeAdminExitModal();
            } catch (e2) { toast(e2.message, 'error'); }
            return;
        }
        toast(err.message, 'error');
    }
});

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function viewAdjustment(m) {
    const loc = m.from_location || m.to_location;
    const sign = m._sign || (m.from_location ? -1 : 1);
    const signLabel = sign > 0 ? `+ ${parseFloat(m.quantity).toFixed(4)}` : `− ${parseFloat(m.quantity).toFixed(4)}`;
    showViewModal({
        title: 'Ajuste manual',
        sections: [
            { title: 'Dados gerais', rows: [
                ['Data/hora', new Date(m.occurred_at).toLocaleString('pt-PT')],
                ['Item', `${m.item?.internal_code || ''} · ${m.item?.name || ''}`],
                ['Localização', loc ? `${loc.unit?.name || ''} · ${loc.name}` : '—'],
                ['Delta', signLabel, { bold: true }],
                ['Lote', m.lot?.lot_number, { mono: true }],
                ['Motivo', m.subtype],
                ['Custo Médio', `€ ${parseFloat(m.cmp_at_moment || 0).toFixed(4)}`]
            ]},
            { title: 'Justificação', rows: [
                ['Texto', m.justification]
            ]}
        ],
        actions: (() => {
            const a = [
                { label: 'Imprimir comprovante', icon: 'fa-print', href: `print-receipt.html?type=exit&id=${m.id}` }
            ];
            // Tela já é admin-only — mas conferimos a flag mesmo assim
            if (window.isInventoryAdmin && !m.is_cancelled && !m.is_reversal) {
                a.push({
                    label: 'Inativar ajuste', icon: 'fa-ban',
                    onclick: async () => {
                        const reason = await confirmCancelMovement('ajuste');
                        if (!reason) return;
                        try {
                            await apiCall(`/api/inventory/movements/${m.id}/cancel`, {
                                method: 'POST', body: JSON.stringify({ reason })
                            });
                            toast('Ajuste inativado · estorno gerado');
                            closeViewModal();
                            load();
                        } catch (err) { toast(err.message, 'error'); }
                    }
                });
            }
            return a;
        })()
    });
}

(async () => { await bootstrap(); await load(); })();
</script>
</body>
