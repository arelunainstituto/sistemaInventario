<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Log de Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({
    activePage: 'access-log',
    title: 'Log de Acesso',
    subtitle: 'Auditoria de chamadas à API (apenas Admin)'
});

document.getElementById('pageContent').innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <div class="bg-white rounded-lg shadow p-4 lg:col-span-1">
            <h3 class="text-sm font-bold text-gray-800 mb-3"><i class="fas fa-clock-rotate-left text-blue-600"></i> Retenção</h3>
            <form id="retentionForm" class="space-y-2">
                <label class="text-xs text-gray-500">Manter registos por (meses)</label>
                <div class="flex gap-2">
                    <input id="retentionInput" name="months" type="number" min="1" max="120" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <button type="submit" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs"><i class="fas fa-save"></i></button>
                </div>
                <p class="text-[10px] text-gray-500">Cron mensal purga registos mais antigos. Atual: <span id="currentRetention">—</span> meses.</p>
                <div class="flex gap-3 mt-2">
                    <button type="button" onclick="purgeNow()" class="text-xs text-orange-600 hover:underline"><i class="fas fa-broom"></i> Aplicar retenção agora</button>
                    <button type="button" onclick="clearAll()" class="text-xs text-red-600 hover:underline"><i class="fas fa-trash-can"></i> Apagar tudo</button>
                </div>
            </form>
        </div>
        <div class="bg-white rounded-lg shadow p-4 lg:col-span-2">
            <h3 class="text-sm font-bold text-gray-800 mb-3"><i class="fas fa-filter text-gray-600"></i> Filtros</h3>
            <form id="filtersForm" class="grid grid-cols-2 md:grid-cols-3 gap-2 items-end">
                <div>
                    <label class="text-xs text-gray-500">Método</label>
                    <select name="method" class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-xs">
                        <option value="">Todos</option>
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="PATCH">PATCH</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500">Entidade</label>
                    <input name="entity_type" type="text" placeholder="items, entries…" class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-xs">
                </div>
                <div>
                    <label class="text-xs text-gray-500">Status mín</label>
                    <input name="status_min" type="number" placeholder="200" class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-xs">
                </div>
                <div>
                    <label class="text-xs text-gray-500">Status máx</label>
                    <input name="status_max" type="number" placeholder="599" class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-xs">
                </div>
                <div>
                    <label class="text-xs text-gray-500">De</label>
                    <input name="from_date" type="date" class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-xs">
                </div>
                <div>
                    <label class="text-xs text-gray-500">Até</label>
                    <input name="to_date" type="date" class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-xs">
                </div>
                <div class="col-span-2 md:col-span-3 flex justify-between gap-2">
                    <div class="flex gap-2">
                        <button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs"><i class="fas fa-search"></i> Aplicar</button>
                        <button type="button" onclick="resetFilters()" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-xs">Limpar</button>
                    </div>
                    <div class="flex gap-1">
                        <button type="button" onclick="downloadCurrent('csv')" class="px-2 py-1.5 bg-gray-100 rounded text-xs"><i class="fas fa-file-csv"></i></button>
                        <button type="button" onclick="downloadCurrent('xlsx')" class="px-2 py-1.5 bg-green-100 text-green-800 rounded text-xs"><i class="fas fa-file-excel"></i></button>
                        <button type="button" onclick="downloadCurrent('pdf')" class="px-2 py-1.5 bg-red-100 text-red-800 rounded text-xs"><i class="fas fa-file-pdf"></i></button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
            <table class="w-full text-xs">
                <thead class="bg-gray-50 uppercase text-gray-600 sticky top-0">
                    <tr>
                        <th class="text-left p-2">Data/hora</th>
                        <th class="text-left p-2">Utilizador</th>
                        <th class="text-left p-2">Método</th>
                        <th class="text-left p-2">Ação</th>
                        <th class="text-left p-2">Alvo</th>
                        <th class="text-center p-2">Status</th>
                        <th class="text-right p-2">ms</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
        <div id="pagination" class="p-3 border-t border-gray-100 flex justify-between items-center text-xs text-gray-500"></div>
    </div>
`;

let currentPage = 1;
const LIMIT = 100;

// Traduz (método, entity_type, path) numa descrição legível
const ACTION_VERBS = {
    POST:   'Criou',
    PUT:    'Atualizou',
    PATCH:  'Atualizou',
    DELETE: 'Removeu',
    GET:    'Consultou'
};
const ENTITY_LABELS = {
    items: 'item', suppliers: 'fornecedor', locations: 'localização',
    categories: 'subcategoria', uoms: 'unidade de medida', units: 'unidade',
    entries: 'entrada', exits: 'saída', transfers: 'transferência',
    adjustments: 'ajuste', 'inventory-sessions': 'sessão de inventário',
    'adjustment-reasons': 'motivo de ajuste', depreciation: 'depreciação',
    reports: 'relatório', stats: 'estatística', search: 'busca',
    'access-log': 'log de acesso', scan: 'leitura QR', movements: 'movimento'
};
function describeAction(l) {
    const verb = ACTION_VERBS[l.method] || l.method;
    const entity = ENTITY_LABELS[l.entity_type] || l.entity_type || '';
    if (!entity) return verb;
    // Casos especiais: ações típicas
    if (l.path.endsWith('/validate'))  return 'Validou sessão de inventário';
    if (l.path.endsWith('/cancel'))    return 'Cancelou sessão de inventário';
    if (l.path.endsWith('/purge'))     return 'Purgou log de acesso';
    if (l.path.endsWith('/run'))       return 'Executou depreciação anual';
    if (l.path.endsWith('/settings'))  return `${verb} configurações`;
    if (l.path.endsWith('/summary'))   return 'Carregou painel';
    return `${verb} ${entity}`;
}

function methodBadge(m) {
    const map = { GET: 'bg-blue-100 text-blue-700', POST: 'bg-green-100 text-green-700', PUT: 'bg-amber-100 text-amber-700', PATCH: 'bg-amber-100 text-amber-700', DELETE: 'bg-red-100 text-red-700' };
    return map[m] || 'bg-gray-100 text-gray-700';
}
function statusColor(s) {
    if (s >= 500) return 'text-red-700 font-bold';
    if (s >= 400) return 'text-orange-600';
    if (s >= 200) return 'text-green-700';
    return 'text-gray-500';
}

async function loadRetention() {
    try {
        const r = await apiCall('/api/inventory/access-log/settings');
        const v = parseInt(r.data?.value || 24);
        document.getElementById('retentionInput').value = v;
        document.getElementById('currentRetention').textContent = v;
    } catch (err) { /* sem permissão = não admin → toast já apareceu */ }
}

document.getElementById('retentionForm').addEventListener('submit', async e => {
    e.preventDefault();
    const months = parseInt(new FormData(e.target).get('months'));
    try {
        await apiCall('/api/inventory/access-log/settings', { method: 'PUT', body: JSON.stringify({ months }) });
        toast('Retenção atualizada');
        document.getElementById('currentRetention').textContent = months;
    } catch (err) { toast(err.message, 'error'); }
});

async function purgeNow() {
    if (!confirm('Aplicar a retenção atual agora? Registos mais antigos do que o limite definido serão apagados.')) return;
    try {
        const r = await apiCall('/api/inventory/access-log/purge', { method: 'POST' });
        toast(`${r.data.deleted} registos apagados`);
        load(1);
    } catch (err) { toast(err.message, 'error'); }
}

async function clearAll() {
    const phrase = prompt('Apagar TODOS os registos de log? Esta ação é irreversível.\n\nDigite "APAGAR TUDO" (maiúsculas) para confirmar:');
    if (phrase !== 'APAGAR TUDO') return;
    try {
        const r = await apiCall('/api/inventory/access-log', {
            method: 'DELETE',
            body: JSON.stringify({ confirm: 'APAGAR TUDO' })
        });
        toast(`${r.data.deleted} registos apagados`);
        load(1);
    } catch (err) { toast(err.message, 'error'); }
}

function buildQueryString(extra = {}) {
    const f = document.getElementById('filtersForm');
    const params = new URLSearchParams();
    for (const el of f.elements) {
        if (!el.name) continue;
        if (el.value) params.set(el.name, el.value);
    }
    for (const [k, v] of Object.entries(extra)) params.set(k, v);
    return params.toString();
}

async function load(page = 1) {
    currentPage = page;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '<tr><td colspan="8" class="p-6 text-center text-gray-400">Carregando…</td></tr>';
    try {
        const qs = buildQueryString({ page, limit: LIMIT });
        const r = await apiCall(`/api/inventory/access-log?${qs}`);
        const rows = r.data || [];
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="p-6 text-center text-gray-400">Nenhum registo encontrado.</td></tr>';
        } else {
            tbody.innerHTML = rows.map(l => {
                const action = describeAction(l);
                return `
                <tr class="hover:bg-gray-50">
                    <td class="p-2 whitespace-nowrap">${new Date(l.created_at).toLocaleString('pt-PT')}</td>
                    <td class="p-2">
                        ${escapeHtml(l.user?.display_name || l.user?.email || (l.user_id ? l.user_id.slice(0,8) : '—'))}
                        <span class="text-[10px] text-gray-400 font-mono ml-1">${escapeHtml(l.ip || '')}</span>
                    </td>
                    <td class="p-2"><span class="text-[10px] px-1.5 py-0.5 rounded ${methodBadge(l.method)}">${l.method}</span></td>
                    <td class="p-2">
                        <span class="text-gray-800">${escapeHtml(action)}</span>
                        <span class="text-[10px] text-gray-400 font-mono ml-1" title="${escapeHtml(l.path)}">${escapeHtml(l.path)}</span>
                    </td>
                    <td class="p-2">${escapeHtml(l.entity_label || '—')}</td>
                    <td class="p-2 text-center ${statusColor(l.status_code)}">${l.status_code}</td>
                    <td class="p-2 text-right text-gray-500">${l.duration_ms}</td>
                </tr>`;
            }).join('');
        }
        renderPagination(r.pagination);
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" class="p-6 text-center text-red-500">${escapeHtml(err.message)}</td></tr>`;
    }
}

function renderPagination(p) {
    if (!p) { document.getElementById('pagination').innerHTML = ''; return; }
    document.getElementById('pagination').innerHTML = `
        <span>${p.total} registos · página ${p.page} de ${p.totalPages || 1}</span>
        <div class="flex gap-1">
            <button onclick="load(${Math.max(1, p.page - 1)})" ${p.page <= 1 ? 'disabled' : ''} class="px-2 py-1 ${p.page <= 1 ? 'text-gray-300' : 'text-blue-600 hover:bg-blue-50'} rounded">← Anterior</button>
            <button onclick="load(${Math.min(p.totalPages || 1, p.page + 1)})" ${p.page >= p.totalPages ? 'disabled' : ''} class="px-2 py-1 ${p.page >= p.totalPages ? 'text-gray-300' : 'text-blue-600 hover:bg-blue-50'} rounded">Próxima →</button>
        </div>`;
}

function resetFilters() {
    document.getElementById('filtersForm').reset();
    load(1);
}

document.getElementById('filtersForm').addEventListener('submit', e => {
    e.preventDefault();
    load(1);
});

async function downloadCurrent(format) {
    const token = localStorage.getItem('access_token');
    const qs = buildQueryString({ format });
    try {
        const res = await fetch(`/api/inventory/access-log?${qs}`, { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) throw new Error('Erro ao gerar arquivo');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `access-log.${format}`; a.click();
        URL.revokeObjectURL(url);
    } catch (err) { toast(err.message, 'error'); }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

loadRetention();
load();
</script>
</body>
</html>
