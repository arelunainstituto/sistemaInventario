<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Kardex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script src="_searchable-select.js"></script>
<script>
renderInventoryLayout({ activePage: 'reports', title: 'Ficha Kardex', subtitle: '§12.6 — movimentos cronológicos com saldo acumulado' });

document.getElementById('pageContent').innerHTML = `
    <div class="bg-white rounded-lg shadow p-6 mb-4">
        <label class="text-xs text-gray-500">Selecione o item</label>
        <select id="itemSelect" class="w-full md:w-1/2 px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="">— selecione —</option>
        </select>
    </div>

    <div id="kardexPanel" class="bg-white rounded-lg shadow p-6 hidden">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 id="itemTitle" class="text-lg font-bold text-gray-800">—</h3>
                <p id="itemInfo" class="text-sm text-gray-500"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadCurrent('csv')" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-xs"><i class="fas fa-file-csv"></i> CSV</button>
                <button onclick="downloadCurrent('xlsx')" class="px-3 py-1.5 bg-green-100 hover:bg-green-200 text-green-800 rounded-lg text-xs"><i class="fas fa-file-excel"></i> Excel</button>
                <button onclick="downloadCurrent('pdf')" class="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-800 rounded-lg text-xs"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
        </div>
        <div id="kardexTable" class="overflow-x-auto max-h-[600px] overflow-y-auto"></div>
    </div>
`;

let currentItemId = null;

async function bootstrap() {
    try {
        const r = await apiCall('/api/inventory/items?limit=1000');
        document.getElementById('itemSelect').innerHTML = '<option value="">— selecione —</option>' +
            r.data.map(i => `<option value="${i.id}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}</option>`).join('');
        makeSearchable('itemSelect', { placeholder: 'Buscar item por nome ou SKU…' });
    } catch (err) { toast(err.message, 'error'); }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('itemSelect').addEventListener('change', async e => {
        currentItemId = e.target.value;
        if (!currentItemId) { document.getElementById('kardexPanel').classList.add('hidden'); return; }
        await loadKardex();
    });
});
// fallback se DOMContentLoaded já tiver disparado
document.getElementById('itemSelect').addEventListener('change', async e => {
    currentItemId = e.target.value;
    if (!currentItemId) { document.getElementById('kardexPanel').classList.add('hidden'); return; }
    await loadKardex();
});

async function loadKardex() {
    document.getElementById('kardexPanel').classList.remove('hidden');
    document.getElementById('kardexTable').innerHTML = '<p class="text-sm text-gray-400 p-4">Carregando…</p>';
    try {
        const res = await apiCall(`/api/inventory/reports/kardex/${currentItemId}`);
        const rows = res.data || [];
        const cols = res.columns || [];
        const itemOpt = document.getElementById('itemSelect').selectedOptions[0];
        document.getElementById('itemTitle').textContent = itemOpt.textContent;
        document.getElementById('itemInfo').textContent = `${rows.length} movimentos`;

        if (!rows.length) {
            document.getElementById('kardexTable').innerHTML = '<p class="text-sm text-gray-400 p-6 text-center">Nenhum movimento registado.</p>';
            return;
        }
        document.getElementById('kardexTable').innerHTML = `
            <table class="w-full text-xs">
                <thead class="bg-gray-50 uppercase text-gray-600 sticky top-0">
                    <tr>${cols.map(c => `<th class="text-left p-2">${escapeHtml(c.label || c.key)}</th>`).join('')}</tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    ${rows.map(r => `<tr class="hover:bg-gray-50">${cols.map(c => `<td class="p-2">${escapeHtml(String(r[c.key] ?? '—'))}</td>`).join('')}</tr>`).join('')}
                </tbody>
            </table>`;
    } catch (err) {
        document.getElementById('kardexTable').innerHTML = `<p class="text-sm text-red-500 p-4">${escapeHtml(err.message)}</p>`;
    }
}

async function downloadCurrent(format) {
    if (!currentItemId) return;
    const token = localStorage.getItem('access_token');
    try {
        const res = await fetch(`/api/inventory/reports/kardex/${currentItemId}?format=${format}`, {
            headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Erro ao gerar arquivo');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `kardex_${currentItemId.slice(0,8)}.${format}`; a.click();
        URL.revokeObjectURL(url);
    } catch (err) { toast(err.message, 'error'); }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

bootstrap();
</script>
</body>
</html>
