<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Ler QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
// Retrocompat: etiquetas antigas apontam para scan.html?code=<uuid>.
// Hoje os QRs novos apontam direto para item-view.html?qr=<uuid>, então a
// scan.html serve apenas para leitura por câmera. Se vier com ?code= (URL
// antiga digitada manualmente), redireciona direto para a ficha.
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) {
    window.location.href = `item-view.html?qr=${encodeURIComponent(urlCode)}`;
}

renderInventoryLayout({ activePage: 'scan', title: 'Ler QR Code', subtitle: 'Aponte a câmera do telemóvel/computador para a etiqueta' });

document.getElementById('pageContent').innerHTML = `
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
            <div id="reader" class="rounded-t-xl overflow-hidden bg-gray-900" style="min-height: 380px;"></div>
            <div class="p-5 flex items-center justify-center gap-3 border-t border-gray-100">
                <div class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div>
                <p id="status" class="text-sm text-gray-600">Iniciando câmera…</p>
            </div>
        </div>
    </div>
`;

const reader = new Html5Qrcode('reader');
const status = document.getElementById('status');

Html5Qrcode.getCameras().then(cams => {
    if (!cams.length) { status.textContent = 'Nenhuma câmera detetada.'; return; }
    reader.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScan, () => {}
    ).then(() => { status.textContent = 'A escanear… aponte para o QR Code.'; })
     .catch(err => { status.textContent = 'Erro ao iniciar câmera: ' + err; });
}).catch(err => { status.textContent = 'Sem permissão de câmera. ' + err; });

let resolved = false;
async function onScan(decoded) {
    if (resolved) return;
    resolved = true;
    try { await reader.stop(); } catch {}
    // Extrai o UUID do payload (URL completa do QR ou UUID nu)
    const m = decoded.match(/[?&]qr=([0-9a-f-]{36})/i)
           || decoded.match(/[?&]code=([0-9a-f-]{36})/i)
           || decoded.match(/^([0-9a-f-]{36})$/i);
    const code = m ? m[1] : null;
    if (!code) {
        status.textContent = '✗ QR não reconhecido.';
        return;
    }
    status.textContent = '✓ Item encontrado — abrindo ficha…';
    window.location.href = `item-view.html?qr=${encodeURIComponent(code)}`;
}
</script>
</body>
</html>
