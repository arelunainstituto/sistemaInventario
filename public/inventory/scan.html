<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Ler QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({ activePage: 'scan', title: 'Ler QR Code', subtitle: 'Aponte a câmera do telemóvel/computador para a etiqueta' });

document.getElementById('pageContent').innerHTML = `
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
            <div id="reader" class="rounded-t-xl overflow-hidden bg-gray-900" style="min-height: 380px;"></div>
            <div class="p-5 flex items-center justify-center gap-3 border-t border-gray-100">
                <div class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div>
                <p id="status" class="text-sm text-gray-600">Iniciando câmera…</p>
            </div>
        </div>

        <div id="result" class="hidden mt-4 bg-white rounded-xl border border-gray-200/70 shadow-sm p-6"></div>
    </div>
`;

// Permite também ler via querystring (?code=<uuid>) — útil quando a etiqueta é
// fotografada e o telemóvel abre o link diretamente.
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) {
    resolveCode(urlCode);
}

// Inicia câmera
const reader = new Html5Qrcode('reader');
const status = document.getElementById('status');

Html5Qrcode.getCameras().then(cams => {
    if (!cams.length) { status.textContent = 'Nenhuma câmera detetada.'; return; }
    reader.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScan, () => {}
    ).then(() => { status.textContent = 'A escanear… aponte para o QR Code.'; })
     .catch(err => { status.textContent = 'Erro ao iniciar câmera: ' + err; });
}).catch(err => { status.textContent = 'Sem permissão de câmera. ' + err; });

let resolved = false;
async function onScan(decoded) {
    if (resolved) return;
    resolved = true;
    try { await reader.stop(); } catch {}

    // O QR contém URL como /inventory/scan.html?code=<uuid> — extrair UUID
    const m = decoded.match(/code=([0-9a-f-]{36})/i) || decoded.match(/^([0-9a-f-]{36})$/i);
    const code = m ? m[1] : decoded;
    resolveCode(code);
}

async function resolveCode(code) {
    status.textContent = 'Consultando item…';
    try {
        const r = await apiCall(`/api/inventory/scan/${code}`);
        const it = r.data;
        document.getElementById('result').classList.remove('hidden');
        const isPatrim = it.macro_category === 'patrimonial';
        document.getElementById('result').innerHTML = `
            <div class="flex items-start gap-4">
                ${it.image_url
                    ? `<img src="${it.image_url}" class="w-24 h-24 rounded-xl object-cover border border-gray-200 flex-shrink-0">`
                    : `<div class="w-24 h-24 rounded-xl bg-gradient-to-br from-gray-50 to-gray-100 border border-gray-200 flex items-center justify-center text-gray-300 text-2xl flex-shrink-0"><i class="fas fa-box"></i></div>`}
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                        <span class="inline-flex items-center gap-1.5 text-[11px] px-2 py-0.5 rounded-md ${isPatrim ? 'bg-purple-50 text-purple-700 border border-purple-100' : 'bg-sky-50 text-sky-700 border border-sky-100'} font-medium capitalize">
                            <i class="fas ${isPatrim ? 'fa-laptop-medical' : 'fa-prescription-bottle'} text-[9px]"></i>${it.macro_category}
                        </span>
                        <span class="text-[11px] font-mono text-gray-400">${escapeHtml(it.internal_code)}</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900">${escapeHtml(it.name)}</h3>
                    <p class="text-sm text-gray-600 mt-1">Custo Médio: <span class="font-medium text-gray-800 tabular-nums">€ ${(parseFloat(it.cmp) || 0).toFixed(2)}</span></p>
                    <div class="mt-4 flex gap-2 flex-wrap">
                        <a href="item-view.html?id=${it.id}" class="px-3 py-1.5 bg-sky-600 hover:bg-sky-700 text-white rounded-lg text-xs font-medium shadow-sm shadow-sky-500/20 flex items-center gap-1.5 transition"><i class="fas fa-eye text-[10px]"></i> Visualizar</a>
                        <a href="item-form.html?id=${it.id}" class="px-3 py-1.5 bg-sky-50 hover:bg-sky-100 text-sky-700 border border-sky-100 rounded-lg text-xs font-medium transition"><i class="fas fa-edit text-[10px]"></i> Editar</a>
                        <a href="item-label.html?id=${it.id}" class="px-3 py-1.5 bg-gray-50 hover:bg-gray-100 text-gray-700 border border-gray-200 rounded-lg text-xs font-medium transition"><i class="fas fa-qrcode text-[10px]"></i> Etiqueta</a>
                    </div>
                </div>
            </div>`;
        status.textContent = '✓ Item encontrado';
    } catch (err) {
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('result').innerHTML = `<p class="text-red-600">${err.message}</p>`;
        status.textContent = 'Falha ao resolver QR.';
    }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
