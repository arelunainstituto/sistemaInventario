<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiqueta · Inventário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .label { box-shadow: none; border: 1px solid #ccc; page-break-after: always; }
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-3xl mx-auto">
    <div class="no-print flex justify-between items-center mb-6">
        <a href="items.html" class="text-blue-600 hover:underline text-sm"><i class="fas fa-arrow-left"></i> Voltar à lista</a>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm">
            <i class="fas fa-print"></i> Imprimir
        </button>
    </div>

    <div id="labelContainer" class="text-center text-gray-400 py-12">Carregando…</div>
</div>

<script>
const id = new URLSearchParams(location.search).get('id');
const token = localStorage.getItem('access_token');

async function load() {
    if (!id) { document.getElementById('labelContainer').textContent = 'ID não fornecido.'; return; }
    try {
        const res = await fetch(`/api/inventory/items/${id}`, { headers: { Authorization: 'Bearer ' + token } });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Erro');
        const it = json.data;

        // QR PNG vem do endpoint /qr.png — usamos via <img> que carrega a URL autenticada?
        // O endpoint exige Authorization Bearer, então precisamos buscar como blob.
        const qrRes = await fetch(`/api/inventory/items/${id}/qr.png`, { headers: { Authorization: 'Bearer ' + token } });
        if (!qrRes.ok) throw new Error('Falha ao gerar QR');
        const blob = await qrRes.blob();
        const qrUrl = URL.createObjectURL(blob);

        document.getElementById('labelContainer').innerHTML = `
            <div class="label bg-white rounded-lg shadow p-8 mx-auto" style="width: 400px;">
                <div class="text-center">
                    <p class="text-xs text-gray-500 uppercase tracking-wider">Instituto Areluna</p>
                    <h2 class="text-lg font-bold text-gray-800 mt-1">${escapeHtml(it.name)}</h2>
                    <p class="text-sm text-gray-600 mt-1">${it.macro_category === 'patrimonial' ? '🏷️ Patrimonial' : '📦 Consumo'}</p>
                </div>
                <div class="my-6 flex justify-center">
                    <img src="${qrUrl}" alt="QR Code" class="w-56 h-56">
                </div>
                <div class="text-center text-xs text-gray-700 space-y-1">
                    <p><strong>Código:</strong> ${escapeHtml(it.internal_code)}</p>
                    ${it.patrimony_number ? `<p><strong>Património:</strong> ${escapeHtml(it.patrimony_number)}</p>` : ''}
                    ${it.subcategory ? `<p><strong>Categoria:</strong> ${escapeHtml(it.subcategory.name)}</p>` : ''}
                </div>
                <p class="text-center text-[10px] text-gray-400 mt-4">Aponte a câmera do telemóvel para abrir a ficha.</p>
            </div>`;
    } catch (err) {
        document.getElementById('labelContainer').innerHTML = `<p class="text-red-500">${err.message}</p>`;
    }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

load();
</script>
</body>
</html>
