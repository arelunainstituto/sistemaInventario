<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Relatórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({ activePage: 'reports', title: 'Relatórios', subtitle: 'Indicadores e exportações' });

// supportsLocation/supportsDateRange determinam quais filtros aparecem antes
// de gerar a consulta. Relatórios "snapshot do agora" (reorder, coverage,
// min-max, valoração) não filtram por data — só por localização.
const REPORTS = [
    { key: 'reorder',            label: 'Ponto de Reposição',                  icon: 'fa-rotate',                color: 'red',     hint: 'Itens abaixo do ponto de reposição',      endpoint: '/reports/reorder',            supportsLocation: true,  supportsDateRange: false },
    { key: 'stock-min-max',      label: 'Abaixo do Mínimo / Acima do Máximo',  icon: 'fa-triangle-exclamation',  color: 'orange',  hint: 'Identifica ruturas e excessos',           endpoint: '/reports/stock-min-max',      supportsLocation: true,  supportsDateRange: false },
    { key: 'coverage',           label: 'Cobertura de Stock',                  icon: 'fa-clock',                 color: 'blue',    hint: 'Dias de cobertura por item',              endpoint: '/reports/coverage',           supportsLocation: true,  supportsDateRange: false },
    { key: 'valuation',          label: 'Valoração dos Stocks',                icon: 'fa-euro-sign',             color: 'purple',  hint: 'Soma de Stock × Custo Médio por item',    endpoint: '/reports/valuation',          supportsLocation: true,  supportsDateRange: false },
    { key: 'inventory-sessions', label: 'Inventário (Contagem)',               icon: 'fa-list-check',            color: 'indigo',  hint: 'Diferenças apuradas em sessões',          endpoint: '/reports/inventory-sessions', supportsLocation: true,  supportsDateRange: true  },
    { key: 'consumption-trend',  label: 'Tendência de Consumo',                icon: 'fa-chart-line',            color: 'sky',     hint: 'Mensal com comparativo anual',            endpoint: '/reports/consumption-trend',  supportsLocation: true,  supportsDateRange: true  },
    { key: 'user-activity',      label: 'Movimentos por Utilizador',           icon: 'fa-user-clock',            color: 'gray',    hint: 'Auditoria de operações por utilizador',   endpoint: '/reports/user-activity',      supportsLocation: false, supportsDateRange: true  }
];

document.getElementById('pageContent').innerHTML = `
    <p class="text-[10px] uppercase tracking-wider font-bold text-gray-500 mb-3">Relatórios disponíveis</p>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
        ${REPORTS.map(r => `
            <button onclick="openReport('${r.key}')" class="group bg-white rounded-xl border border-gray-200/70 shadow-sm p-4 text-left hover:border-${r.color}-300 hover:shadow transition-all">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-lg bg-${r.color}-50 group-hover:bg-${r.color}-100 flex items-center justify-center text-${r.color}-600 flex-shrink-0 transition">
                        <i class="fas ${r.icon}"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="font-semibold text-gray-900 text-sm leading-tight">${r.label}</p>
                        <p class="text-[11px] text-gray-500 mt-1 leading-relaxed">${r.hint}</p>
                    </div>
                </div>
            </button>
        `).join('')}
        <a href="kardex.html" class="group bg-white rounded-xl border border-gray-200/70 shadow-sm p-4 text-left hover:border-cyan-300 hover:shadow transition-all block">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 rounded-lg bg-cyan-50 group-hover:bg-cyan-100 flex items-center justify-center text-cyan-600 flex-shrink-0 transition">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div>
                    <p class="font-semibold text-gray-900 text-sm leading-tight">Ficha Kardex</p>
                    <p class="text-[11px] text-gray-500 mt-1 leading-relaxed">Movimentos cronológicos por item</p>
                </div>
            </div>
        </a>
    </div>

    <div id="reportPanel" class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden hidden">
        <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-start gap-4">
            <div class="min-w-0">
                <h3 id="reportTitle" class="text-base font-bold text-gray-900">—</h3>
                <p id="reportSubtitle" class="text-xs text-gray-500 mt-0.5"></p>
            </div>
            <div id="reportExportActions" class="hidden flex gap-2 flex-shrink-0">
                <button onclick="downloadCurrent('csv')" class="px-2.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-medium transition"><i class="fas fa-file-csv"></i> CSV</button>
                <button onclick="downloadCurrent('xlsx')" class="px-2.5 py-1.5 bg-sky-50 hover:bg-sky-100 text-sky-700 border border-sky-100 rounded-lg text-xs font-medium transition"><i class="fas fa-file-excel"></i> Excel</button>
                <button onclick="downloadCurrent('pdf')" class="px-2.5 py-1.5 bg-red-50 hover:bg-red-100 text-red-700 border border-red-100 rounded-lg text-xs font-medium transition"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
        </div>
        <!-- Filtros: aplicados ANTES da consulta. Usuário escolhe e clica
             "Aplicar consulta" para disparar o fetch. -->
        <div id="reportFilters" class="px-5 py-4 border-b border-gray-100 bg-gray-50/40 grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
            <div id="filterLocationWrap" class="md:col-span-2">
                <label class="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Localização</label>
                <select id="filterLocation" class="w-full px-3 py-1.5 border border-gray-300 rounded-lg text-sm mt-1">
                    <option value="">Todas (visão global)</option>
                </select>
            </div>
            <div id="filterFromWrap" class="hidden">
                <label class="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">De</label>
                <input type="date" id="filterFrom" class="w-full px-3 py-1.5 border border-gray-300 rounded-lg text-sm mt-1">
            </div>
            <div id="filterToWrap" class="hidden">
                <label class="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Até</label>
                <input type="date" id="filterTo" class="w-full px-3 py-1.5 border border-gray-300 rounded-lg text-sm mt-1">
            </div>
            <div class="md:col-span-4 flex justify-end gap-2 border-t border-gray-200 pt-3">
                <button id="resetFilters" class="px-4 py-1.5 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Limpar</button>
                <button id="applyFilters" class="px-5 py-1.5 bg-sky-600 hover:bg-sky-700 text-white rounded-lg text-sm font-medium flex items-center gap-2">
                    <i class="fas fa-magnifying-glass text-xs"></i> Aplicar consulta
                </button>
            </div>
        </div>
        <div id="reportTable" class="overflow-x-auto max-h-[600px] overflow-y-auto">
            <p class="text-sm text-gray-400 p-6 text-center">Aplique os filtros para gerar a consulta.</p>
        </div>
    </div>
`;

let currentReport   = null;
let currentLocation = '';
let currentFrom     = '';
let currentTo       = '';
let locationsCache  = null;

async function loadLocations() {
    if (locationsCache) return locationsCache;
    const r = await apiCall('/api/inventory/locations');
    locationsCache = (r.data || []).filter(l => l.is_active);
    return locationsCache;
}

function buildQuery(includeFormat) {
    const qs = new URLSearchParams();
    if (currentLocation) qs.set('location_id', currentLocation);
    if (currentFrom)     qs.set('from', currentFrom);
    if (currentTo)       qs.set('to', currentTo);
    if (includeFormat)   qs.set('format', includeFormat);
    return qs.toString() ? `?${qs.toString()}` : '';
}

// Ao clicar num card, abre o painel com os filtros aplicáveis ao relatório.
// O fetch só dispara quando o usuário clica em "Aplicar consulta".
async function openReport(key) {
    const r = REPORTS.find(x => x.key === key);
    if (!r) return;
    currentReport   = r;
    currentLocation = '';
    currentFrom     = '';
    currentTo       = '';
    document.getElementById('reportPanel').classList.remove('hidden');
    document.getElementById('reportPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('reportTitle').textContent = r.label;
    document.getElementById('reportSubtitle').textContent = r.hint;
    document.getElementById('reportTable').innerHTML = '<p class="text-sm text-gray-400 p-6 text-center">Aplique os filtros para gerar a consulta.</p>';
    document.getElementById('reportExportActions').classList.add('hidden');

    // Toggle dos filtros suportados
    document.getElementById('filterLocationWrap').classList.toggle('hidden', !r.supportsLocation);
    document.getElementById('filterFromWrap').classList.toggle('hidden', !r.supportsDateRange);
    document.getElementById('filterToWrap').classList.toggle('hidden', !r.supportsDateRange);

    if (r.supportsLocation) {
        const locs = await loadLocations();
        document.getElementById('filterLocation').innerHTML = '<option value="">Todas (visão global)</option>' +
            locs.map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('');
        document.getElementById('filterLocation').value = '';
    }
    if (r.supportsDateRange) {
        // Default: últimos 30 dias
        const to = new Date();
        const from = new Date(Date.now() - 30 * 86400000);
        document.getElementById('filterFrom').value = from.toISOString().slice(0, 10);
        document.getElementById('filterTo').value   = to.toISOString().slice(0, 10);
    } else {
        document.getElementById('filterFrom').value = '';
        document.getElementById('filterTo').value   = '';
    }
}

async function fetchReportData() {
    const r = currentReport;
    if (!r) return;
    document.getElementById('reportTable').innerHTML = '<p class="text-sm text-gray-400 p-4">Carregando…</p>';
    document.getElementById('reportExportActions').classList.remove('hidden');
    try {
        const res = await apiCall(`/api/inventory${r.endpoint}${buildQuery()}`);
        const rows = res.data || [];
        const columns = res.columns || [];
        const warnings = res.location_warnings || [];
        // Banner de avisos por localização — quando o relatório está em visão
        // global mas existem localizações com itens críticos que ficam mascarados
        // pelo total agregado.
        const warningsHtml = warnings.length > 0 ? `
            <div class="mx-3 mt-3 p-3 rounded-lg border border-amber-200 bg-amber-50">
                <div class="flex items-start gap-2">
                    <i class="fas fa-triangle-exclamation text-amber-600 mt-0.5"></i>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-amber-900">Atenção: localizações com itens críticos</p>
                        <p class="text-xs text-amber-700 mt-0.5">Os totais globais podem estar OK, mas filtre pelas localizações abaixo para ver os itens críticos individualmente.</p>
                        <div class="mt-2 flex flex-col gap-1">
                            ${warnings.map(w => `
                                <button class="warning-loc text-xs text-left flex justify-between items-center px-2 py-1 rounded bg-white border border-amber-100 hover:border-amber-300 transition" data-loc="${w.location_id}">
                                    <span class="text-gray-800 truncate">${escapeHtml(w.unit_name || '')} · ${escapeHtml(w.location_name)}</span>
                                    <span class="ml-2 font-bold text-amber-700 flex-shrink-0">${w.critical_count} ${w.critical_count === 1 ? 'item' : 'itens'}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>` : '';

        if (!rows.length && !warnings.length) {
            document.getElementById('reportTable').innerHTML = '<p class="text-sm text-gray-400 p-6 text-center">Sem dados para este relatório.</p>';
            return;
        }
        const totals = res.totals || null;
        const totalsRow = totals && Object.keys(totals).length ? `
            <tfoot class="border-t-2 border-gray-300 bg-gray-100/70 sticky bottom-0">
                <tr>
                    <!-- "Total" cobre as 2 primeiras colunas (# + Código). Cada
                         coluna seguinte renderiza explicitamente sua célula para
                         manter o alinhamento com o thead. -->
                    <td colspan="2" class="px-3 py-2 text-[10px] uppercase tracking-wider text-gray-700 font-bold">Total</td>
                    ${columns.slice(1).map(c => {
                        const v = totals[c.key];
                        return `<td class="px-3 py-2 text-gray-900 tabular-nums font-bold">${v === undefined || v === null ? '' : escapeHtml(String(v))}</td>`;
                    }).join('')}
                </tr>
            </tfoot>` : '';
        const tableHtml = rows.length ? `
            <table class="w-full text-xs">
                <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 sticky top-0 border-b border-gray-200">
                    <tr>
                        <th class="text-left px-3 py-2.5 font-semibold w-10">#</th>
                        ${columns.map(c => `<th class="text-left px-3 py-2.5 font-semibold">${escapeHtml(c.label || c.key)}</th>`).join('')}
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    ${rows.map((row, idx) => `<tr class="hover:bg-sky-50/30 transition">
                        <td class="px-3 py-2 text-gray-400 tabular-nums font-mono text-[11px]">${idx + 1}</td>
                        ${columns.map(c => {
                            const v = row[c.key];
                            return `<td class="px-3 py-2 text-gray-700 tabular-nums">${v === null || v === undefined ? '<span class="text-gray-300">—</span>' : escapeHtml(String(v))}</td>`;
                        }).join('')}
                    </tr>`).join('')}
                </tbody>
                ${totalsRow}
            </table>` : (warnings.length ? '' : '<p class="text-sm text-gray-400 p-6 text-center">Sem dados na visão global.</p>');
        document.getElementById('reportTable').innerHTML = warningsHtml + tableHtml;
        // Atalho: clicar num aviso filtra direto por essa localização
        document.querySelectorAll('.warning-loc').forEach(b => {
            b.addEventListener('click', () => {
                document.getElementById('filterLocation').value = b.dataset.loc;
                currentLocation = b.dataset.loc;
                fetchReportData();
            });
        });
        const locLabel = currentLocation
            ? ` · ${document.getElementById('filterLocation').selectedOptions[0]?.textContent || '?'}`
            : '';
        document.getElementById('reportSubtitle').textContent = `${r.hint} · ${rows.length} registos${locLabel}`;
    } catch (err) {
        document.getElementById('reportTable').innerHTML = `<p class="text-sm text-red-500 p-4">${escapeHtml(err.message)}</p>`;
    }
}

document.addEventListener('click', (e) => {
    const target = e.target.closest('button');
    if (!target) return;
    if (target.id === 'applyFilters') {
        currentLocation = document.getElementById('filterLocation').value || '';
        currentFrom     = currentReport?.supportsDateRange ? (document.getElementById('filterFrom').value || '') : '';
        currentTo       = currentReport?.supportsDateRange ? (document.getElementById('filterTo').value   || '') : '';
        fetchReportData();
    } else if (target.id === 'resetFilters') {
        if (currentReport?.supportsLocation) document.getElementById('filterLocation').value = '';
        if (currentReport?.supportsDateRange) {
            const to = new Date();
            const from = new Date(Date.now() - 30 * 86400000);
            document.getElementById('filterFrom').value = from.toISOString().slice(0, 10);
            document.getElementById('filterTo').value   = to.toISOString().slice(0, 10);
        }
    }
});

async function downloadCurrent(format) {
    if (!currentReport) return;
    const token = localStorage.getItem('access_token');
    try {
        const res = await fetch(`/api/inventory${currentReport.endpoint}${buildQuery(format)}`, {
            headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Erro ao gerar arquivo');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentReport.key}.${format}`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (err) { toast(err.message, 'error'); }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
