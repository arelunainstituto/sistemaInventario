<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Novo / Editar Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">

<div id="layoutRoot"></div>

<script src="_layout.js"></script>
<script>
const params = new URLSearchParams(location.search);
const editingId = params.get('id');

renderInventoryLayout({
    activePage: 'items',
    title: editingId ? 'Editar Item' : 'Novo Item',
    subtitle: editingId ? 'Atualize os dados do item' : 'Selecione o tipo e preencha o formulário'
});

// Passo 1: seletor de macro categoria (PRIMEIRA OPÇÃO, conforme especificado pelo utilizador)
document.getElementById('pageContent').innerHTML = `
    <div id="step1" class="bg-white rounded-lg shadow p-8 max-w-3xl mx-auto">
        <h3 class="text-lg font-bold text-gray-800 mb-2">Qual o tipo de item?</h3>
        <p class="text-sm text-gray-500 mb-6">Esta escolha define os campos do cadastro e regras de controlo aplicáveis.</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <label class="border-2 border-gray-200 hover:border-blue-500 rounded-lg p-6 cursor-pointer transition" data-macro="consumo">
                <input type="radio" name="macro" value="consumo" class="hidden">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 text-xl">
                        <i class="fas fa-prescription-bottle"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-800">Consumo</h4>
                        <p class="text-sm text-gray-600 mt-1">Material clínico, descartável, administrativo. <strong>Controla lote e validade automaticamente.</strong></p>
                    </div>
                </div>
            </label>
            <label class="border-2 border-gray-200 hover:border-purple-500 rounded-lg p-6 cursor-pointer transition" data-macro="patrimonial">
                <input type="radio" name="macro" value="patrimonial" class="hidden">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 rounded-lg bg-purple-100 flex items-center justify-center text-purple-600 text-xl">
                        <i class="fas fa-laptop-medical"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-800">Equipamento Patrimonial</h4>
                        <p class="text-sm text-gray-600 mt-1">Equipamentos duradouros, mobiliário, informática. <strong>Usa número de série e depreciação.</strong></p>
                    </div>
                </div>
            </label>
        </div>
    </div>

    <div id="step2" class="hidden bg-white rounded-lg shadow p-8 max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h3 class="text-lg font-bold text-gray-800" id="formHeading">Dados do item</h3>
                <p class="text-sm text-gray-500" id="formMacroLabel"></p>
            </div>
            <button id="btnChangeType" class="text-sm text-blue-600 hover:underline ${editingId ? 'hidden' : ''}">
                <i class="fas fa-arrow-left"></i> Trocar tipo
            </button>
        </div>

        <form id="itemForm" class="space-y-6">
            <input type="hidden" name="macro_category" id="macroField">

            <fieldset class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <legend class="text-sm font-bold text-gray-700 mb-3">Dados gerais</legend>
                <div class="md:col-span-2">
                    <label class="block text-xs text-gray-500 mb-1">Nome *</label>
                    <input name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs text-gray-500 mb-1">Descrição</label>
                    <textarea name="description" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Subcategoria</label>
                    <select name="subcategory_id" id="subcategorySelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Ref. fabricante</label>
                    <input name="manufacturer_ref" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Código de barras (opcional)</label>
                    <input name="barcode" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div class="text-xs text-gray-500 self-end">
                    <i class="fas fa-info-circle"></i> Código interno e QR Code são gerados automaticamente.
                </div>
            </fieldset>

            <fieldset class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <legend class="text-sm font-bold text-gray-700 mb-3">Unidades e conversão</legend>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">UoM base *</label>
                    <select name="base_uom_id" id="baseUomSelect" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">UoM de compra</label>
                    <select name="purchase_uom_id" id="purchaseUomSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">UoM de consumo</label>
                    <select name="consumption_uom_id" id="consumptionUomSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Fator de conversão</label>
                    <input name="conversion_factor" type="number" step="0.0001" value="1" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <p class="text-xs text-gray-400 mt-1">Ex.: 1 caixa = 100 unidades → 100</p>
                </div>
            </fieldset>

            <fieldset id="stockFieldset" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <legend class="text-sm font-bold text-gray-700 mb-3">Parâmetros de stock</legend>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Stock mínimo</label>
                    <input name="min_stock" type="number" step="0.0001" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Stock máximo</label>
                    <input name="max_stock" type="number" step="0.0001" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Lead time (dias)</label>
                    <input name="lead_time_days" type="number" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
            </fieldset>

            <!-- Campos exclusivos PATRIMONIAL -->
            <fieldset id="patrimonyFieldset" class="hidden grid-cols-1 md:grid-cols-3 gap-4">
                <legend class="text-sm font-bold text-gray-700 mb-3">Dados patrimoniais</legend>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Data de aquisição</label>
                    <input name="acquisition_date" type="date" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Valor de aquisição (€)</label>
                    <input name="acquisition_value" type="number" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Taxa de depreciação anual (%)</label>
                    <input name="depreciation_rate" type="number" step="0.01" min="0" max="100" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div class="md:col-span-3 text-xs text-gray-500">
                    <i class="fas fa-info-circle"></i> O número de património (PAT-XXXXXX) é gerado automaticamente.
                </div>
            </fieldset>

            <fieldset>
                <legend class="text-sm font-bold text-gray-700 mb-3">Imagem (opcional)</legend>
                <input id="imageFile" type="file" accept="image/*" class="text-sm">
                <p id="imagePreview" class="mt-2"></p>
            </fieldset>

            <div class="flex gap-3 justify-end border-t border-gray-100 pt-4">
                <a href="items.html" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</a>
                <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">
                    <i class="fas fa-save"></i> ${editingId ? 'Salvar alterações' : 'Criar item'}
                </button>
            </div>
        </form>
    </div>
`;

const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const macroField = document.getElementById('macroField');
const subcategorySelect = document.getElementById('subcategorySelect');
const patrimonyFieldset = document.getElementById('patrimonyFieldset');

// Seleção do tipo macro
document.querySelectorAll('[data-macro]').forEach(label => {
    label.addEventListener('click', () => activateMacro(label.dataset.macro));
});

document.getElementById('btnChangeType').addEventListener('click', () => {
    step2.classList.add('hidden');
    step1.classList.remove('hidden');
});

let categoriesAll = [];
let uomsAll = [];

async function bootstrap() {
    try {
        const [cats, uoms] = await Promise.all([
            apiCall('/api/inventory/categories'),
            apiCall('/api/inventory/uoms')
        ]);
        categoriesAll = cats.data;
        uomsAll = uoms.data;
        for (const id of ['baseUomSelect','purchaseUomSelect','consumptionUomSelect']) {
            const sel = document.getElementById(id);
            sel.innerHTML = (id === 'baseUomSelect' ? '' : '<option value="">—</option>')
                + uomsAll.map(u => `<option value="${u.id}">${escapeHtml(u.name)} (${escapeHtml(u.code)})</option>`).join('');
        }
        if (editingId) await loadForEdit();
    } catch (err) { toast(err.message, 'error'); }
}

function activateMacro(macro) {
    macroField.value = macro;
    document.getElementById('formMacroLabel').textContent =
        macro === 'consumo' ? 'Consumo · controla lote e validade' : 'Patrimonial · controla nº de série e depreciação';
    // Filtra subcategorias
    subcategorySelect.innerHTML = '<option value="">—</option>' +
        categoriesAll.filter(c => c.parent_macro === macro)
                     .map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    // Mostra/esconde fieldset patrimonial
    if (macro === 'patrimonial') patrimonyFieldset.classList.remove('hidden');
    else                          patrimonyFieldset.classList.add('hidden');
    step1.classList.add('hidden');
    step2.classList.remove('hidden');
}

async function loadForEdit() {
    try {
        const res = await apiCall(`/api/inventory/items/${editingId}`);
        const it = res.data;
        activateMacro(it.macro_category);
        const f = document.getElementById('itemForm');
        for (const [k, v] of Object.entries(it)) {
            const el = f.elements[k];
            if (el && v !== null && v !== undefined) el.value = v;
        }
        if (it.image_url) {
            document.getElementById('imagePreview').innerHTML =
                `<img src="${it.image_url}" class="h-24 rounded border border-gray-200">`;
        }
    } catch (err) { toast(err.message, 'error'); }
}

// Em modo edição: esconde o seletor de tipo imediatamente para evitar
// o flash do passo 1 antes do passo 2 montar.
if (editingId) {
    step1.classList.add('hidden');
    step2.classList.remove('hidden');
}

document.getElementById('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    const payload = {};
    for (const el of f.elements) {
        if (!el.name) continue;
        let v = el.value;
        if (v === '') v = null;
        if (el.type === 'number' && v !== null) v = parseFloat(v);
        payload[el.name] = v;
    }
    try {
        let saved;
        if (editingId) {
            const r = await apiCall(`/api/inventory/items/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) });
            saved = r.data;
        } else {
            const r = await apiCall('/api/inventory/items', { method: 'POST', body: JSON.stringify(payload) });
            saved = r.data;
        }
        // Upload de imagem (se selecionada)
        const file = document.getElementById('imageFile').files[0];
        if (file) {
            const fd = new FormData();
            fd.append('image', file);
            await apiCall(`/api/inventory/items/${saved.id}/image`, { method: 'POST', body: fd });
        }
        toast('Item salvo com sucesso');
        setTimeout(() => location.href = 'items.html', 800);
    } catch (err) {
        toast(err.message, 'error');
    }
});

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

bootstrap();
</script>
</body>
</html>
