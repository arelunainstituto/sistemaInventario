<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Novo / Editar Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
    <style>
        body{font-family:'Inter',system-ui,sans-serif}
        .field-label{display:block;font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
        .field-input{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;transition:all 150ms}
        .field-input:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,0.15)}
    </style>
</head>
<body class="bg-white">

<div id="layoutRoot"></div>

<script src="_layout.js"></script>
<script>
const params = new URLSearchParams(location.search);
const editingId = params.get('id');

renderInventoryLayout({
    activePage: 'items',
    title: editingId ? 'Editar Item' : 'Novo Item',
    subtitle: editingId ? 'Atualize os dados do item' : 'Selecione o tipo e preencha o formulário'
});

document.getElementById('pageContent').innerHTML = `
    <div id="step1" class="bg-white border border-gray-200/70 rounded-xl shadow-sm p-8 max-w-3xl mx-auto">
        <div class="text-center mb-8">
            <h3 class="text-xl font-bold text-gray-900">Qual o tipo de item?</h3>
            <p class="text-sm text-gray-500 mt-1.5">Esta escolha define os campos do cadastro e regras de controlo aplicáveis.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <label class="group border-2 border-gray-200 hover:border-sky-500 hover:bg-sky-50/30 rounded-xl p-6 cursor-pointer transition-all" data-macro="consumo">
                <input type="radio" name="macro" value="consumo" class="hidden">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 rounded-xl bg-sky-50 group-hover:bg-sky-100 flex items-center justify-center text-sky-600 text-xl transition">
                        <i class="fas fa-prescription-bottle"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-900">Consumo</h4>
                        <p class="text-sm text-gray-600 mt-1 leading-relaxed">Material clínico, descartável, administrativo.</p>
                        <p class="text-xs text-sky-700 mt-2 font-medium">⚡ Controla lote e validade automaticamente</p>
                    </div>
                </div>
            </label>
            <label class="group border-2 border-gray-200 hover:border-purple-500 hover:bg-purple-50/30 rounded-xl p-6 cursor-pointer transition-all" data-macro="patrimonial">
                <input type="radio" name="macro" value="patrimonial" class="hidden">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 rounded-xl bg-purple-50 group-hover:bg-purple-100 flex items-center justify-center text-purple-600 text-xl transition">
                        <i class="fas fa-laptop-medical"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-900">Equipamento Patrimonial</h4>
                        <p class="text-sm text-gray-600 mt-1 leading-relaxed">Equipamentos duradouros, mobiliário, informática.</p>
                        <p class="text-xs text-purple-700 mt-2 font-medium">⚡ Usa número de série e depreciação</p>
                    </div>
                </div>
            </label>
        </div>
    </div>

    <div id="step2" class="hidden bg-white border border-gray-200/70 rounded-xl shadow-sm p-8 max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-100">
            <div>
                <h3 class="text-lg font-bold text-gray-900" id="formHeading">Dados do item</h3>
                <p class="text-xs text-gray-500 mt-0.5" id="formMacroLabel"></p>
            </div>
            <button id="btnChangeType" class="text-sm text-sky-600 hover:text-sky-700 font-medium ${editingId ? 'hidden' : ''}">
                <i class="fas fa-arrow-left text-xs"></i> Trocar tipo
            </button>
        </div>

        <form id="itemForm" class="space-y-7">
            <input type="hidden" name="macro_category" id="macroField">

            <section>
                <h4 class="text-[10px] uppercase tracking-wider font-bold text-gray-500 mb-3">Dados gerais</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="field-label">Nome <span class="text-red-500">*</span></label>
                        <input name="name" required class="field-input">
                    </div>
                    <div class="md:col-span-2">
                        <label class="field-label">Descrição</label>
                        <textarea name="description" rows="2" class="field-input"></textarea>
                    </div>
                    <div>
                        <label class="field-label">Subcategoria</label>
                        <select name="subcategory_id" id="subcategorySelect" class="field-input"></select>
                    </div>
                    <div>
                        <label class="field-label">Ref. fabricante</label>
                        <input name="manufacturer_ref" class="field-input">
                    </div>
                    <div>
                        <label class="field-label">Código de barras</label>
                        <input name="barcode" class="field-input">
                    </div>
                    <div class="flex items-end">
                        <p class="text-[11px] text-gray-500 bg-sky-50/50 border border-sky-100 rounded-lg px-3 py-2 flex items-start gap-2">
                            <i class="fas fa-circle-info text-sky-500 mt-0.5"></i>
                            <span>Código interno e QR Code são gerados automaticamente.</span>
                        </p>
                    </div>
                </div>
            </section>

            <section>
                <h4 class="text-[10px] uppercase tracking-wider font-bold text-gray-500 mb-3">Unidades e conversão</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="field-label">UoM base <span class="text-red-500">*</span></label>
                        <select name="base_uom_id" id="baseUomSelect" required class="field-input"></select>
                    </div>
                    <div>
                        <label class="field-label">UoM de compra</label>
                        <select name="purchase_uom_id" id="purchaseUomSelect" class="field-input"></select>
                    </div>
                    <div>
                        <label class="field-label">UoM de consumo</label>
                        <select name="consumption_uom_id" id="consumptionUomSelect" class="field-input"></select>
                    </div>
                    <div>
                        <label class="field-label">Fator de conversão</label>
                        <input name="conversion_factor" type="number" step="0.0001" value="1" class="field-input">
                        <p class="text-[11px] text-gray-400 mt-1.5">Ex.: 1 caixa = 100 unidades → 100</p>
                    </div>
                </div>
            </section>

            <section id="stockFieldset">
                <h4 class="text-[10px] uppercase tracking-wider font-bold text-gray-500 mb-3">Parâmetros de stock (padrão global)</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="field-label">Stock mínimo</label>
                        <input name="min_stock" type="number" step="0.0001" value="0" class="field-input">
                    </div>
                    <div>
                        <label class="field-label">Stock máximo</label>
                        <input name="max_stock" type="number" step="0.0001" class="field-input">
                    </div>
                    <div>
                        <label class="field-label">Tempo de reposição (dias)</label>
                        <input name="lead_time_days" type="number" value="0" class="field-input">
                    </div>
                </div>
                <p class="text-[11px] text-gray-500 bg-sky-50/50 border border-sky-100 rounded-lg px-3 py-2 mt-3 flex items-start gap-2">
                    <i class="fas fa-circle-info text-sky-500 mt-0.5"></i>
                    <span>Estes valores valem para <strong>todas as localizações</strong> que não tiverem override personalizado abaixo.</span>
                </p>
            </section>

            <section id="locationParamsFieldset" class="hidden">
                <h4 class="text-[10px] uppercase tracking-wider font-bold text-gray-500 mb-3">Parâmetros por localização</h4>
                <p class="text-[11px] text-gray-500 mb-3">
                    Deixe os campos vazios para herdar do padrão global. Útil quando o consumo difere entre as unidades.
                </p>
                <div id="locationParamsRows" class="space-y-2">
                    <p class="text-xs text-gray-400 italic">Salve o item primeiro para gerenciar parâmetros por localização.</p>
                </div>
            </section>

            <section id="patrimonyFieldset" class="hidden">
                <h4 class="text-[10px] uppercase tracking-wider font-bold text-purple-600 mb-3">Dados patrimoniais</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="field-label">Data de aquisição</label>
                        <input name="acquisition_date" type="date" class="field-input">
                    </div>
                    <div>
                        <label class="field-label">Valor de aquisição (€)</label>
                        <input name="acquisition_value" type="number" step="0.01" class="field-input">
                    </div>
                    <div>
                        <label class="field-label">Taxa de depreciação anual (%)</label>
                        <input name="depreciation_rate" type="number" step="0.01" min="0" max="100" class="field-input">
                    </div>
                </div>
                <p class="text-[11px] text-gray-500 bg-purple-50/50 border border-purple-100 rounded-lg px-3 py-2 mt-3 flex items-start gap-2">
                    <i class="fas fa-circle-info text-purple-500 mt-0.5"></i>
                    <span>O número de património (PAT-XXXXXX) é gerado automaticamente ao criar o item.</span>
                </p>
            </section>

            <section>
                <h4 class="text-[10px] uppercase tracking-wider font-bold text-gray-500 mb-3">Imagem</h4>
                <label class="border-2 border-dashed border-gray-200 rounded-lg p-4 block cursor-pointer hover:border-sky-400 hover:bg-sky-50/30 transition">
                    <input id="imageFile" type="file" accept="image/*" class="text-sm w-full">
                </label>
                <div id="imagePreview" class="mt-3"></div>
            </section>

            <div class="flex gap-3 justify-end border-t border-gray-100 pt-5">
                <a href="items.html" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition">Cancelar</a>
                <button type="submit" class="px-5 py-2 bg-sky-600 hover:bg-sky-700 text-white rounded-lg text-sm font-medium shadow-sm shadow-sky-500/20 transition flex items-center gap-2">
                    <i class="fas fa-save text-xs"></i> ${editingId ? 'Salvar alterações' : 'Criar item'}
                </button>
            </div>
        </form>
    </div>
`;

const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const macroField = document.getElementById('macroField');
const subcategorySelect = document.getElementById('subcategorySelect');
const patrimonyFieldset = document.getElementById('patrimonyFieldset');

document.querySelectorAll('[data-macro]').forEach(label => {
    label.addEventListener('click', () => activateMacro(label.dataset.macro));
});

document.getElementById('btnChangeType').addEventListener('click', () => {
    step2.classList.add('hidden');
    step1.classList.remove('hidden');
});

let categoriesAll = [];
let uomsAll = [];
let locationsAll = [];

async function bootstrap() {
    try {
        const [cats, uoms, locs] = await Promise.all([
            apiCall('/api/inventory/categories'),
            apiCall('/api/inventory/uoms'),
            apiCall('/api/inventory/locations')
        ]);
        categoriesAll = cats.data;
        uomsAll       = uoms.data;
        locationsAll  = (locs.data || []).filter(l => l.is_active);
        for (const id of ['baseUomSelect','purchaseUomSelect','consumptionUomSelect']) {
            const sel = document.getElementById(id);
            sel.innerHTML = (id === 'baseUomSelect' ? '' : '<option value="">—</option>')
                + uomsAll.map(u => `<option value="${u.id}">${escapeHtml(u.name)} (${escapeHtml(u.code)})</option>`).join('');
        }
        if (editingId) await loadForEdit();
    } catch (err) { toast(err.message, 'error'); }
}

function activateMacro(macro) {
    macroField.value = macro;
    const isConsumo = macro === 'consumo';
    document.getElementById('formMacroLabel').innerHTML = isConsumo
        ? '<span class="inline-flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-sky-500"></span>Consumo · controla lote e validade</span>'
        : '<span class="inline-flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-purple-500"></span>Patrimonial · controla nº de série e depreciação</span>';
    subcategorySelect.innerHTML = '<option value="">—</option>' +
        categoriesAll.filter(c => c.parent_macro === macro)
                     .map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    patrimonyFieldset.classList.toggle('hidden', macro !== 'patrimonial');
    // Overrides por localização só fazem sentido para consumo
    document.getElementById('locationParamsFieldset').classList.toggle('hidden', !isConsumo);
    step1.classList.add('hidden');
    step2.classList.remove('hidden');
}

// Renderiza a tabela de overrides por localização (apenas no modo edit)
function renderLocationParams(effectiveParams) {
    const container = document.getElementById('locationParamsRows');
    if (!editingId) {
        container.innerHTML = '<p class="text-xs text-gray-400 italic">Salve o item primeiro para gerenciar parâmetros por localização.</p>';
        return;
    }
    const byLoc = new Map();
    for (const ep of (effectiveParams || [])) byLoc.set(ep.location_id, ep);

    container.innerHTML = `
        <div class="overflow-x-auto">
        <table class="w-full text-xs">
            <thead class="bg-gray-50/60 text-[10px] uppercase tracking-wider text-gray-500">
                <tr>
                    <th class="text-left p-2">Localização</th>
                    <th class="text-right p-2">Min</th>
                    <th class="text-right p-2">Max</th>
                    <th class="text-right p-2">Lead time (d)</th>
                    <th class="text-right p-2">Janela cons. (d)</th>
                    <th class="text-center p-2">Estado</th>
                    <th class="text-center p-2"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                ${locationsAll.map(l => {
                    const ep = byLoc.get(l.id) || {};
                    return `
                    <tr data-location-id="${l.id}" class="hover:bg-sky-50/30">
                        <td class="p-2">
                            <div class="font-medium text-gray-900">${escapeHtml(l.name)}</div>
                            <div class="text-[10px] text-gray-500">${escapeHtml(l.unit?.name || '')}</div>
                        </td>
                        <td class="p-2"><input type="number" step="0.0001" class="lp-min w-24 px-2 py-1 border border-gray-200 rounded text-right text-xs" placeholder="${ep.source_min_stock === 'item' ? ep.min_stock : '—'}" value="${ep.source_min_stock === 'location' ? ep.min_stock : ''}"></td>
                        <td class="p-2"><input type="number" step="0.0001" class="lp-max w-24 px-2 py-1 border border-gray-200 rounded text-right text-xs" placeholder="${ep.source_max_stock === 'item' && ep.max_stock != null ? ep.max_stock : '—'}" value="${ep.source_max_stock === 'location' ? ep.max_stock : ''}"></td>
                        <td class="p-2"><input type="number" step="1" class="lp-lead w-24 px-2 py-1 border border-gray-200 rounded text-right text-xs" placeholder="${ep.source_lead_time_days === 'item' ? ep.lead_time_days : '—'}" value="${ep.source_lead_time_days === 'location' ? ep.lead_time_days : ''}"></td>
                        <td class="p-2">
                            <select class="lp-window w-28 px-2 py-1 border border-gray-200 rounded text-right text-xs">
                                <option value="">herda (${ep.consumption_window_days}d)</option>
                                <option value="30"  ${ep.source_window_days === 'location' && ep.consumption_window_days == 30  ? 'selected' : ''}>30 dias</option>
                                <option value="60"  ${ep.source_window_days === 'location' && ep.consumption_window_days == 60  ? 'selected' : ''}>60 dias</option>
                                <option value="90"  ${ep.source_window_days === 'location' && ep.consumption_window_days == 90  ? 'selected' : ''}>90 dias</option>
                                <option value="180" ${ep.source_window_days === 'location' && ep.consumption_window_days == 180 ? 'selected' : ''}>180 dias</option>
                                <option value="365" ${ep.source_window_days === 'location' && ep.consumption_window_days == 365 ? 'selected' : ''}>365 dias</option>
                            </select>
                        </td>
                        <td class="p-2 text-center">
                            ${ep.is_override
                                ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-sky-100 text-sky-700 text-[10px] font-medium">Override</span>'
                                : '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 text-[10px]">Herda</span>'
                            }
                        </td>
                        <td class="p-2 text-center">
                            ${ep.is_override
                                ? `<button type="button" onclick="removeOverride('${l.id}')" class="text-red-500 hover:text-red-700" title="Voltar a herdar do padrão"><i class="fas fa-undo text-[11px]"></i></button>`
                                : ''
                            }
                        </td>
                    </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
        </div>
    `;
}

async function removeOverride(locationId) {
    if (!confirm('Voltar a herdar do padrão global para esta localização?')) return;
    try {
        await apiCall(`/api/inventory/items/${editingId}/location-params/${locationId}`, { method: 'DELETE' });
        toast('Override removido');
        await loadForEdit();
    } catch (err) { toast(err.message, 'error'); }
}

// Lê inputs da tabela e devolve apenas as linhas que têm pelo menos 1 valor
function collectLocationOverrides() {
    const out = [];
    document.querySelectorAll('#locationParamsRows tr[data-location-id]').forEach(tr => {
        const min   = tr.querySelector('.lp-min').value;
        const max   = tr.querySelector('.lp-max').value;
        const lead  = tr.querySelector('.lp-lead').value;
        const win   = tr.querySelector('.lp-window').value;
        if (min === '' && max === '' && lead === '' && win === '') return;
        out.push({
            location_id:             tr.dataset.locationId,
            min_stock:               min  !== '' ? parseFloat(min)  : null,
            max_stock:               max  !== '' ? parseFloat(max)  : null,
            lead_time_days:          lead !== '' ? parseInt(lead)   : null,
            consumption_window_days: win  !== '' ? parseInt(win)    : null
        });
    });
    return out;
}

async function loadForEdit() {
    try {
        const res = await apiCall(`/api/inventory/items/${editingId}`);
        const it = res.data;
        activateMacro(it.macro_category);
        const f = document.getElementById('itemForm');
        for (const [k, v] of Object.entries(it)) {
            const el = f.elements[k];
            if (el && v !== null && v !== undefined) el.value = v;
        }
        if (it.image_url) {
            document.getElementById('imagePreview').innerHTML =
                `<img src="${it.image_url}" class="h-24 rounded-lg border border-gray-200 object-cover">`;
        }
        // Fase 4.3: tabela de parâmetros por localização (apenas consumo)
        if (it.macro_category === 'consumo') {
            renderLocationParams(it.location_params || []);
        }
    } catch (err) { toast(err.message, 'error'); }
}

if (editingId) {
    step1.classList.add('hidden');
    step2.classList.remove('hidden');
}

document.getElementById('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    const payload = {};
    for (const el of f.elements) {
        if (!el.name) continue;
        let v = el.value;
        if (v === '') v = null;
        if (el.type === 'number' && v !== null) v = parseFloat(v);
        payload[el.name] = v;
    }
    try {
        let saved;
        if (editingId) {
            const r = await apiCall(`/api/inventory/items/${editingId}`, { method: 'PUT', body: JSON.stringify(payload) });
            saved = r.data;
        } else {
            const r = await apiCall('/api/inventory/items', { method: 'POST', body: JSON.stringify(payload) });
            saved = r.data;
        }
        const file = document.getElementById('imageFile').files[0];
        if (file) {
            const fd = new FormData();
            fd.append('image', file);
            await apiCall(`/api/inventory/items/${saved.id}/image`, { method: 'POST', body: fd });
        }
        // Fase 4.3: salva overrides por localização (apenas consumo + modo edit)
        if (editingId && payload.macro_category === 'consumo') {
            const overrides = collectLocationOverrides();
            for (const ov of overrides) {
                const { location_id, ...body } = ov;
                try {
                    await apiCall(`/api/inventory/items/${saved.id}/location-params/${location_id}`, {
                        method: 'PUT',
                        body: JSON.stringify(body)
                    });
                } catch (err) {
                    console.error('Falha ao salvar override', location_id, err);
                    toast(`Override para localização falhou: ${err.message}`, 'error');
                }
            }
        }
        toast('Item guardado com sucesso');
        setTimeout(() => location.href = 'items.html', 800);
    } catch (err) {
        toast(err.message, 'error');
    }
});

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

bootstrap();
</script>
</body>
</html>
