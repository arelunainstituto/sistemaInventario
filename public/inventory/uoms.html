<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Unidades de medida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({ activePage: 'uoms', title: 'Unidades de Medida', subtitle: 'UoMs para compra/consumo (un, kg, l, caixa…)' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-end mb-4">
        <button onclick="openForm(null)" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus"></i> Nova UoM</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                <tr><th class="text-left p-3">Código</th><th class="text-left p-3">Nome</th><th class="text-center p-3">Estado</th><th class="p-3"></th></tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-50"></tbody>
        </table>
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-md w-full mx-4">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 id="modalTitle" class="font-bold text-gray-800">—</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="modalForm" class="p-6 space-y-3"></form>
        </div>
    </div>
`;

async function load() {
    try {
        const r = await apiCall('/api/inventory/uoms?include_inactive=1');
        document.getElementById('tbody').innerHTML = r.data.map(u => `
            <tr class="hover:bg-sky-50/30 transition">
                <td class="p-3 font-mono">${escapeHtml(u.code)}</td>
                <td class="p-3">${escapeHtml(u.name)}</td>
                <td class="p-3 text-center">${u.is_active ? '<span class="text-sky-600">●</span>' : '<span class="text-gray-300">●</span>'}</td>
                <td class="p-3 text-right"><button onclick='openForm(${JSON.stringify(u)})' class="text-sky-600 hover:text-sky-700"><i class="fas fa-edit"></i></button></td>
            </tr>`).join('') || '<tr><td colspan="4" class="p-6 text-center text-gray-400">Nenhuma UoM.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function openForm(u) {
    document.getElementById('modalTitle').textContent = u ? 'Editar UoM' : 'Nova UoM';
    document.getElementById('modalForm').innerHTML = `
        <div><label class="text-xs text-gray-500">Código *</label><input name="code" required ${u?'readonly':''} value="${u?.code || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
        <div><label class="text-xs text-gray-500">Nome *</label><input name="name" required value="${u?.name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_active" ${(!u || u.is_active) ? 'checked' : ''}> Ativa</label>
        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-700 text-white py-2.5 rounded-lg text-sm font-medium shadow-sm shadow-sky-500/20 transition">Salvar</button>`;
    document.getElementById('modalForm').onsubmit = async e => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        fd.is_active = !!fd.is_active;
        try {
            if (u) await apiCall(`/api/inventory/uoms/${u.id}`, { method:'PUT', body: JSON.stringify(fd) });
            else   await apiCall('/api/inventory/uoms', { method:'POST', body: JSON.stringify(fd) });
            closeModal(); toast('UoM salva'); load();
        } catch (err) { toast(err.message, 'error'); }
    };
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

load();
</script>
</body>
</html>
