<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>
        if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }
    </script>
    <style>body{font-family:'Inter',system-ui,sans-serif;font-feature-settings:'cv11','ss01'}</style>
</head>
<body class="bg-white">

<div id="layoutRoot"></div>

<script src="_layout.js"></script>
<script>
    renderInventoryLayout({
        activePage: 'dashboard',
        title: 'Dashboard',
        subtitle: 'Visão geral do inventário'
    });

    const CARDS_CONFIG = [
        { key: 'total_items',    label: 'Total de itens',     icon: 'fa-boxes-stacked',          color: 'sky',    prefix: '' },
        { key: 'active_items',   label: 'Ativos',              icon: 'fa-check-circle',           color: 'sky',    prefix: '' },
        { key: 'below_min',      label: 'Abaixo do mínimo',    icon: 'fa-triangle-exclamation',  color: 'amber',  prefix: '' },
        { key: 'total_value',    label: 'Valor total',         icon: 'fa-euro-sign',              color: 'purple', prefix: '€ ' },
        { key: 'avg_coverage',   label: 'Cobertura (dias)',    icon: 'fa-clock',                  color: 'cyan',   prefix: '' },
        { key: 'expiring_count', label: 'Lotes vencendo',      icon: 'fa-hourglass-half',         color: 'orange', prefix: '' }
    ];

    document.getElementById('pageContent').innerHTML = `
        <div class="flex flex-wrap items-center gap-3 mb-5">
            <div class="flex items-center gap-2">
                <i class="fas fa-location-dot text-gray-400 text-xs"></i>
                <select id="locFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500 transition">
                    <option value="">Todas as unidades</option>
                </select>
            </div>
            <span id="locFilterHint" class="text-[11px] text-gray-400"></span>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
            ${CARDS_CONFIG.map(c => kpiCard(c)).join('')}
        </div>

        <div id="byLocationSection" class="hidden mb-6">
            <div class="flex items-center justify-between mb-2">
                <p class="text-[10px] uppercase tracking-wider font-bold text-gray-500">Itens abaixo do mínimo por localização</p>
                <div class="flex items-center gap-3 text-[11px]">
                    <button onclick="expandAllUnits()" class="text-sky-600 hover:text-sky-700">Expandir tudo</button>
                    <button onclick="collapseAllUnits()" class="text-gray-400 hover:text-gray-600">Recolher tudo</button>
                </div>
            </div>
            <div id="byLocationList" class="space-y-2"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
            ${section('criticalItems',    'Itens críticos',         'fa-flag',                  'red',     'abaixo do mínimo')}
            ${section('recentEntries',    'Últimas entradas',       'fa-arrow-right-to-bracket', 'sky',     'recepções de materiais')}
            ${section('recentExits',      'Últimas saídas',         'fa-arrow-right-from-bracket', 'red',  'consumos e perdas')}
            ${section('recentTransfers',  'Últimas transferências', 'fa-right-left',            'indigo',  'movimentos internos')}
        </div>
    `;

    let currentLoc = '';      // '' = todas
    let allByLocation = [];   // cache do breakdown por localização (1º load "Todas")

    function kpiCard({ key, label, icon, color, prefix }) {
        return `<div class="group bg-white rounded-xl border border-gray-200/70 shadow-sm hover:shadow hover:border-gray-300 transition-all p-4">
            <div class="flex items-start justify-between gap-3">
                <div class="min-w-0 flex-1">
                    <p class="text-[10px] uppercase tracking-wider text-gray-500 font-semibold truncate">${label}</p>
                    <p class="text-2xl font-bold text-gray-900 mt-1.5 tabular-nums" data-card="${key}" data-prefix="${prefix}">—</p>
                </div>
                <div class="w-9 h-9 rounded-lg bg-${color}-50 flex items-center justify-center text-${color}-600 flex-shrink-0">
                    <i class="fas ${icon} text-sm"></i>
                </div>
            </div>
        </div>`;
    }

    function section(id, title, icon, color, subtitle) {
        return `<section class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex items-start justify-between">
                <div>
                    <h3 class="font-bold text-gray-900 flex items-center gap-2 text-sm">
                        <i class="fas ${icon} text-${color}-500"></i> ${title}
                    </h3>
                    <p class="text-[11px] text-gray-500 mt-0.5">${subtitle}</p>
                </div>
            </div>
            <div id="${id}" class="px-5 py-3 text-sm text-gray-500">
                <div class="py-6 text-center text-xs text-gray-400">Carregando…</div>
            </div>
        </section>`;
    }

    async function loadDashboard() {
        try {
            // Stats são afetadas pelo filtro de localização; as listas de
            // entradas/saídas/transferências hoje não filtram (próxima fase).
            const qs = currentLoc ? `?location_id=${currentLoc}` : '';
            const [stats, entries, exits, transfers] = await Promise.all([
                apiCall(`/api/inventory/stats/summary${qs}`),
                apiCall('/api/inventory/entries?limit=5'),
                apiCall('/api/inventory/exits?limit=5'),
                apiCall('/api/inventory/transfers?limit=5')
            ]);

            setCard('total_items',    stats.data.total_items);
            setCard('active_items',   stats.data.active_items);
            setCard('below_min',      stats.data.below_min);
            setCard('total_value',    Number(stats.data.total_value).toFixed(2));
            setCard('avg_coverage',   stats.data.avg_coverage !== null ? stats.data.avg_coverage : '—');
            setCard('expiring_count', stats.data.expiring_count);

            // Cache do breakdown (vem no load "Todas") e popula o filtro 1x
            if (stats.data.by_location) allByLocation = stats.data.by_location;
            const filterSel = document.getElementById('locFilter');
            if (allByLocation.length && !filterSel.dataset.populated) {
                renderLocationFilter(allByLocation);
                filterSel.dataset.populated = '1';
            }
            updateLocHint();

            // Breakdown por localização: LISTA ANINHADA (Unidade → Localizações),
            // mostrada apenas na visão "Todas".
            const byLocSection = document.getElementById('byLocationSection');
            if (!currentLoc && allByLocation.length) {
                byLocSection.classList.remove('hidden');
                document.getElementById('byLocationList').innerHTML = renderByLocation(allByLocation);
                document.querySelectorAll('#byLocationList .loc-row').forEach(b => {
                    b.addEventListener('click', () => switchLoc(b.dataset.loc));
                });
            } else {
                byLocSection.classList.add('hidden');
            }

            document.getElementById('criticalItems').innerHTML = stats.data.critical_items.length
                ? stats.data.critical_items.map(i => `
                    <div class="flex justify-between items-center py-2.5 border-b border-gray-50 last:border-0">
                        <div class="min-w-0 flex-1 mr-3">
                            <p class="text-sm text-gray-800 truncate font-medium">${escapeHtml(i.name)}</p>
                            <p class="text-[11px] font-mono text-gray-400">${escapeHtml(i.internal_code)}${i.location_name ? ' · ' + escapeHtml(i.location_name) : ''}</p>
                        </div>
                        <span class="text-xs ${i.stock === 0 ? 'text-red-600 font-bold' : 'text-amber-600'} tabular-nums flex-shrink-0">${i.stock.toFixed(0)} / ${i.min_stock.toFixed(0)}</span>
                    </div>`).join('')
                : emptyState('check', 'sky', 'Nenhum item abaixo do mínimo.');

            document.getElementById('recentEntries').innerHTML = entries.data.length
                ? entries.data.map(e => `<div class="flex justify-between items-center py-2.5 border-b border-gray-50 last:border-0">
                    <div class="min-w-0 flex-1 mr-3">
                        <p class="text-sm text-gray-800 truncate font-medium">${escapeHtml(e.supplier?.name || '—')}</p>
                        <p class="text-[11px] font-mono text-gray-400">${escapeHtml(e.document_number)}</p>
                    </div>
                    <span class="text-xs text-gray-500 tabular-nums flex-shrink-0">${formatShortDate(e.document_date)}</span>
                </div>`).join('')
                : emptyState('inbox', 'gray', 'Sem entradas registadas.');

            document.getElementById('recentExits').innerHTML = exits.data.length
                ? exits.data.map(m => `<div class="flex justify-between items-center py-2.5 border-b border-gray-50 last:border-0">
                    <div class="min-w-0 flex-1 mr-3">
                        <p class="text-sm text-gray-800 truncate font-medium">${escapeHtml(m.item?.name || '—')}</p>
                        <p class="text-[11px] text-gray-400">${escapeHtml(m.subtype)} · ${formatShortDate(m.occurred_at)}</p>
                    </div>
                    <span class="text-xs font-semibold text-red-600 tabular-nums flex-shrink-0">−${parseFloat(m.quantity).toFixed(0)}</span>
                </div>`).join('')
                : emptyState('inbox', 'gray', 'Sem saídas registadas.');

            document.getElementById('recentTransfers').innerHTML = transfers.data.length
                ? transfers.data.map(m => `<div class="flex justify-between items-center py-2.5 border-b border-gray-50 last:border-0">
                    <div class="min-w-0 flex-1 mr-3">
                        <p class="text-sm text-gray-800 truncate font-medium">${escapeHtml(m.item?.name || '—')}</p>
                        <p class="text-[11px] text-gray-400 truncate">${escapeHtml(m.from_location?.name || '')} <i class="fas fa-arrow-right text-[8px] mx-0.5"></i> ${escapeHtml(m.to_location?.name || '')}</p>
                    </div>
                    <span class="text-xs text-gray-500 tabular-nums flex-shrink-0">${parseFloat(m.quantity).toFixed(0)}</span>
                </div>`).join('')
                : emptyState('inbox', 'gray', 'Sem transferências registadas.');
        } catch (err) {
            toast(err.message, 'error');
        }
    }

    // Agrupa o breakdown por unidade, com totais por unidade, ordenado pelos
    // que têm mais itens abaixo do mínimo.
    function groupByUnit(byLoc) {
        const m = new Map();
        for (const g of byLoc) {
            const u = g.unit_name || '—';
            if (!m.has(u)) m.set(u, []);
            m.get(u).push(g);
        }
        return [...m.entries()].map(([unit, locs]) => ({
            unit, locs,
            totalBelow: locs.reduce((a, l) => a + (l.below_min || 0), 0),
            totalItems: locs.reduce((a, l) => a + (l.items_total || 0), 0)
        })).sort((a, b) => b.totalBelow - a.totalBelow);
    }

    // Filtro: select nativo agrupado por unidade (<optgroup>) — compacto e
    // escala para qualquer número de localizações.
    function renderLocationFilter(byLoc) {
        const sel = document.getElementById('locFilter');
        let html = '<option value="">Todas as unidades</option>';
        for (const { unit, locs } of groupByUnit(byLoc)) {
            html += `<optgroup label="${escapeHtml(unit)}">`
                + locs.map(l => `<option value="${l.location_id}">${escapeHtml(l.location_name)}${l.below_min > 0 ? ` — ${l.below_min} abaixo` : ''}</option>`).join('')
                + '</optgroup>';
        }
        sel.innerHTML = html;
        sel.value = currentLoc;
        sel.onchange = () => switchLoc(sel.value);
    }

    // Breakdown como LISTA ANINHADA: cada unidade é um cartão recolhível com as
    // suas localizações listadas dentro (cada uma clicável → vira filtro).
    function renderByLocation(byLoc) {
        return groupByUnit(byLoc).map((u, idx) => `
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
                <button type="button" onclick="toggleUnit(${idx})" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition text-left">
                    <i class="fas fa-chevron-down text-[10px] text-gray-400 transition-transform" data-unit-chevron="${idx}"></i>
                    <i class="fas fa-building text-gray-400 text-sm"></i>
                    <span class="font-semibold text-gray-800 text-sm flex-1">${escapeHtml(u.unit)}</span>
                    <span class="text-[11px] text-gray-400">${u.locs.length} localizaç${u.locs.length === 1 ? 'ão' : 'ões'}</span>
                    ${u.totalBelow > 0
                        ? `<span class="inline-flex items-center justify-center min-w-[1.75rem] px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[11px] font-bold tabular-nums">${u.totalBelow}</span>`
                        : '<span class="text-[11px] text-emerald-600 font-medium">OK</span>'}
                </button>
                <div data-unit-body="${idx}" class="divide-y divide-gray-50 border-t border-gray-100">
                    ${u.locs.map(l => `
                        <button type="button" data-loc="${l.location_id}" class="loc-row w-full flex items-center gap-3 px-4 py-2.5 pl-11 hover:bg-sky-50/40 transition text-left">
                            <span class="flex-1 text-sm text-gray-700 truncate">${escapeHtml(l.location_name)}</span>
                            <span class="text-[11px] text-gray-400 tabular-nums">de ${l.items_total}</span>
                            <span class="w-10 text-right text-sm font-bold tabular-nums ${l.below_min > 0 ? 'text-amber-600' : 'text-gray-300'}">${l.below_min}</span>
                            <i class="fas fa-arrow-right text-gray-300 text-xs"></i>
                        </button>`).join('')}
                </div>
            </div>`).join('');
    }

    function updateLocHint() {
        const hint = document.getElementById('locFilterHint');
        if (!hint) return;
        if (currentLoc) {
            const g = allByLocation.find(x => x.location_id === currentLoc);
            hint.innerHTML = g
                ? `Filtrado: <b class="text-gray-600">${escapeHtml(g.unit_name || '')} · ${escapeHtml(g.location_name)}</b>`
                : '';
        } else if (allByLocation.length) {
            const units = new Set(allByLocation.map(g => g.unit_name || '—')).size;
            hint.textContent = `${allByLocation.length} localizações em ${units} unidade${units === 1 ? '' : 's'}`;
        } else {
            hint.textContent = '';
        }
    }

    function toggleUnit(idx) {
        const body = document.querySelector(`[data-unit-body="${idx}"]`);
        if (!body) return;
        const hidden = body.classList.toggle('hidden');
        const chev = document.querySelector(`[data-unit-chevron="${idx}"]`);
        if (chev) chev.classList.toggle('-rotate-90', hidden);
    }
    function expandAllUnits() {
        document.querySelectorAll('#byLocationList [data-unit-body]').forEach(b => b.classList.remove('hidden'));
        document.querySelectorAll('#byLocationList [data-unit-chevron]').forEach(c => c.classList.remove('-rotate-90'));
    }
    function collapseAllUnits() {
        document.querySelectorAll('#byLocationList [data-unit-body]').forEach(b => b.classList.add('hidden'));
        document.querySelectorAll('#byLocationList [data-unit-chevron]').forEach(c => c.classList.add('-rotate-90'));
    }

    function switchLoc(loc) {
        currentLoc = loc;
        const sel = document.getElementById('locFilter');
        if (sel && sel.value !== loc) sel.value = loc;
        loadDashboard();
    }

    loadDashboard();

    function emptyState(icon, color, msg) {
        return `<div class="py-8 text-center">
            <div class="inline-flex w-9 h-9 rounded-full bg-${color}-100 items-center justify-center text-${color}-500 mb-2">
                <i class="fas fa-${icon}"></i>
            </div>
            <p class="text-xs text-gray-500">${msg}</p>
        </div>`;
    }

    function formatShortDate(d) {
        if (!d) return '—';
        const dt = new Date(d);
        return dt.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' });
    }

    function setCard(key, value) {
        const el = document.querySelector(`[data-card="${key}"]`);
        if (!el) return;
        const prefix = el.dataset.prefix || '';
        el.textContent = `${prefix}${value}`;
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
</script>
</body>
</html>
