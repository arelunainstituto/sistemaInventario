<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>
        if (!localStorage.getItem('access_token')) window.location.href = '/login.html';
    </script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">

<div id="layoutRoot"></div>

<script src="_layout.js"></script>
<script>
    renderInventoryLayout({
        activePage: 'dashboard',
        title: 'Dashboard',
        subtitle: 'Visão geral do inventário'
    });

    document.getElementById('pageContent').innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            ${card('Total de itens', 'total_items', 'fa-boxes-stacked', 'blue')}
            ${card('Ativos', 'active_items', 'fa-check-circle', 'green')}
            ${card('Abaixo do mínimo', 'below_min', 'fa-triangle-exclamation', 'yellow')}
            ${card('Valor total', 'total_value', 'fa-euro-sign', 'purple', '€ ')}
            ${card('Cobertura média (dias)', 'avg_coverage', 'fa-clock', 'cyan')}
            ${card('Lotes vencendo (30d)', 'expiring_count', 'fa-hourglass-half', 'orange')}
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-flag text-red-500"></i> Itens críticos (abaixo do mínimo)
                </h3>
                <div id="criticalItems" class="text-sm text-gray-500">Carregando…</div>
            </section>
            <section class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-clock-rotate-left text-blue-500"></i> Últimas entradas
                </h3>
                <div id="recentEntries" class="text-sm text-gray-500">Carregando…</div>
            </section>
            <section class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-arrow-right-from-bracket text-red-500"></i> Últimas saídas
                </h3>
                <div id="recentExits" class="text-sm text-gray-500">Carregando…</div>
            </section>
            <section class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-right-left text-indigo-500"></i> Últimas transferências
                </h3>
                <div id="recentTransfers" class="text-sm text-gray-500">Carregando…</div>
            </section>
        </div>
    `;

    function card(label, key, icon, color, prefix = '') {
        return `<div class="bg-white rounded-lg shadow p-5">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs uppercase text-gray-500 font-medium">${label}</p>
                    <p class="text-2xl font-bold text-gray-800 mt-1" data-card="${key}" data-prefix="${prefix}">—</p>
                </div>
                <div class="w-10 h-10 rounded-lg bg-${color}-100 flex items-center justify-center text-${color}-600">
                    <i class="fas ${icon}"></i>
                </div>
            </div>
        </div>`;
    }

    (async function loadDashboard() {
        try {
            const [stats, entries, exits, transfers] = await Promise.all([
                apiCall('/api/inventory/stats/summary'),
                apiCall('/api/inventory/entries?limit=5'),
                apiCall('/api/inventory/exits?limit=5'),
                apiCall('/api/inventory/transfers?limit=5')
            ]);

            setCard('total_items',    stats.data.total_items);
            setCard('active_items',   stats.data.active_items);
            setCard('below_min',      stats.data.below_min);
            setCard('total_value',    stats.data.total_value.toFixed(2));
            setCard('avg_coverage',   stats.data.avg_coverage !== null ? stats.data.avg_coverage : '—');
            setCard('expiring_count', stats.data.expiring_count);

            document.getElementById('criticalItems').innerHTML = stats.data.critical_items.length
                ? stats.data.critical_items.map(i => `
                    <div class="flex justify-between py-2 border-b border-gray-100 last:border-0">
                        <span class="text-gray-800">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}</span>
                        <span class="text-xs ${i.stock === 0 ? 'text-red-600 font-bold' : 'text-yellow-600'}">${i.stock.toFixed(2)} / mín ${i.min_stock.toFixed(2)}</span>
                    </div>`).join('')
                : '<p class="text-green-600"><i class="fas fa-check"></i> Nenhum item abaixo do mínimo.</p>';

            document.getElementById('recentEntries').innerHTML = entries.data.length
                ? entries.data.map(e => `<div class="flex justify-between py-2 border-b border-gray-100 last:border-0">
                    <span>${escapeHtml(e.supplier?.name || '—')}</span>
                    <span class="text-xs text-gray-400">${e.document_date} · ${escapeHtml(e.document_number)}</span>
                </div>`).join('')
                : '<p>Sem entradas registadas.</p>';

            document.getElementById('recentExits').innerHTML = exits.data.length
                ? exits.data.map(m => `<div class="flex justify-between py-2 border-b border-gray-100 last:border-0">
                    <span>${escapeHtml(m.item?.name || '—')} <span class="text-[10px] text-gray-400">(${escapeHtml(m.subtype)})</span></span>
                    <span class="text-xs text-gray-400">${parseFloat(m.quantity).toFixed(2)} · ${new Date(m.occurred_at).toLocaleDateString('pt-PT')}</span>
                </div>`).join('')
                : '<p>Sem saídas registadas.</p>';

            document.getElementById('recentTransfers').innerHTML = transfers.data.length
                ? transfers.data.map(m => `<div class="flex justify-between py-2 border-b border-gray-100 last:border-0">
                    <span>${escapeHtml(m.item?.name || '—')}</span>
                    <span class="text-xs text-gray-400">${escapeHtml(m.from_location?.name || '')} → ${escapeHtml(m.to_location?.name || '')}</span>
                </div>`).join('')
                : '<p>Sem transferências registadas.</p>';
        } catch (err) {
            toast(err.message, 'error');
        }
    })();

    function setCard(key, value) {
        const el = document.querySelector(`[data-card="${key}"]`);
        if (!el) return;
        const prefix = el.dataset.prefix || '';
        el.textContent = `${prefix}${value}`;
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
</script>
</body>
</html>
