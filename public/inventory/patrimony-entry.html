<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Patrimônio · Entrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script src="_searchable-select.js"></script>
<script>
renderInventoryLayout({ activePage: 'patrimony-entry', title: 'Patrimônio · Entrada', subtitle: 'Aquisição e cadastro de unidades por número de série' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-base font-bold text-gray-900">Unidades cadastradas</h3>
        <button onclick="openNewEntryForm()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus"></i> Nova entrada</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                <tr>
                    <th class="text-left p-3">Nº de série</th>
                    <th class="text-left p-3">Produto</th>
                    <th class="text-left p-3">Localização</th>
                    <th class="text-left p-3">Colaborador</th>
                    <th class="text-right p-3">Valor</th>
                    <th class="text-center p-3">Estado</th>
                    <th class="text-center p-3">Ações</th>
                </tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-50">
                <tr><td colspan="7" class="p-6 text-center text-gray-400 text-xs">Carregando…</td></tr>
            </tbody>
        </table>
    </div>

    <div id="entryModal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-gray-800">Nova Entrada de Patrimônio</h3>
                <button onclick="closeEntryModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="entryForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <div class="md:col-span-4"><label class="text-xs text-gray-500">Produto patrimonial *</label>
                        <select name="item_id" id="itemSelect" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                        <p class="text-[11px] text-gray-400 mt-1">Só itens de patrimônio. Cadastre o produto em <a href="item-form.html" class="text-sky-600 hover:underline">Itens</a> se ainda não existir.</p>
                    </div>
                    <div><label class="text-xs text-gray-500">Localização inicial *</label>
                        <select name="location_id" id="locationSelect" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                    </div>
                    <div><label class="text-xs text-gray-500">Colaborador</label>
                        <select name="holder_id" id="holderSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                    </div>
                    <div><label class="text-xs text-gray-500">Fornecedor</label>
                        <select name="supplier_id" id="supplierSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                    </div>
                    <div><label class="text-xs text-gray-500">Documento de aquisição</label>
                        <input name="acquisition_doc" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Nº fatura / nota">
                    </div>
                </div>

                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="font-bold text-gray-800">Unidades (números de série)</h4>
                        <button type="button" onclick="addUnit()" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg"><i class="fas fa-plus"></i> Adicionar unidade</button>
                    </div>
                    <div class="grid grid-cols-12 gap-2 text-[10px] uppercase tracking-wider text-gray-400 font-semibold px-1 mb-1">
                        <div class="col-span-5">Número de série <span class="text-gray-300 normal-case">— vazio gera automático</span></div>
                        <div class="col-span-3">Data de aquisição</div>
                        <div class="col-span-3">Valor (€)</div>
                        <div class="col-span-1"></div>
                    </div>
                    <div id="units" class="space-y-2"></div>
                </div>

                <div class="flex gap-3 justify-end border-t pt-4">
                    <button type="button" onclick="closeEntryModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg text-sm font-medium shadow-sm shadow-purple-500/20 transition flex items-center gap-2"><i class="fas fa-save"></i> Cadastrar unidades</button>
                </div>
            </form>
        </div>
    </div>
`;

let items = [], locations = [], employees = [], suppliers = [];

async function bootstrap() {
    try {
        const [it, lo, em, su] = await Promise.all([
            apiCall('/api/inventory/items?macro_category=patrimonial&limit=1000'),
            apiCall('/api/inventory/locations'),
            apiCall('/api/inventory/employees'),
            apiCall('/api/inventory/suppliers')
        ]);
        items     = it.data || [];
        locations = (lo.data || []).filter(l => l.is_active !== false);
        employees = em.data || [];
        suppliers = (su.data || []).filter(s => s.is_active);
        if (!items.length)     toast('Nenhum produto patrimonial cadastrado — crie um em Itens', 'warn');
        if (!locations.length) toast('Nenhuma localização cadastrada', 'warn');
    } catch (err) {
        toast('Falha ao carregar dados: ' + err.message, 'error');
    }
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/serial-units?limit=200');
        const rows = r.data || [];
        document.getElementById('tbody').innerHTML = rows.length ? rows.map(u => `
            <tr class="hover:bg-purple-50/30 transition">
                <td class="p-3 font-mono text-[11px] text-gray-700">${escapeHtml(u.serial_number)}</td>
                <td class="p-3"><span class="text-gray-400 text-[11px] font-mono">${escapeHtml(u.item?.internal_code || '')}</span> <span class="text-gray-800">${escapeHtml(u.item?.name || '—')}</span></td>
                <td class="p-3 text-gray-600 text-xs">${u.location ? `${escapeHtml(u.location.unit?.name || '')} · ${escapeHtml(u.location.name)}` : '—'}</td>
                <td class="p-3 text-gray-600 text-xs">${u.holder ? escapeHtml(u.holder.name) : '—'}</td>
                <td class="p-3 text-right tabular-nums text-gray-700">${u.acquisition_value != null ? '€ ' + parseFloat(u.acquisition_value).toFixed(2) : '—'}</td>
                <td class="p-3 text-center">${statusBadge(u.status)}</td>
                <td class="p-3 text-center">
                    <a href="item-view.html?id=${u.item?.id}" class="text-gray-600 hover:text-purple-600" title="Ver produto"><i class="fas fa-eye"></i></a>
                </td>
            </tr>`).join('') : '<tr><td colspan="7" class="p-6 text-center text-gray-400 text-xs">Nenhuma unidade cadastrada. Clique em “Nova entrada”.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function statusBadge(s) {
    const map = {
        em_uso:  ['Em uso',  'bg-emerald-50 text-emerald-700 border-emerald-100'],
        inativo: ['Inativo', 'bg-gray-100 text-gray-600 border-gray-200'],
        baixado: ['Baixado', 'bg-red-50 text-red-600 border-red-100']
    };
    const [label, cls] = map[s] || [s || '—', 'bg-gray-100 text-gray-600 border-gray-200'];
    return `<span class="px-2 py-0.5 rounded text-[10px] border ${cls}">${escapeHtml(label)}</span>`;
}

// Popula os selects do modal (value vazio por padrão). Re-chamar reseta a
// seleção e o MutationObserver do combobox sincroniza o texto exibido.
function populateModalSelects() {
    document.getElementById('itemSelect').innerHTML = '<option value="">— selecione o produto —</option>' +
        items.map(i => `<option value="${i.id}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}${i.subcategory?.name ? ' · ' + escapeHtml(i.subcategory.name) : ''}</option>`).join('');
    document.getElementById('locationSelect').innerHTML = '<option value="">— selecione —</option>' +
        locations.map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('');
    document.getElementById('holderSelect').innerHTML = '<option value="">— sem colaborador —</option>' +
        employees.map(e => `<option value="${e.id}">${escapeHtml(e.name)}${e.department ? ' · ' + escapeHtml(e.department) : ''}</option>`).join('');
    document.getElementById('supplierSelect').innerHTML = '<option value="">— sem fornecedor —</option>' +
        suppliers.map(s => `<option value="${s.id}">${escapeHtml(s.name)}${s.tax_id ? ' · ' + escapeHtml(s.tax_id) : ''}</option>`).join('');
}

let unitCounter = 0;
function addUnit() {
    const idx = unitCounter++;
    const div = document.createElement('div');
    div.className = 'grid grid-cols-12 gap-2 items-center';
    div.dataset.unit = idx;
    div.innerHTML = `
        <div class="col-span-5"><input class="u-serial w-full px-2 py-1.5 border border-gray-300 rounded text-xs" placeholder="Vazio = automático (código-NN)"></div>
        <div class="col-span-3"><input type="date" class="u-date w-full px-2 py-1.5 border border-gray-300 rounded text-xs"></div>
        <div class="col-span-3"><input type="number" step="0.01" min="0" class="u-value w-full px-2 py-1.5 border border-gray-300 rounded text-xs" placeholder="0.00"></div>
        <div class="col-span-1 text-center"><button type="button" onclick="this.closest('[data-unit]').remove()" class="text-red-500 hover:text-red-700"><i class="fas fa-trash text-xs"></i></button></div>`;
    document.getElementById('units').appendChild(div);
}

function openNewEntryForm() {
    document.getElementById('entryForm').reset();
    populateModalSelects();
    document.getElementById('units').innerHTML = '';
    addUnit();
    document.getElementById('entryModal').classList.remove('hidden');
    // Comboboxes (após popular as opções). makeSearchable é idempotente.
    makeSearchable('itemSelect',     { placeholder: 'Buscar produto por nome, código ou categoria…' });
    makeSearchable('locationSelect', { placeholder: 'Buscar localização…' });
    makeSearchable('holderSelect',   { placeholder: 'Buscar colaborador…' });
    makeSearchable('supplierSelect', { placeholder: 'Buscar fornecedor…' });
}

function closeEntryModal() { document.getElementById('entryModal').classList.add('hidden'); }

document.getElementById('entryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    const units = [];
    for (const div of document.querySelectorAll('[data-unit]')) {
        units.push({
            // Vazio → o backend gera "<código do item>-NN" sequencial.
            serial_number:     div.querySelector('.u-serial').value.trim() || null,
            acquisition_date:  div.querySelector('.u-date').value || null,
            acquisition_value: div.querySelector('.u-value').value || null
        });
    }
    if (!units.length) return toast('Adicione pelo menos uma unidade', 'error');

    const payload = {
        item_id:         f.item_id.value,
        location_id:     f.location_id.value,
        holder_id:       f.holder_id.value || null,
        supplier_id:     f.supplier_id.value || null,
        acquisition_doc: f.acquisition_doc.value || null,
        units
    };
    try {
        const r = await apiCall('/api/inventory/patrimony/entries', { method: 'POST', body: JSON.stringify(payload) });
        const serials = r.data.serials || [];
        const preview = serials.slice(0, 5).join(', ') + (serials.length > 5 ? '…' : '');
        toast(`${r.data.created_units} unidade(s) cadastrada(s)${preview ? ': ' + preview : ''}`);
        closeEntryModal();
        load();
    } catch (err) { toast(err.message, 'error'); }
});

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

(async () => { await bootstrap(); await load(); })();
</script>
</body>
</html>
