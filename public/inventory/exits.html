<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Saídas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script src="_searchable-select.js"></script>
<script>
// F5.4: saídas regulares são apenas tipo 'consumo'. Avarias/extravios/perdas/
// quebras viraram fluxo administrativo e são lançadas pela tela de Ajustes
// (acesso restrito a Admin) para evitar mau uso e desvio.
const SUBTYPES = [
    ['consumo', 'Consumo', false]
];

renderInventoryLayout({ activePage: 'exits', title: 'Saídas', subtitle: 'Consumo de stock pelo operador' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-base font-bold text-gray-900">Histórico de saídas</h3>
        <button onclick="openModal()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-red-500/20 transition flex items-center gap-2"><i class="fas fa-arrow-right-from-bracket"></i> Nova saída</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                <tr><th class="text-left p-3">Data/hora</th><th class="text-left p-3">Tipo</th><th class="text-left p-3">Item</th><th class="text-right p-3">Qtd</th><th class="text-left p-3">Localização</th><th class="text-left p-3">Lote</th><th class="text-right p-3">€ unit</th><th class="text-left p-3">Justificação</th><th class="text-center p-3">Ações</th></tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-50"></tbody>
        </table>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-gray-800">Nova saída</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="form" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-xs text-gray-500 flex items-center gap-1.5">
                        Tipo de saída
                        <span class="relative inline-flex group cursor-help" tabindex="0">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3.5 h-3.5 text-gray-400 hover:text-sky-600 transition-colors" aria-hidden="true">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3.75a1.5 1.5 0 00-1.5 1.5.75.75 0 01-1.5 0 3 3 0 116 0c0 1.07-.64 1.96-1.5 2.45V11a.75.75 0 01-1.5 0v-.5a.75.75 0 01.75-.75c.69 0 1.25-.56 1.25-1.25s-.56-1.25-1.25-1.25zm0 7.5a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"></path>
                            </svg>
                            <span role="tooltip" class="absolute bottom-full left-1/2 -translate-x-1/2 mb-1.5 px-2.5 py-1.5 text-[11px] leading-snug text-white bg-gray-900 rounded shadow-lg whitespace-nowrap opacity-0 group-hover:opacity-100 group-focus:opacity-100 pointer-events-none transition-opacity duration-150 z-10">
                                Avaria/extravio/perda/quebra são lançados em Ajustes (Admin)
                                <span class="absolute top-full left-1/2 -translate-x-1/2 -mt-px border-4 border-transparent border-t-gray-900"></span>
                            </span>
                        </span>
                    </label>
                    <div class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-600 flex items-center gap-2 mt-1">
                        <i class="fas fa-arrow-right-from-bracket text-gray-400 text-xs"></i> Consumo
                    </div>
                    <input type="hidden" name="subtype" value="consumo">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs text-gray-500">Item *</label>
                    <select name="item_id" required onchange="onItemChange()" id="itemSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">— selecione —</option>
                    </select>
                </div>

                <div id="stockPanel" class="md:col-span-3 hidden border border-sky-200 bg-sky-50 rounded-lg p-3 text-xs">
                    <p class="font-bold text-sky-700 mb-2"><i class="fas fa-info-circle"></i> Stock disponível para este item:</p>
                    <div id="stockList"></div>
                </div>

                <div>
                    <label class="text-xs text-gray-500">Localização de origem *</label>
                    <select name="location_id" id="locationSelect" required onchange="onLocationChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">—</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500">Quantidade *</label>
                    <input name="quantity" type="number" step="0.0001" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <p id="maxAvailable" class="text-[10px] text-gray-500 mt-1"></p>
                </div>
                <div>
                    <label class="text-xs text-gray-500">Lote</label>
                    <select name="lot_id" id="lotSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">— Sugestão FEFO automática —</option>
                    </select>
                    <p id="lotHint" class="text-[10px] text-blue-600 mt-1"></p>
                </div>

                <div class="md:col-span-3">
                    <label class="text-xs text-gray-500"><span id="justificationLabel">Justificação</span></label>
                    <textarea name="justification" id="justificationField" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                </div>

                <div class="md:col-span-3 flex justify-end gap-2 border-t pt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium shadow-sm shadow-red-500/20 transition flex items-center gap-2"><i class="fas fa-save"></i> Registar saída</button>
                </div>
            </form>
        </div>
    </div>
`;

let items = [];

async function bootstrap() {
    try {
        const r = await apiCall('/api/inventory/items?limit=1000');
        items = r.data || [];
        document.getElementById('itemSelect').innerHTML = '<option value="">— selecione —</option>' +
            items.map(i => `<option value="${i.id}" data-controls-lot="${i.controls_lot}" data-min="${i.min_stock || 0}" data-macro="${i.macro_category}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}${i.subcategory?.name ? ' · ' + escapeHtml(i.subcategory.name) : ''}</option>`).join('');
        // Combobox no item (location e lot mudam dinamicamente — re-aplicamos depois)
        makeSearchable('itemSelect', { placeholder: 'Buscar item por nome, SKU ou categoria…' });
    } catch (err) { toast(err.message, 'error'); }
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/exits?limit=100');
        document.getElementById('tbody').innerHTML = r.data.map(m => {
            const cancelBadge = m.is_cancelled
                ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-red-100 text-red-700" title="Foi cancelado por um estorno">Estornado</span>'
                : m.is_reversal
                    ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-amber-100 text-amber-700" title="Movimento de estorno">Estorno</span>'
                    : '';
            const rowCls = m.is_cancelled ? 'opacity-60 line-through' : '';
            return `
            <tr class="hover:bg-sky-50/30 transition ${rowCls}">
                <td class="p-3 text-xs text-gray-600">${new Date(m.occurred_at).toLocaleString('pt-PT')}</td>
                <td class="p-3"><span class="text-xs px-2 py-0.5 rounded ${badgeClass(m.subtype)}">${escapeHtml(m.subtype)}</span>${cancelBadge}</td>
                <td class="p-3 font-medium">${escapeHtml(m.item?.name || '—')}<br><span class="text-[10px] text-gray-400 font-mono">${escapeHtml(m.item?.internal_code || '')}</span></td>
                <td class="p-3 text-right">${parseFloat(m.quantity).toFixed(2)}</td>
                <td class="p-3 text-xs text-gray-600">${escapeHtml(m.from_location?.unit?.name || '')} · ${escapeHtml(m.from_location?.name || '')}</td>
                <td class="p-3 text-xs">${m.lot ? escapeHtml(m.lot.lot_number) : '—'}</td>
                <td class="p-3 text-right text-gray-600">€ ${parseFloat(m.cmp_at_moment || 0).toFixed(2)}</td>
                <td class="p-3 text-xs text-gray-600 max-w-[200px] truncate" title="${escapeHtml(m.justification || '')}">${escapeHtml(m.justification || '—')}</td>
                <td class="p-3 text-center">
                    <button onclick='viewMovement(${JSON.stringify(m).replace(/'/g, "&#39;")}, "saída")' class="text-gray-600 hover:text-blue-600" title="Visualizar"><i class="fas fa-eye"></i></button>
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="9" class="p-6 text-center text-gray-400">Nenhuma saída registada.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function badgeClass(subtype) {
    const map = { consumo:'bg-blue-100 text-blue-700', avaria:'bg-orange-100 text-orange-700', extravio:'bg-red-100 text-red-700', perda:'bg-amber-100 text-amber-700', quebra:'bg-red-100 text-red-700', depreciacao:'bg-purple-100 text-purple-700' };
    return map[subtype] || 'bg-gray-100 text-gray-700';
}

let currentStock = [];

function openModal() {
    document.getElementById('form').reset();
    document.getElementById('stockPanel').classList.add('hidden');
    document.getElementById('locationSelect').innerHTML = '<option value="">—</option>';
    document.getElementById('lotSelect').innerHTML = '<option value="">— Sugestão FEFO automática —</option>';
    document.getElementById('maxAvailable').textContent = '';
    document.getElementById('lotHint').textContent = '';
    onSubtypeChange();
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// Saídas só de tipo 'consumo' — sem necessidade de toggle de justificação obrigatória
function onSubtypeChange() {}

async function onItemChange() {
    const itemId = document.getElementById('itemSelect').value;
    if (!itemId) return;
    try {
        const r = await apiCall(`/api/inventory/exits/stock-by-item/${itemId}`);
        currentStock = r.data || [];
        if (!currentStock.length) {
            document.getElementById('stockPanel').classList.remove('hidden');
            document.getElementById('stockList').innerHTML = '<p class="text-red-600">Sem stock disponível para este item.</p>';
            document.getElementById('locationSelect').innerHTML = '<option value="">—</option>';
            return;
        }
        document.getElementById('stockPanel').classList.remove('hidden');
        document.getElementById('stockList').innerHTML = currentStock.map(s => `
            <div class="flex justify-between py-1 border-b border-sky-100 last:border-0">
                <span>${escapeHtml(s.location?.unit?.name || '')} · ${escapeHtml(s.location?.name || '')} ${s.lot ? `· lote ${escapeHtml(s.lot.lot_number)}${s.lot.expiry_date ? ' (val. '+s.lot.expiry_date+')' : ''}` : ''}</span>
                <span class="font-bold">${parseFloat(s.quantity).toFixed(2)}</span>
            </div>`).join('');

        // Localizações distintas que enviam (can_send)
        const locMap = new Map();
        for (const s of currentStock) {
            if (s.location?.can_send !== false) locMap.set(s.location_id, s.location);
        }
        document.getElementById('locationSelect').innerHTML = '<option value="">—</option>' +
            Array.from(locMap.values()).map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('');
        makeSearchable('locationSelect', { placeholder: 'Buscar localização…' });
    } catch (err) { toast(err.message, 'error'); }
}

function onLocationChange() {
    const locId = document.getElementById('locationSelect').value;
    const itemOpt = document.getElementById('itemSelect').selectedOptions[0];
    const controlsLot = itemOpt?.dataset?.controlsLot === 'true';

    const lotsHere = currentStock.filter(s => s.location_id === locId);
    const total = lotsHere.reduce((a, s) => a + parseFloat(s.quantity), 0);
    document.getElementById('maxAvailable').textContent = `Disponível na localização: ${total.toFixed(2)}`;

    if (controlsLot) {
        // Ordena por expiry_date ASC (FEFO)
        const sorted = [...lotsHere].filter(s => s.lot).sort((a, b) => {
            const ea = a.lot.expiry_date || '9999-12-31';
            const eb = b.lot.expiry_date || '9999-12-31';
            return ea.localeCompare(eb);
        });
        document.getElementById('lotSelect').innerHTML = '<option value="">— Sugestão FEFO automática —</option>' +
            sorted.map((s, idx) => `<option value="${s.lot.id}">${escapeHtml(s.lot.lot_number)} · qty ${parseFloat(s.quantity).toFixed(2)} · val ${s.lot.expiry_date || 'sem'}${idx === 0 ? ' 🟢 FEFO' : ''}</option>`).join('');
        document.getElementById('lotHint').textContent = sorted.length
            ? `🟢 = Sugestão FEFO (validade mais próxima: ${sorted[0].lot.expiry_date || 'sem'})`
            : 'Sem lotes disponíveis nesta localização.';
    } else {
        document.getElementById('lotSelect').innerHTML = '<option value="">— item não controla lote —</option>';
        document.getElementById('lotHint').textContent = '';
    }
}

document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const f = e.target;
    const payload = {
        item_id: f.item_id.value,
        location_id: f.location_id.value,
        quantity: parseFloat(f.quantity.value),
        lot_id: f.lot_id.value || null,
        subtype: f.subtype.value,
        justification: f.justification.value || null
    };
    try {
        await apiCall('/api/inventory/exits', { method: 'POST', body: JSON.stringify(payload) });
        toast('Saída registada');
        closeModal();
        load();
    } catch (err) {
        // §16: stock vai cair abaixo do mínimo — pedir confirmação
        if (err.message && err.message.includes('LOW_STOCK_CONFIRMATION_REQUIRED')) {
            const confirmed = confirm('⚠️ Esta saída deixará o stock abaixo do mínimo definido. Confirmar?');
            if (confirmed) {
                try {
                    await apiCall('/api/inventory/exits', { method: 'POST', body: JSON.stringify({ ...payload, confirmed_low_stock: true }) });
                    toast('Saída registada (abaixo do mínimo)', 'warn');
                    closeModal();
                    load();
                } catch (e2) { toast(e2.message, 'error'); }
            }
            return;
        }
        toast(err.message, 'error');
    }
});

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function viewMovement(m, kind) {
    const fromLoc = m.from_location ? `${m.from_location.unit?.name || ''} · ${m.from_location.name}` : null;
    const toLoc   = m.to_location   ? `${m.to_location.unit?.name   || ''} · ${m.to_location.name}`   : null;
    showViewModal({
        title: `Movimento · ${kind}`,
        sections: [
            { title: 'Dados gerais', rows: [
                ['Data/hora', new Date(m.occurred_at).toLocaleString('pt-PT')],
                ['Tipo', m.type],
                ['Subtipo', m.subtype],
                ['Quantidade', parseFloat(m.quantity).toFixed(4)],
                ['Custo Médio', `€ ${parseFloat(m.cmp_at_moment || 0).toFixed(4)}`],
                ['Custo total', `€ ${parseFloat(m.total_cost || 0).toFixed(2)}`, { bold: true }]
            ]},
            { title: 'Item', rows: [
                ['Código', m.item?.internal_code, { mono: true }],
                ['Nome', m.item?.name],
                ['Categoria macro', m.item?.macro_category]
            ]},
            { title: 'Localização e lote', rows: [
                ['Origem', fromLoc],
                ['Destino', toLoc],
                ['Lote', m.lot?.lot_number, { mono: true }],
                ['Validade do lote', m.lot?.expiry_date]
            ]},
            { title: 'Justificação', rows: [
                ['Texto', m.justification]
            ]}
        ],
        actions: (() => {
            const a = [
                { label: 'Imprimir comprovante', icon: 'fa-print', href: `print-receipt.html?type=exit&id=${m.id}` }
            ];
            if (window.isInventoryAdmin && !m.is_cancelled && !m.is_reversal) {
                a.push({
                    label: 'Inativar movimento', icon: 'fa-ban',
                    onclick: async () => {
                        const reason = await confirmCancelMovement('movimento');
                        if (!reason) return;
                        try {
                            await apiCall(`/api/inventory/movements/${m.id}/cancel`, {
                                method: 'POST', body: JSON.stringify({ reason })
                            });
                            toast('Movimento inativado · estorno gerado');
                            closeViewModal();
                            load();
                        } catch (err) { toast(err.message, 'error'); }
                    }
                });
            }
            return a;
        })()
    });
}

(async () => { await bootstrap(); await load(); })();
</script>
</body>
</html>
