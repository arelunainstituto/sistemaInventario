<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Saídas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script src="_searchable-select.js"></script>
<script>
// F5.4: saídas regulares são apenas tipo 'consumo'. Avarias/extravios/perdas/
// quebras viraram fluxo administrativo e são lançadas pela tela de Ajustes
// (acesso restrito a Admin) para evitar mau uso e desvio.
const SUBTYPES = [
    ['consumo', 'Consumo', false]
];

renderInventoryLayout({ activePage: 'exits', title: 'Consumo · Saídas', subtitle: 'Consumo de stock pelo operador' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-base font-bold text-gray-900">Histórico de saídas</h3>
        <button onclick="openModal()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm shadow-red-500/20 transition flex items-center gap-2"><i class="fas fa-arrow-right-from-bracket"></i> Nova saída</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                <tr><th class="text-left p-3">Data/hora</th><th class="text-left p-3">Tipo</th><th class="text-left p-3">Item</th><th class="text-right p-3">Qtd</th><th class="text-left p-3">Localização</th><th class="text-left p-3">Lote</th><th class="text-right p-3">€ unit</th><th class="text-left p-3">Justificação</th><th class="text-center p-3">Ações</th></tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-50"></tbody>
        </table>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-gray-800">Nova saída</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="form" class="p-6 space-y-4">
                <div>
                    <label class="text-xs text-gray-500 flex items-center gap-1.5">Justificação
                        <span class="help-tip" tabindex="0" data-tip="Aplica-se a todas as linhas desta saída. Opcional para consumo. Avaria/extravio/perda/quebra são lançados em Ajustes (Admin).">?</span>
                    </label>
                    <textarea name="justification" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                </div>

                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="font-bold text-gray-800">Itens da saída</h4>
                        <button type="button" onclick="addLine()" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg"><i class="fas fa-plus"></i> Adicionar linha</button>
                    </div>
                    <div id="lines" class="space-y-2"></div>
                    <p class="text-[11px] text-gray-400 mt-2">Lote por <b>FEFO automático</b> (validade mais próxima) — para itens que controlam lote, dá para escolher um lote específico.</p>
                </div>

                <div class="flex justify-end gap-2 border-t pt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium shadow-sm shadow-red-500/20 transition flex items-center gap-2"><i class="fas fa-save"></i> Registar saída</button>
                </div>
            </form>
        </div>
    </div>
`;

let items = [], locations = [];

async function bootstrap() {
    try {
        const [it, lo] = await Promise.all([
            apiCall('/api/inventory/items?macro_category=consumo&limit=1000'),
            apiCall('/api/inventory/locations')
        ]);
        items = it.data || [];
        locations = (lo.data || []).filter(l => l.is_active !== false);
        if (!items.length)     toast('Nenhum item de consumo cadastrado', 'warn');
        if (!locations.length) toast('Nenhuma localização cadastrada', 'warn');
    } catch (err) { toast(err.message, 'error'); }
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/exits?limit=100');
        document.getElementById('tbody').innerHTML = r.data.map(m => {
            const cancelBadge = m.is_cancelled
                ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-red-100 text-red-700" title="Foi cancelado por um estorno">Estornado</span>'
                : m.is_reversal
                    ? '<span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[9px] uppercase font-bold bg-amber-100 text-amber-700" title="Movimento de estorno">Estorno</span>'
                    : '';
            const rowCls = m.is_cancelled ? 'opacity-60 line-through' : '';
            return `
            <tr class="hover:bg-sky-50/30 transition ${rowCls}">
                <td class="p-3 text-xs text-gray-600">${new Date(m.occurred_at).toLocaleString('pt-PT')}</td>
                <td class="p-3"><span class="text-xs px-2 py-0.5 rounded ${badgeClass(m.subtype)}">${escapeHtml(m.subtype)}</span>${cancelBadge}</td>
                <td class="p-3 font-medium">${escapeHtml(m.item?.name || '—')}<br><span class="text-[10px] text-gray-400 font-mono">${escapeHtml(m.item?.internal_code || '')}</span></td>
                <td class="p-3 text-right">${parseFloat(m.quantity).toFixed(2)}</td>
                <td class="p-3 text-xs text-gray-600">${escapeHtml(m.from_location?.unit?.name || '')} · ${escapeHtml(m.from_location?.name || '')}</td>
                <td class="p-3 text-xs">${m.lot ? escapeHtml(m.lot.lot_number) : '—'}</td>
                <td class="p-3 text-right text-gray-600">€ ${parseFloat(m.cmp_at_moment || 0).toFixed(2)}</td>
                <td class="p-3 text-xs text-gray-600 max-w-[200px] truncate" title="${escapeHtml(m.justification || '')}">${escapeHtml(m.justification || '—')}</td>
                <td class="p-3 text-center">
                    <button onclick='viewMovement(${JSON.stringify(m).replace(/'/g, "&#39;")}, "saída")' class="text-gray-600 hover:text-blue-600" title="Visualizar"><i class="fas fa-eye"></i></button>
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="9" class="p-6 text-center text-gray-400">Nenhuma saída registada.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function badgeClass(subtype) {
    const map = { consumo:'bg-blue-100 text-blue-700', avaria:'bg-orange-100 text-orange-700', extravio:'bg-red-100 text-red-700', perda:'bg-amber-100 text-amber-700', quebra:'bg-red-100 text-red-700', depreciacao:'bg-purple-100 text-purple-700' };
    return map[subtype] || 'bg-gray-100 text-gray-700';
}

// Stock por linha (idx -> linhas de stock vindas de /stock-by-item), usado p/
// o hint de disponibilidade e o dropdown de lote (FEFO) de cada linha.
const lineStock = {};
let lineCounter = 0;

function addLine() {
    const idx = lineCounter++;
    const div = document.createElement('div');
    div.className = 'grid grid-cols-12 gap-2 items-end p-2 border border-gray-100 rounded-lg';
    div.dataset.line = idx;
    div.innerHTML = `
        <div class="col-span-4"><label class="text-xs text-gray-500">Item</label>
            <select required onchange="onLineItemChange(this, ${idx})" class="line-item w-full px-2 py-1.5 border border-gray-300 rounded text-xs" id="lineItem-${idx}">
                <option value="">—</option>
                ${items.map(i => `<option value="${i.id}" data-controls-lot="${i.controls_lot}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}${i.subcategory?.name ? ' · ' + escapeHtml(i.subcategory.name) : ''}</option>`).join('')}
            </select>
        </div>
        <div class="col-span-3"><label class="text-xs text-gray-500">Localização</label>
            <select required onchange="onLineLocationChange(this, ${idx})" class="line-location w-full px-2 py-1.5 border border-gray-300 rounded text-xs" id="lineLoc-${idx}">
                <option value="">—</option>
                ${locations.map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('')}
            </select>
        </div>
        <div class="col-span-2"><label class="text-xs text-gray-500 flex items-center gap-1">Qtd <span class="line-avail text-[10px] text-gray-400"></span></label>
            <input type="number" step="0.0001" required class="line-qty w-full px-2 py-1.5 border border-gray-300 rounded text-xs"></div>
        <div class="col-span-2 line-lot-area hidden"><label class="text-xs text-gray-500">Lote</label>
            <select class="line-lot w-full px-2 py-1.5 border border-gray-300 rounded text-xs"><option value="">— FEFO automático —</option></select></div>
        <div class="col-span-1 flex items-center justify-center"><button type="button" onclick="this.closest('[data-line]').remove()" class="text-red-500 hover:text-red-700" title="Remover linha"><i class="fas fa-trash"></i></button></div>`;
    document.getElementById('lines').appendChild(div);
    makeSearchable(`lineItem-${idx}`, { placeholder: 'Buscar item por nome, código ou categoria…' });
    makeSearchable(`lineLoc-${idx}`,  { placeholder: 'Buscar localização…' });
}

async function onLineItemChange(sel, idx) {
    const line = sel.closest('[data-line]');
    const controlsLot = sel.selectedOptions[0]?.dataset.controlsLot === 'true';
    line.querySelector('.line-lot-area').classList.toggle('hidden', !controlsLot);
    line.querySelector('.line-avail').textContent = '';
    lineStock[idx] = [];
    if (sel.value) {
        try {
            const r = await apiCall(`/api/inventory/exits/stock-by-item/${sel.value}`);
            lineStock[idx] = r.data || [];
        } catch (_) { /* sem stock: backend valida no submit (seeding permite negativo) */ }
    }
    rebuildLineLot(line, idx);
}

function onLineLocationChange(sel, idx) { rebuildLineLot(sel.closest('[data-line]'), idx); }

function rebuildLineLot(line, idx) {
    const itemOpt = line.querySelector('.line-item').selectedOptions[0];
    const controlsLot = itemOpt?.dataset.controlsLot === 'true';
    const locId = line.querySelector('.line-location').value;
    const here = (lineStock[idx] || []).filter(s => s.location_id === locId);
    const total = here.reduce((a, s) => a + parseFloat(s.quantity || 0), 0);
    const avail = line.querySelector('.line-avail');
    if (avail) avail.textContent = locId ? `· disp ${total.toFixed(2)}` : '';
    if (!controlsLot) return;
    const lotSel = line.querySelector('.line-lot');
    const lots = here.filter(s => s.lot).sort((a, b) =>
        (a.lot.expiry_date || '9999-12-31').localeCompare(b.lot.expiry_date || '9999-12-31'));
    lotSel.innerHTML = '<option value="">— FEFO automático —</option>' +
        lots.map((s, i) => `<option value="${s.lot.id}">${escapeHtml(s.lot.lot_number)} · ${parseFloat(s.quantity).toFixed(2)}${s.lot.expiry_date ? ' · val ' + s.lot.expiry_date : ''}${i === 0 ? ' 🟢' : ''}</option>`).join('');
}

function openModal() {
    document.getElementById('form').reset();
    document.getElementById('lines').innerHTML = '';
    for (const k in lineStock) delete lineStock[k];
    addLine();
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function submitExit(confirmedLowStock) {
    const lines = [];
    for (const div of document.querySelectorAll('[data-line]')) {
        const item_id = div.querySelector('.line-item').value;
        if (!item_id) continue;
        lines.push({
            item_id,
            location_id: div.querySelector('.line-location').value,
            quantity:    parseFloat(div.querySelector('.line-qty').value),
            lot_id:      div.querySelector('.line-lot')?.value || null
        });
    }
    if (!lines.length) { toast('Adicione pelo menos uma linha', 'error'); return; }

    const payload = {
        lines,
        justification: document.getElementById('form').justification.value || null,
        confirmed_low_stock: !!confirmedLowStock
    };
    try {
        const r = await apiCall('/api/inventory/exits/batch', { method: 'POST', body: JSON.stringify(payload) });
        toast(`${r.data.count} saída(s) registada(s)${confirmedLowStock ? ' (abaixo do mínimo)' : ''}`, confirmedLowStock ? 'warn' : 'success');
        closeModal();
        load();
    } catch (err) {
        // §16: alguma linha cai abaixo do mínimo — confirma uma vez e reenvia.
        if (err.code === 'LOW_STOCK_CONFIRMATION_REQUIRED') {
            if (confirm('⚠️ Alguma saída deixará o stock abaixo do mínimo definido. Confirmar todas?')) submitExit(true);
            return;
        }
        toast(err.message, 'error');
    }
}

document.getElementById('form').addEventListener('submit', e => { e.preventDefault(); submitExit(false); });

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function viewMovement(m, kind) {
    const fromLoc = m.from_location ? `${m.from_location.unit?.name || ''} · ${m.from_location.name}` : null;
    const toLoc   = m.to_location   ? `${m.to_location.unit?.name   || ''} · ${m.to_location.name}`   : null;
    showViewModal({
        title: `Movimento · ${kind}`,
        sections: [
            { title: 'Dados gerais', rows: [
                ['Data/hora', new Date(m.occurred_at).toLocaleString('pt-PT')],
                ['Tipo', m.type],
                ['Subtipo', m.subtype],
                ['Quantidade', parseFloat(m.quantity).toFixed(4)],
                ['Custo Médio', `€ ${parseFloat(m.cmp_at_moment || 0).toFixed(4)}`],
                ['Custo total', `€ ${parseFloat(m.total_cost || 0).toFixed(2)}`, { bold: true }]
            ]},
            { title: 'Item', rows: [
                ['Código', m.item?.internal_code, { mono: true }],
                ['Nome', m.item?.name],
                ['Categoria macro', m.item?.macro_category]
            ]},
            { title: 'Localização e lote', rows: [
                ['Origem', fromLoc],
                ['Destino', toLoc],
                ['Lote', m.lot?.lot_number, { mono: true }],
                ['Validade do lote', m.lot?.expiry_date]
            ]},
            { title: 'Justificação', rows: [
                ['Texto', m.justification]
            ]}
        ],
        actions: (() => {
            const a = [
                { label: 'Imprimir comprovante', icon: 'fa-print', href: `print-receipt.html?type=exit&id=${m.id}` }
            ];
            if (window.isInventoryAdmin && !m.is_cancelled && !m.is_reversal) {
                a.push({
                    label: 'Inativar movimento', icon: 'fa-ban',
                    onclick: async () => {
                        const reason = await confirmCancelMovement('movimento');
                        if (!reason) return;
                        try {
                            await apiCall(`/api/inventory/movements/${m.id}/cancel`, {
                                method: 'POST', body: JSON.stringify({ reason })
                            });
                            toast('Movimento inativado · estorno gerado');
                            closeViewModal();
                            load();
                        } catch (err) { toast(err.message, 'error'); }
                    }
                });
            }
            return a;
        })()
    });
}

(async () => { await bootstrap(); await load(); })();
</script>
</body>
</html>
