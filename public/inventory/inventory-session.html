<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Inventário Físico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({ activePage: 'inventory-session', title: 'Inventário Físico', subtitle: 'Sessões de contagem por sublocal' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">Sessões</h3>
        <button onclick="openCreate()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-list-check"></i> Nova sessão</button>
    </div>
    <div class="bg-white rounded-lg shadow overflow-hidden mb-6">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 text-xs uppercase text-gray-600">
                <tr><th class="text-left p-3">Aberta em</th><th class="text-left p-3">Localização</th><th class="text-center p-3">Estado</th><th class="p-3"></th></tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-100"></tbody>
        </table>
    </div>

    <div id="createModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-gray-800">Abrir nova sessão</h3>
                <button onclick="closeCreate()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="createForm" class="p-6 space-y-3">
                <div><label class="text-xs text-gray-500">Localização *</label>
                    <select name="location_id" id="locSelect" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">— selecione —</option>
                    </select>
                </div>
                <div><label class="text-xs text-gray-500">Notas (opcional)</label>
                    <textarea name="notes" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg">Abrir sessão</button>
            </form>
        </div>
    </div>

    <div id="sessionPanel" class="hidden bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 id="sessionTitle" class="text-lg font-bold text-gray-800">—</h3>
                <p id="sessionInfo" class="text-sm text-gray-500"></p>
            </div>
            <div class="flex gap-2" id="sessionActions"></div>
        </div>
        <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-xs uppercase text-gray-600 sticky top-0">
                    <tr>
                        <th class="text-left p-2">Item</th>
                        <th class="text-left p-2">Lote</th>
                        <th class="text-right p-2">Esperado</th>
                        <th class="text-right p-2">Contado</th>
                        <th class="text-right p-2">Δ</th>
                        <th class="text-left p-2">Notas</th>
                    </tr>
                </thead>
                <tbody id="countsTbody" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
`;

let allLocations = [];
let currentSession = null;
let pendingCounts = {};   // count_id -> { counted_qty, notes }

async function bootstrap() {
    try {
        const lo = await apiCall('/api/inventory/locations');
        allLocations = lo.data || [];
        document.getElementById('locSelect').innerHTML = '<option value="">— selecione —</option>' +
            allLocations.map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name || '')} · ${escapeHtml(l.name)}</option>`).join('');
    } catch (err) { toast(err.message, 'error'); }
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/inventory-sessions?limit=50');
        document.getElementById('tbody').innerHTML = r.data.map(s => `
            <tr class="hover:bg-gray-50">
                <td class="p-3 text-xs">${new Date(s.opened_at).toLocaleString('pt-PT')}</td>
                <td class="p-3 font-medium">${escapeHtml(s.location?.unit?.name || '')} · ${escapeHtml(s.location?.name || '')}</td>
                <td class="p-3 text-center">${statusBadge(s.status)}</td>
                <td class="p-3 text-right">
                    <button onclick="loadSession('${s.id}')" class="text-indigo-600 hover:text-indigo-800"><i class="fas fa-folder-open"></i> Abrir</button>
                </td>
            </tr>`).join('') || '<tr><td colspan="4" class="p-6 text-center text-gray-400">Nenhuma sessão.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function statusBadge(s) {
    const map = { em_contagem: 'bg-yellow-100 text-yellow-700', validada: 'bg-green-100 text-green-700', cancelada: 'bg-gray-100 text-gray-500' };
    return `<span class="text-xs px-2 py-0.5 rounded ${map[s] || 'bg-gray-100'}">${s}</span>`;
}

function openCreate() { document.getElementById('createModal').classList.remove('hidden'); }
function closeCreate() { document.getElementById('createModal').classList.add('hidden'); }

document.getElementById('createForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    try {
        const r = await apiCall('/api/inventory/inventory-sessions', { method: 'POST', body: JSON.stringify(fd) });
        toast('Sessão aberta');
        closeCreate();
        e.target.reset();
        load();
        loadSession(r.data.session_id);
    } catch (err) { toast(err.message, 'error'); }
});

async function loadSession(id) {
    try {
        const r = await apiCall(`/api/inventory/inventory-sessions/${id}`);
        currentSession = r.data;
        pendingCounts = {};
        renderSession();
    } catch (err) { toast(err.message, 'error'); }
}

function renderSession() {
    const s = currentSession;
    document.getElementById('sessionPanel').classList.remove('hidden');
    document.getElementById('sessionTitle').textContent = `${s.location?.unit?.name || ''} · ${s.location?.name || ''}`;
    document.getElementById('sessionInfo').textContent = `Aberta em ${new Date(s.opened_at).toLocaleString('pt-PT')} · estado ${s.status} · ${s.counts.length} linhas`;

    const isOpen = s.status === 'em_contagem';
    document.getElementById('sessionActions').innerHTML = isOpen ? `
        <button onclick="saveCounts()" class="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-800 rounded-lg text-xs"><i class="fas fa-save"></i> Salvar contagens</button>
        <button onclick="validateSession()" class="px-3 py-1.5 bg-green-100 hover:bg-green-200 text-green-800 rounded-lg text-xs"><i class="fas fa-check"></i> Validar e gerar ajustes</button>
        <button onclick="cancelSession()" class="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-800 rounded-lg text-xs"><i class="fas fa-ban"></i> Cancelar</button>
    ` : '';

    document.getElementById('countsTbody').innerHTML = s.counts.map(c => `
        <tr class="hover:bg-gray-50">
            <td class="p-2 font-medium">${escapeHtml(c.item?.name || '')}<br><span class="text-[10px] font-mono text-gray-400">${escapeHtml(c.item?.internal_code || '')}</span></td>
            <td class="p-2 text-xs">${c.lot ? escapeHtml(c.lot.lot_number) : '—'}</td>
            <td class="p-2 text-right">${parseFloat(c.expected_qty).toFixed(2)}</td>
            <td class="p-2 text-right">
                ${isOpen
                    ? `<input type="number" step="0.0001" value="${c.counted_qty ?? ''}" data-count-id="${c.id}" oninput="onCountChange('${c.id}', this.value)" class="w-24 px-2 py-1 border border-gray-300 rounded text-xs text-right">`
                    : (c.counted_qty !== null ? parseFloat(c.counted_qty).toFixed(2) : '—')}
            </td>
            <td class="p-2 text-right font-bold ${c.difference > 0 ? 'text-green-600' : c.difference < 0 ? 'text-red-600' : 'text-gray-400'}">
                ${c.counted_qty !== null ? (c.difference > 0 ? '+' : '') + parseFloat(c.difference).toFixed(2) : '—'}
            </td>
            <td class="p-2 text-xs text-gray-600">${escapeHtml(c.notes || '')}</td>
        </tr>`).join('') || '<tr><td colspan="6" class="p-6 text-center text-gray-400">Sem itens nesta localização.</td></tr>';
}

function onCountChange(countId, value) {
    pendingCounts[countId] = { counted_qty: parseFloat(value) || 0 };
}

async function saveCounts() {
    const counts = Object.entries(pendingCounts).map(([count_id, p]) => ({ count_id, ...p }));
    if (!counts.length) return toast('Nada para salvar', 'info');
    try {
        const r = await apiCall(`/api/inventory/inventory-sessions/${currentSession.id}/counts`, {
            method: 'PATCH', body: JSON.stringify({ counts })
        });
        toast(`${r.updated} contagem(ns) salva(s)`);
        pendingCounts = {};
        loadSession(currentSession.id);
    } catch (err) { toast(err.message, 'error'); }
}

async function validateSession() {
    if (Object.keys(pendingCounts).length > 0) {
        if (!confirm('Há contagens não salvas. Salvar antes de validar?')) return;
        await saveCounts();
    }
    if (!confirm('Validar a sessão? Isto vai gerar ajustes em inv_movements para cada diferença e não pode ser desfeito.')) return;
    try {
        const r = await apiCall(`/api/inventory/inventory-sessions/${currentSession.id}/validate`, { method: 'POST' });
        toast(`Sessão validada · ${r.data.adjustments_generated} ajuste(s) gerado(s)`);
        loadSession(currentSession.id);
        load();
    } catch (err) { toast(err.message, 'error'); }
}

async function cancelSession() {
    if (!confirm('Cancelar a sessão? Nenhum ajuste será gerado.')) return;
    try {
        await apiCall(`/api/inventory/inventory-sessions/${currentSession.id}/cancel`, { method: 'POST' });
        toast('Sessão cancelada');
        loadSession(currentSession.id);
        load();
    } catch (err) { toast(err.message, 'error'); }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

(async () => { await bootstrap(); await load(); })();
</script>
</body>
</html>
