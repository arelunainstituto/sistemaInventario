<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Ficha do Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
const itemId = new URLSearchParams(location.search).get('id');

renderInventoryLayout({
    activePage: 'items',
    title: 'Ficha do Item',
    subtitle: 'Visualização detalhada (somente leitura)'
});

document.getElementById('pageContent').innerHTML = `<div id="content" class="text-sm text-gray-500 text-center py-12">Carregando…</div>`;

async function loadItem() {
    if (!itemId) {
        document.getElementById('content').innerHTML = '<p class="text-red-500">ID não fornecido.</p>';
        return;
    }
    try {
        const r = await apiCall(`/api/inventory/items/${itemId}`);
        render(r.data);
    } catch (err) {
        document.getElementById('content').innerHTML = `<p class="text-red-500">${escapeHtml(err.message)}</p>`;
    }
}

function infoRow(label, value, mono = false) {
    return `<div class="flex justify-between py-2 border-b border-gray-100 last:border-0">
        <span class="text-xs text-gray-500">${label}</span>
        <span class="text-sm text-gray-800 ${mono ? 'font-mono' : ''}">${value === null || value === undefined || value === '' ? '—' : escapeHtml(String(value))}</span>
    </div>`;
}

function render(it) {
    const isPatrimonial = it.macro_category === 'patrimonial';
    const stockByLoc = it.stock || [];
    const totalStock = stockByLoc.reduce((acc, s) => acc + parseFloat(s.quantity || 0), 0);

    document.getElementById('content').innerHTML = `
        <!-- Header -->
        <div class="bg-white rounded-lg shadow p-6 mb-4">
            <div class="flex flex-col md:flex-row gap-6 items-start">
                <div class="flex-shrink-0">
                    ${it.image_url
                        ? `<img src="${it.image_url}" class="w-40 h-40 object-cover rounded-lg border border-gray-200">`
                        : `<div class="w-40 h-40 bg-gray-100 rounded-lg flex items-center justify-center text-gray-300 text-4xl"><i class="fas fa-box"></i></div>`}
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs font-mono text-gray-500">${escapeHtml(it.internal_code)}</span>
                        <span class="text-xs px-2 py-0.5 rounded ${isPatrimonial ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">${it.macro_category}</span>
                        ${it.is_active ? '<span class="text-xs text-green-600">● Ativo</span>' : '<span class="text-xs text-gray-400">● Inativo</span>'}
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-1">${escapeHtml(it.name)}</h2>
                    <p class="text-sm text-gray-600">${escapeHtml(it.description || '')}</p>

                    <div class="flex flex-wrap gap-2 mt-4">
                        <a href="item-form.html?id=${it.id}" class="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-800 rounded text-xs"><i class="fas fa-edit"></i> Editar</a>
                        <a href="kardex.html?item=${it.id}" class="px-3 py-1.5 bg-teal-100 hover:bg-teal-200 text-teal-800 rounded text-xs"><i class="fas fa-clipboard-list"></i> Kardex</a>
                        <a href="item-label.html?id=${it.id}" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded text-xs"><i class="fas fa-qrcode"></i> Etiqueta QR</a>
                        <a href="movements.html?item_id=${it.id}" class="px-3 py-1.5 bg-purple-100 hover:bg-purple-200 text-purple-800 rounded text-xs"><i class="fas fa-history"></i> Histórico</a>
                        <a href="items.html" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded text-xs"><i class="fas fa-arrow-left"></i> Voltar</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Identificação -->
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-3"><i class="fas fa-id-card text-gray-600"></i> Identificação</h3>
                ${infoRow('Subcategoria', it.subcategory?.name)}
                ${infoRow('Ref. fabricante', it.manufacturer_ref)}
                ${infoRow('Código de barras', it.barcode, true)}
                ${infoRow('QR Code (UUID)', it.qr_code, true)}
                ${isPatrimonial ? infoRow('Património', it.patrimony_number, true) : ''}
            </div>

            <!-- Unidades & CMP -->
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-3"><i class="fas fa-ruler text-gray-600"></i> Unidades e custo</h3>
                ${infoRow('UoM base', it.base_uom ? `${it.base_uom.name} (${it.base_uom.code})` : null)}
                ${infoRow('UoM compra', it.purchase_uom ? `${it.purchase_uom.name} (${it.purchase_uom.code})` : null)}
                ${infoRow('UoM consumo', it.consumption_uom ? `${it.consumption_uom.name} (${it.consumption_uom.code})` : null)}
                ${infoRow('Fator de conversão', it.conversion_factor)}
                ${infoRow('CMP atual', `€ ${parseFloat(it.cmp || 0).toFixed(4)}`)}
            </div>

            <!-- Parâmetros de stock -->
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-gray-800 mb-3"><i class="fas fa-warehouse text-gray-600"></i> Stock & reposição</h3>
                ${infoRow('Stock mínimo', it.min_stock)}
                ${infoRow('Stock máximo', it.max_stock)}
                ${infoRow('Lead time (dias)', it.lead_time_days)}
                ${infoRow('Ponto de reposição', it.reorder_point)}
                ${infoRow('Consumo médio diário', parseFloat(it.avg_daily_consumption || 0).toFixed(4))}
                ${infoRow('Controla lote', it.controls_lot ? 'Sim' : 'Não')}
                ${infoRow('Usa nº de série', it.uses_serial ? 'Sim' : 'Não')}
            </div>

            ${isPatrimonial ? `
            <!-- Patrimoniais -->
            <div class="bg-white rounded-lg shadow p-6 lg:col-span-1">
                <h3 class="font-bold text-gray-800 mb-3"><i class="fas fa-laptop-medical text-purple-600"></i> Dados patrimoniais</h3>
                ${infoRow('Data aquisição', it.acquisition_date)}
                ${infoRow('Valor de aquisição', it.acquisition_value ? `€ ${parseFloat(it.acquisition_value).toFixed(2)}` : null)}
                ${infoRow('Taxa depreciação anual', it.depreciation_rate ? `${it.depreciation_rate}%` : null)}
                ${infoRow('Estado patrimonial', it.asset_status)}
            </div>` : ''}

            <!-- Stock por localização -->
            <div class="bg-white rounded-lg shadow p-6 ${isPatrimonial ? 'lg:col-span-2' : 'lg:col-span-3'}">
                <h3 class="font-bold text-gray-800 mb-3"><i class="fas fa-map-marker-alt text-blue-600"></i> Stock por localização <span class="text-xs text-gray-500 font-normal">(total: ${totalStock.toFixed(2)})</span></h3>
                ${stockByLoc.length ? `
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-xs uppercase text-gray-600">
                        <tr>
                            <th class="text-left p-2">Localização</th>
                            <th class="text-left p-2">Lote</th>
                            <th class="text-left p-2">Validade</th>
                            <th class="text-right p-2">Quantidade</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        ${stockByLoc.map(s => `
                            <tr>
                                <td class="p-2">${escapeHtml(s.location?.unit?.name || '')} · ${escapeHtml(s.location?.name || '')}</td>
                                <td class="p-2 font-mono text-xs">${s.lot?.lot_number ? escapeHtml(s.lot.lot_number) : '—'}</td>
                                <td class="p-2 text-xs text-gray-600">${s.lot?.expiry_date || '—'}</td>
                                <td class="p-2 text-right font-bold">${parseFloat(s.quantity).toFixed(2)}</td>
                            </tr>`).join('')}
                    </tbody>
                </table>` : '<p class="text-sm text-gray-400 text-center py-6">Sem stock registado.</p>'}
            </div>
        </div>
    `;
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

loadItem();
</script>
</body>
</html>
