<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Ficha do Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
const params = new URLSearchParams(location.search);
const itemId = params.get('id');
const qrCode = params.get('qr');   // alternativa: vem de etiqueta escaneada

renderInventoryLayout({
    activePage: 'items',
    title: 'Ficha do Item',
    subtitle: 'Visualização detalhada (somente leitura)'
});

document.getElementById('pageContent').innerHTML = `<div id="content" class="text-sm text-gray-500 text-center py-12">Carregando…</div>`;

async function loadItem() {
    if (!itemId && !qrCode) {
        document.getElementById('content').innerHTML = '<p class="text-red-500">ID ou QR não fornecido.</p>';
        return;
    }
    try {
        let resolvedId = itemId;
        if (!resolvedId && qrCode) {
            // Resolve QR Code → id via endpoint público de scan
            const scan = await apiCall(`/api/inventory/scan/${qrCode}`);
            resolvedId = scan.data?.id;
            if (!resolvedId) throw new Error('QR Code não encontrado');
        }
        const r = await apiCall(`/api/inventory/items/${resolvedId}`);
        render(r.data);
    } catch (err) {
        document.getElementById('content').innerHTML = `<p class="text-red-500">${escapeHtml(err.message)}</p>`;
    }
}

function infoRow(label, value, mono = false) {
    const empty = value === null || value === undefined || value === '';
    return `<div class="flex justify-between items-center gap-3 py-2 border-b border-gray-50 last:border-0">
        <span class="text-xs text-gray-500 flex-shrink-0">${label}</span>
        <span class="text-sm ${mono ? 'font-mono text-xs' : ''} ${empty ? 'text-gray-300' : 'text-gray-800'} text-right tabular-nums">${empty ? '—' : escapeHtml(String(value))}</span>
    </div>`;
}

function render(it) {
    const isPatrimonial = it.macro_category === 'patrimonial';
    const stockByLoc = it.stock || [];
    const totalStock = stockByLoc.reduce((acc, s) => acc + parseFloat(s.quantity || 0), 0);

    document.getElementById('content').innerHTML = `
        <!-- Header -->
        <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6 mb-4">
            <div class="flex flex-col md:flex-row gap-6 items-start">
                <div class="flex-shrink-0">
                    ${it.image_url
                        ? `<img src="${it.image_url}" class="w-40 h-40 object-cover rounded-xl border border-gray-200">`
                        : `<div class="w-40 h-40 bg-gradient-to-br from-gray-50 to-gray-100 rounded-xl border border-gray-200 flex items-center justify-center text-gray-300 text-4xl"><i class="fas fa-box"></i></div>`}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                        <span class="text-[11px] font-mono text-gray-400">${escapeHtml(it.internal_code)}</span>
                        <span class="inline-flex items-center gap-1.5 text-[11px] px-2 py-0.5 rounded-md ${isPatrimonial ? 'bg-purple-50 text-purple-700 border border-purple-100' : 'bg-sky-50 text-sky-700 border border-sky-100'} font-medium capitalize">
                            <i class="fas ${isPatrimonial ? 'fa-laptop-medical' : 'fa-prescription-bottle'} text-[9px]"></i>${it.macro_category}
                        </span>
                        ${it.is_active
                            ? '<span class="inline-flex items-center gap-1.5 text-[11px] text-sky-700"><span class="w-1.5 h-1.5 rounded-full bg-sky-500"></span>Ativo</span>'
                            : '<span class="inline-flex items-center gap-1.5 text-[11px] text-gray-400"><span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span>Inativo</span>'}
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-1.5 leading-tight">${escapeHtml(it.name)}</h2>
                    <p class="text-sm text-gray-600 leading-relaxed">${escapeHtml(it.description || '')}</p>

                    <div class="flex flex-wrap gap-2 mt-5">
                        <a href="item-form.html?id=${it.id}" class="px-3 py-1.5 bg-sky-50 hover:bg-sky-100 text-sky-700 border border-sky-100 rounded-lg text-xs font-medium transition flex items-center gap-1.5"><i class="fas fa-edit text-[10px]"></i> Editar</a>
                        <a href="kardex.html?item=${it.id}" class="px-3 py-1.5 bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-100 rounded-lg text-xs font-medium transition flex items-center gap-1.5"><i class="fas fa-clipboard-list text-[10px]"></i> Kardex</a>
                        <a href="item-label.html?id=${it.id}" class="px-3 py-1.5 bg-gray-50 hover:bg-gray-100 text-gray-700 border border-gray-200 rounded-lg text-xs font-medium transition flex items-center gap-1.5"><i class="fas fa-qrcode text-[10px]"></i> Etiqueta QR</a>
                        <a href="movements.html?item_id=${it.id}" class="px-3 py-1.5 bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-100 rounded-lg text-xs font-medium transition flex items-center gap-1.5"><i class="fas fa-history text-[10px]"></i> Histórico</a>
                        <a href="items.html" class="ml-auto px-3 py-1.5 text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-lg text-xs font-medium transition flex items-center gap-1.5"><i class="fas fa-arrow-left text-[10px]"></i> Voltar à lista</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Identificação -->
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6">
                <h3 class="font-bold text-gray-900 mb-3 text-sm flex items-center gap-2"><i class="fas fa-id-card text-gray-600"></i> Identificação</h3>
                ${infoRow('Subcategoria', it.subcategory?.name)}
                ${infoRow('Ref. fabricante', it.manufacturer_ref)}
                ${infoRow('Código de barras', it.barcode, true)}
                ${infoRow('QR Code (UUID)', it.qr_code, true)}
                ${isPatrimonial ? infoRow('Património', it.patrimony_number, true) : ''}
            </div>

            <!-- Unidades & Custo Médio -->
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6">
                <h3 class="font-bold text-gray-900 mb-3 text-sm flex items-center gap-2"><i class="fas fa-ruler text-gray-600"></i> Unidades e custo</h3>
                ${infoRow('UM compra', it.purchase_uom ? `${it.purchase_uom.name} (${it.purchase_uom.code})` : null)}
                ${infoRow('UM consumo', it.consumption_uom ? `${it.consumption_uom.name} (${it.consumption_uom.code})` : null)}
                ${infoRow('Fator de conversão', it.conversion_factor)}
                ${infoRow('Custo Médio', `€ ${parseFloat(it.cmp || 0).toFixed(4)}`)}
            </div>

            <!-- Parâmetros de stock -->
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6">
                <h3 class="font-bold text-gray-900 mb-3 text-sm flex items-center gap-2"><i class="fas fa-warehouse text-gray-600"></i> Stock & reposição</h3>
                ${infoRow('Stock mínimo', it.min_stock)}
                ${infoRow('Stock máximo', it.max_stock)}
                ${infoRow('Lead time (dias)', it.lead_time_days)}
                ${infoRow('Ponto de reposição', it.reorder_point)}
                ${infoRow('Consumo médio diário', parseFloat(it.avg_daily_consumption || 0).toFixed(4))}
                ${infoRow('Controla lote', it.controls_lot ? 'Sim' : 'Não')}
                ${infoRow('Usa nº de série', it.uses_serial ? 'Sim' : 'Não')}
            </div>

            ${isPatrimonial ? `
            <!-- Patrimoniais -->
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6 lg:col-span-1">
                <h3 class="font-bold text-gray-900 mb-3 text-sm flex items-center gap-2"><i class="fas fa-laptop-medical text-purple-600"></i> Dados patrimoniais</h3>
                ${infoRow('Data aquisição', it.acquisition_date)}
                ${infoRow('Valor de aquisição', it.acquisition_value ? `€ ${parseFloat(it.acquisition_value).toFixed(2)}` : null)}
                ${infoRow('Taxa depreciação anual', it.depreciation_rate ? `${it.depreciation_rate}%` : null)}
                ${infoRow('Estado patrimonial', it.asset_status)}
            </div>` : ''}

            ${!isPatrimonial && (it.location_params || []).length ? `
            <!-- Parâmetros por localização (apenas consumo) -->
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6 lg:col-span-3">
                <h3 class="font-bold text-gray-900 mb-3 text-sm flex items-center gap-2">
                    <i class="fas fa-sliders text-sky-600"></i> Parâmetros por localização
                    <span class="text-xs text-gray-500 font-normal">(${(it.location_params || []).filter(p => p.is_override).length} override${(it.location_params || []).filter(p => p.is_override).length === 1 ? '' : 's'} · ${(it.location_params || []).length} localizações)</span>
                </h3>
                <div class="overflow-x-auto -mx-6 -mb-6">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-y border-gray-200">
                        <tr>
                            <th class="text-left px-6 py-2.5 font-semibold">Localização</th>
                            <th class="text-right px-3 py-2.5 font-semibold">Min</th>
                            <th class="text-right px-3 py-2.5 font-semibold">Max</th>
                            <th class="text-right px-3 py-2.5 font-semibold">Lead time</th>
                            <th class="text-right px-3 py-2.5 font-semibold">Janela cons.</th>
                            <th class="text-center px-6 py-2.5 font-semibold">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        ${(it.location_params || []).map(p => `
                            <tr class="hover:bg-sky-50/30 transition">
                                <td class="px-6 py-2.5 text-gray-800"><span class="text-gray-400 text-xs">${escapeHtml(p.unit_name || '')} ·</span> ${escapeHtml(p.location_name)}</td>
                                <td class="px-3 py-2.5 text-right tabular-nums ${p.source_min_stock === 'location' ? 'font-bold text-sky-700' : 'text-gray-500'}">${parseFloat(p.min_stock).toFixed(2)}</td>
                                <td class="px-3 py-2.5 text-right tabular-nums ${p.source_max_stock === 'location' ? 'font-bold text-sky-700' : 'text-gray-500'}">${p.max_stock != null ? parseFloat(p.max_stock).toFixed(2) : '—'}</td>
                                <td class="px-3 py-2.5 text-right tabular-nums ${p.source_lead_time_days === 'location' ? 'font-bold text-sky-700' : 'text-gray-500'}">${p.lead_time_days}d</td>
                                <td class="px-3 py-2.5 text-right tabular-nums ${p.source_window_days === 'location' ? 'font-bold text-sky-700' : 'text-gray-500'}">${p.consumption_window_days}d</td>
                                <td class="px-6 py-2.5 text-center">
                                    ${p.is_override
                                        ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-sky-100 text-sky-700 text-[10px] font-medium">Override</span>'
                                        : '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 text-[10px]">Herda</span>'
                                    }
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table>
                </div>
            </div>
            ` : ''}

            <!-- Stock por localização -->
            <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6 ${isPatrimonial ? 'lg:col-span-2' : 'lg:col-span-3'}">
                <h3 class="font-bold text-gray-900 mb-3 text-sm flex items-center gap-2"><i class="fas fa-map-marker-alt text-sky-600"></i> Stock por localização <span class="text-xs text-gray-500 font-normal">(total: ${totalStock.toFixed(2)})</span></h3>
                ${stockByLoc.length ? `
                <div class="overflow-x-auto -mx-6 -mb-6">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-y border-gray-200">
                        <tr>
                            <th class="text-left px-6 py-2.5 font-semibold">Localização</th>
                            <th class="text-left px-3 py-2.5 font-semibold">Lote</th>
                            <th class="text-left px-3 py-2.5 font-semibold">Validade</th>
                            <th class="text-right px-6 py-2.5 font-semibold">Quantidade</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        ${stockByLoc.map(s => `
                            <tr class="hover:bg-sky-50/30 transition">
                                <td class="px-6 py-2.5 text-gray-800"><span class="text-gray-400 text-xs">${escapeHtml(s.location?.unit?.name || '')} ·</span> ${escapeHtml(s.location?.name || '')}</td>
                                <td class="px-3 py-2.5 font-mono text-xs text-gray-500">${s.lot?.lot_number ? escapeHtml(s.lot.lot_number) : '—'}</td>
                                <td class="px-3 py-2.5 text-xs ${s.lot?.expiry_date ? 'text-amber-600' : 'text-gray-400'}">${s.lot?.expiry_date || '—'}</td>
                                <td class="px-6 py-2.5 text-right font-bold tabular-nums">${parseFloat(s.quantity).toFixed(2)}</td>
                            </tr>`).join('')}
                    </tbody>
                </table>
                </div>` : `<div class="py-8 text-center">
                    <div class="inline-flex w-9 h-9 rounded-full bg-gray-100 items-center justify-center text-gray-400 mb-2">
                        <i class="fas fa-warehouse"></i>
                    </div>
                    <p class="text-sm text-gray-500">Sem stock registado.</p>
                </div>`}
            </div>
        </div>
    `;
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

loadItem();
</script>
</body>
</html>
