<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Subcategorias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) window.location.href = '/login.html';</script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({ activePage: 'categories', title: 'Subcategorias', subtitle: 'Agrupamento livre por macro (Consumo/Patrimonial)' });

document.getElementById('pageContent').innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        ${groupCard('consumo', 'Consumo', 'blue')}
        ${groupCard('patrimonial', 'Patrimonial', 'purple')}
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 id="modalTitle" class="font-bold text-gray-800">—</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="modalForm" class="p-6 space-y-4"></form>
        </div>
    </div>
`;

function groupCard(macro, label, color) {
    return `<section class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-800"><i class="fas fa-tags text-${color}-600"></i> ${label}</h3>
            <button onclick="openForm(null, '${macro}')" class="text-sm bg-${color}-600 text-white px-3 py-1.5 rounded-lg"><i class="fas fa-plus"></i> Nova</button>
        </div>
        <ul id="list-${macro}" class="divide-y divide-gray-100"></ul>
    </section>`;
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/categories?include_inactive=1');
        const byMacro = { consumo: [], patrimonial: [] };
        r.data.forEach(c => byMacro[c.parent_macro]?.push(c));
        for (const m of ['consumo','patrimonial']) {
            document.getElementById('list-'+m).innerHTML = byMacro[m].map(c => `
                <li class="flex justify-between items-center py-2 px-2 hover:bg-gray-50 rounded">
                    <div>
                        <p class="text-sm ${c.is_active ? 'text-gray-800' : 'text-gray-400 line-through'}">${escapeHtml(c.name)}</p>
                    </div>
                    <button onclick='openForm(${JSON.stringify(c)}, "${m}")' class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
                </li>`).join('') || '<li class="text-sm text-gray-400 p-3">Nenhuma.</li>';
        }
    } catch (err) { toast(err.message, 'error'); }
}

function openForm(cat, macro) {
    document.getElementById('modalTitle').textContent = cat ? 'Editar Subcategoria' : `Nova Subcategoria (${macro})`;
    document.getElementById('modalForm').innerHTML = `
        <div><label class="text-xs text-gray-500">Nome *</label><input name="name" required value="${cat?.name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_active" ${(!cat || cat.is_active) ? 'checked' : ''}> Ativa</label>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg">Salvar</button>`;
    document.getElementById('modalForm').onsubmit = async e => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        const payload = { ...fd, parent_macro: macro, is_active: !!fd.is_active };
        try {
            if (cat) await apiCall(`/api/inventory/categories/${cat.id}`, { method:'PUT', body: JSON.stringify(payload) });
            else     await apiCall('/api/inventory/categories', { method:'POST', body: JSON.stringify(payload) });
            closeModal(); toast('Subcategoria salva'); load();
        } catch (err) { toast(err.message, 'error'); }
    };
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

load();
</script>
</body>
</html>
