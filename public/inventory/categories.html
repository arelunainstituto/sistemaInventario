<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Categorias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script>
renderInventoryLayout({
    activePage: 'categories',
    title: 'Categorias',
    subtitle: 'Hierarquia por tipo de cadastro (Consumo até 2 níveis, Patrimonial multinível)'
});

// Profundidade máxima por macro — espelha a validação do API
const MAX_DEPTH = { consumo: 2, patrimonial: 10 };

document.getElementById('pageContent').innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        ${groupCard('consumo', 'Consumo', 'sky')}
        ${groupCard('patrimonial', 'Patrimonial', 'purple')}
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-md w-full mx-4">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 id="modalTitle" class="font-bold text-gray-800">—</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="modalForm" class="p-6 space-y-4"></form>
        </div>
    </div>
`;

function groupCard(macro, label, color) {
    return `<section class="bg-white rounded-xl border border-gray-200/70 shadow-sm p-6">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h3 class="font-bold text-gray-800 flex items-center gap-2"><i class="fas fa-tags text-${color}-600"></i> ${label}</h3>
                <p class="text-[11px] text-gray-500">Máx ${MAX_DEPTH[macro]} ${MAX_DEPTH[macro] === 1 ? 'nível' : 'níveis'}</p>
            </div>
            <button onclick="openForm(null, '${macro}', null)" class="text-sm bg-${color}-600 hover:bg-${color}-700 text-white px-3 py-1.5 rounded-lg"><i class="fas fa-plus"></i> Nova categoria</button>
        </div>
        <ul id="list-${macro}" class="space-y-0.5"></ul>
    </section>`;
}

let treeCache = { consumo: [], patrimonial: [] };

async function load() {
    try {
        const [r1, r2] = await Promise.all([
            apiCall('/api/inventory/categories/tree?parent_macro=consumo&include_inactive=1'),
            apiCall('/api/inventory/categories/tree?parent_macro=patrimonial&include_inactive=1')
        ]);
        treeCache.consumo     = r1.data || [];
        treeCache.patrimonial = r2.data || [];
        for (const m of ['consumo','patrimonial']) {
            const html = renderTree(treeCache[m], m, 0);
            document.getElementById('list-'+m).innerHTML = html || '<li class="text-sm text-gray-400 p-3 italic">Nenhuma categoria.</li>';
        }
    } catch (err) { toast(err.message, 'error'); }
}

function renderTree(nodes, macro, depth) {
    if (!nodes || !nodes.length) return '';
    return nodes.map(n => {
        const canAddChild = (depth + 1) < MAX_DEPTH[macro];
        const win = n.consumption_window_days || 30;
        const winLabel = macro === 'consumo' && depth === 0
            ? `<span class="text-[10px] ${win !== 30 ? 'text-orange-600 font-medium' : 'text-gray-400'}">· janela ${win}d</span>`
            : '';
        const itemsBadge = n.items_count > 0
            ? `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] bg-gray-100 text-gray-600">${n.items_count} ${n.items_count === 1 ? 'item' : 'itens'}</span>`
            : '';
        return `
        <li>
            <div class="flex justify-between items-center py-1.5 px-2 hover:bg-gray-50 rounded group" style="padding-left:${8 + depth * 22}px">
                <div class="flex-1 flex items-center gap-2 min-w-0">
                    ${depth > 0 ? '<i class="fas fa-angle-right text-gray-300 text-[10px]"></i>' : ''}
                    <span class="text-sm ${n.is_active ? 'text-gray-800' : 'text-gray-400 line-through'} truncate">${escapeHtml(n.name)}</span>
                    ${winLabel}
                    ${itemsBadge}
                </div>
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition">
                    ${canAddChild ? `<button onclick='openForm(null, "${macro}", ${JSON.stringify(n.id)})' class="text-xs text-sky-600 hover:text-sky-700 px-2 py-1" title="Adicionar subcategoria"><i class="fas fa-plus"></i></button>` : ''}
                    <button onclick='openForm(${JSON.stringify(n)}, "${macro}", ${JSON.stringify(n.parent_id)})' class="text-xs text-gray-500 hover:text-gray-700 px-2 py-1" title="Editar"><i class="fas fa-edit"></i></button>
                    <button onclick='removeCategory(${JSON.stringify(n.id)}, ${JSON.stringify(n.name)})' class="text-xs text-red-500 hover:text-red-700 px-2 py-1" title="Remover"><i class="fas fa-trash"></i></button>
                </div>
            </div>
            ${n.children && n.children.length ? `<ul>${renderTree(n.children, macro, depth + 1)}</ul>` : ''}
        </li>`;
    }).join('');
}

function openForm(cat, macro, parent_id) {
    document.getElementById('modalTitle').textContent = cat
        ? `Editar — ${cat.name}`
        : (parent_id ? 'Nova subcategoria' : `Nova categoria (${macro})`);
    const win = cat?.consumption_window_days || 30;
    const isRootLevel = !parent_id;
    document.getElementById('modalForm').innerHTML = `
        <div>
            <label class="text-xs text-gray-500">Nome *</label>
            <input name="name" required value="${escapeAttr(cat?.name || '')}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        </div>
        ${macro === 'consumo' && isRootLevel ? `
        <div>
            <label class="text-xs text-gray-500">Janela de consumo médio (dias)</label>
            <select name="consumption_window_days" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                <option value="30"  ${win === 30  ? 'selected' : ''}>30 dias (padrão)</option>
                <option value="60"  ${win === 60  ? 'selected' : ''}>60 dias</option>
                <option value="90"  ${win === 90  ? 'selected' : ''}>90 dias (sazonal)</option>
                <option value="180" ${win === 180 ? 'selected' : ''}>180 dias</option>
                <option value="365" ${win === 365 ? 'selected' : ''}>365 dias</option>
            </select>
            <p class="text-[10px] text-gray-500 mt-1">Usado em ponto de reposição, cobertura e relatórios.</p>
        </div>` : ''}
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_active" ${(!cat || cat.is_active) ? 'checked' : ''}> Ativa</label>
        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-700 text-white py-2.5 rounded-lg text-sm font-medium shadow-sm shadow-sky-500/20 transition">Salvar</button>
    `;
    document.getElementById('modalForm').onsubmit = async e => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        const payload = {
            ...fd,
            parent_macro: macro,
            parent_id:    cat ? cat.parent_id : (parent_id || null),
            is_active:    !!fd.is_active
        };
        if (fd.consumption_window_days) payload.consumption_window_days = parseInt(fd.consumption_window_days);
        try {
            if (cat) await apiCall(`/api/inventory/categories/${cat.id}`, { method: 'PUT', body: JSON.stringify(payload) });
            else     await apiCall('/api/inventory/categories',           { method: 'POST', body: JSON.stringify(payload) });
            closeModal();
            toast('Categoria salva');
            load();
        } catch (err) { toast(err.message, 'error'); }
    };
    document.getElementById('modal').classList.remove('hidden');
}

async function removeCategory(id, name) {
    if (!confirm(`Remover a categoria "${name}"?`)) return;
    try {
        await apiCall(`/api/inventory/categories/${id}`, { method: 'DELETE' });
        toast('Categoria removida');
        load();
    } catch (err) { toast(err.message, 'error'); }
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return String(s ?? '').replace(/"/g, '&quot;'); }

load();
</script>
</body>
</html>
