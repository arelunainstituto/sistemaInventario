<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário · Entradas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>if (!localStorage.getItem('access_token')) { const r = encodeURIComponent(location.pathname + location.search); window.location.href = '/login.html?redirect=' + r; }</script>
</head>
<body class="bg-white">
<div id="layoutRoot"></div>
<script src="_layout.js"></script>
<script src="_searchable-select.js"></script>
<script>
renderInventoryLayout({ activePage: 'entries', title: 'Entradas', subtitle: 'Recepção de materiais com documento fiscal' });

document.getElementById('pageContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-base font-bold text-gray-900">Registos de entradas</h3>
        <button onclick="openNewEntryForm()" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus"></i> Nova entrada</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200/70 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                <tr><th class="text-left p-3">Data</th><th class="text-left p-3">Documento</th><th class="text-left p-3">Fornecedor</th><th class="text-right p-3">Linhas</th><th class="text-right p-3">Valor total</th><th class="text-center p-3">Ações</th></tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-gray-50"></tbody>
        </table>
    </div>

    <div id="entryModal" class="hidden fixed inset-0 bg-gray-900/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 id="entryModalTitle" class="font-bold text-gray-800">Nova Entrada</h3>
                <button onclick="closeEntryModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="entryForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <div><label class="text-xs text-gray-500">Tipo de documento *</label>
                        <select name="document_type" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="fatura">Fatura</option><option value="guia_remessa">Guia de remessa</option>
                            <option value="nota_encomenda">Nota de encomenda</option><option value="outro">Outro</option>
                        </select>
                    </div>
                    <div><label class="text-xs text-gray-500">Nº documento *</label><input name="document_number" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                    <div><label class="text-xs text-gray-500">Data do documento *</label><input name="document_date" type="date" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                    <div><label class="text-xs text-gray-500">Fornecedor *</label>
                        <select name="supplier_id" id="supplierSelect" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></select>
                    </div>
                    <div class="md:col-span-4"><label class="text-xs text-gray-500">Notas</label><textarea name="notes" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea></div>
                </div>

                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="font-bold text-gray-800">Linhas</h4>
                        <button type="button" onclick="addLine()" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg"><i class="fas fa-plus"></i> Adicionar linha</button>
                    </div>
                    <div id="lines" class="space-y-2"></div>
                    <div class="text-right text-sm mt-3 font-bold">Total: € <span id="grandTotal">0.00</span></div>
                </div>

                <div class="flex gap-3 justify-end border-t pt-4">
                    <button type="button" onclick="closeEntryModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-5 py-2 bg-sky-600 hover:bg-sky-700 text-white rounded-lg text-sm font-medium shadow-sm shadow-sky-500/20 transition flex items-center gap-2"><i class="fas fa-save"></i> Registar entrada</button>
                </div>
            </form>
        </div>
    </div>
`;

let items = [], locations = [], suppliers = [];

async function bootstrap() {
    try {
        const [it, lo, su] = await Promise.all([
            apiCall('/api/inventory/items?limit=1000'),
            apiCall('/api/inventory/locations'),
            apiCall('/api/inventory/suppliers')
        ]);
        items = it.data || []; locations = lo.data || []; suppliers = su.data || [];
        if (!items.length)     toast('Nenhum item cadastrado — crie um em Itens', 'warn');
        if (!suppliers.length) toast('Nenhum fornecedor cadastrado', 'warn');
        if (!locations.length) toast('Nenhuma localização cadastrada — crie sublocais em Localizações', 'warn');
    } catch (err) {
        toast('Falha ao carregar dados: ' + err.message, 'error');
        console.error('Bootstrap error:', err);
    }
}

async function load() {
    try {
        const r = await apiCall('/api/inventory/entries?limit=50');
        document.getElementById('tbody').innerHTML = r.data.map(e => `
            <tr class="hover:bg-sky-50/30 transition">
                <td class="p-3">${e.document_date}</td>
                <td class="p-3 font-mono text-xs" title="${escapeHtml(e.document_type)}">${escapeHtml(e.document_number)}</td>
                <td class="p-3 font-medium">${escapeHtml(e.supplier?.name || '—')}</td>
                <td class="p-3 text-right">${e.lines?.length || 0}</td>
                <td class="p-3 text-right">€ ${parseFloat(e.total_value || 0).toFixed(2)}</td>
                <td class="p-3 text-center">
                    <button onclick='viewEntry(${JSON.stringify(e).replace(/'/g, "&#39;")})' class="text-gray-600 hover:text-blue-600" title="Visualizar"><i class="fas fa-eye"></i></button>
                </td>
            </tr>`).join('') || '<tr><td colspan="6" class="p-6 text-center text-gray-400">Nenhuma entrada.</td></tr>';
    } catch (err) { toast(err.message, 'error'); }
}

function openNewEntryForm() {
    document.getElementById('supplierSelect').innerHTML = '<option value="">—</option>' +
        suppliers.map(s => `<option value="${s.id}">${escapeHtml(s.name)}${s.tax_id ? ' · ' + escapeHtml(s.tax_id) : ''}</option>`).join('');
    document.getElementById('lines').innerHTML = '';
    addLine();
    document.getElementById('entryForm').reset();
    document.getElementById('entryModal').classList.remove('hidden');
    // Combobox no fornecedor (depois do innerHTML)
    makeSearchable('supplierSelect', { placeholder: 'Buscar fornecedor por nome ou NIF…' });
}

function closeEntryModal() { document.getElementById('entryModal').classList.add('hidden'); }

let lineCounter = 0;
function addLine() {
    const idx = lineCounter++;
    const div = document.createElement('div');
    div.className = 'grid grid-cols-12 gap-2 items-end p-2 border border-gray-100 rounded-lg';
    div.dataset.line = idx;
    div.innerHTML = `
        <div class="col-span-3"><label class="text-xs text-gray-500">Item</label>
            <select required onchange="onItemChange(this, ${idx})" class="line-item w-full px-2 py-1.5 border border-gray-300 rounded text-xs" id="lineItem-${idx}">
                <option value="">—</option>
                ${items.map(i => `<option value="${i.id}" data-controls-lot="${i.controls_lot}" data-conversion="${i.conversion_factor ?? 1}" data-purchase-uom="${escapeHtml(i.purchase_uom?.code || i.base_uom?.code || '')}" data-consumption-uom="${escapeHtml(i.consumption_uom?.code || i.base_uom?.code || '')}">${escapeHtml(i.internal_code)} · ${escapeHtml(i.name)}${i.subcategory?.name ? ' · ' + escapeHtml(i.subcategory.name) : ''}</option>`).join('')}
            </select>
        </div>
        <div class="col-span-2"><label class="text-xs text-gray-500">Localização</label>
            <select required class="line-location w-full px-2 py-1.5 border border-gray-300 rounded text-xs" id="lineLocation-${idx}">
                <option value="">—</option>
                ${locations.map(l => `<option value="${l.id}">${escapeHtml(l.unit?.name)} · ${escapeHtml(l.name)}</option>`).join('')}
            </select>
        </div>
        <div class="col-span-2">
            <label class="text-xs text-gray-500 flex items-center gap-1">Qtd <span class="line-uom-hint text-[10px] text-gray-400"></span></label>
            <input type="number" step="0.0001" required class="line-qty w-full px-2 py-1.5 border border-gray-300 rounded text-xs" oninput="recalcTotal()">
        </div>
        <!-- Fator de conversão fica oculto. A entrada opera direto na unidade de consumo
             (ex.: nota fiscal traz 100 ampolas, não 1 caixa). Campo preservado no schema
             para fluxos futuros — backend recebe conversion_factor=1. -->
        <input type="hidden" class="line-factor" value="1">
        <div class="col-span-1"><label class="text-xs text-gray-500">€ unit</label><input type="number" step="0.0001" required class="line-cost w-full px-2 py-1.5 border border-gray-300 rounded text-xs" oninput="recalcTotal()"></div>
        <div class="col-span-2 line-lot-area hidden"><label class="text-xs text-gray-500">Lote</label><input type="text" class="line-lot w-full px-2 py-1.5 border border-gray-300 rounded text-xs"></div>
        <div class="col-span-1 line-expiry-area hidden"><label class="text-xs text-gray-500">Validade</label><input type="date" class="line-expiry w-full px-2 py-1.5 border border-gray-300 rounded text-xs"></div>
        <div class="col-span-1 flex items-center"><button type="button" onclick="this.closest('[data-line]').remove(); recalcTotal();" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></div>`;
    document.getElementById('lines').appendChild(div);
    // Combobox nas seleções da linha
    makeSearchable(`lineItem-${idx}`,     { placeholder: 'Buscar item por nome, SKU ou categoria…' });
    makeSearchable(`lineLocation-${idx}`, { placeholder: 'Buscar localização…' });
}

function onItemChange(sel, idx) {
    const line = sel.closest('[data-line]');
    const opt = sel.selectedOptions[0];
    const controlsLot = opt?.dataset.controlsLot === 'true';
    line.querySelector('.line-lot-area').classList.toggle('hidden', !controlsLot);
    line.querySelector('.line-expiry-area').classList.toggle('hidden', !controlsLot);
    line.querySelectorAll('.line-lot, .line-expiry').forEach(el => el.required = controlsLot);

    // Fator continua no schema do item (data-conversion) mas a UI da entrada
    // não pede mais conversão — opera direto em unidade de consumo. Mantemos
    // line-factor = 1 para o backend (purchase_qty = consumption_qty).
    line.querySelector('.line-factor').value = 1;
    const consumeUom = opt?.dataset.consumptionUom || opt?.dataset.purchaseUom || '';
    const hint = line.querySelector('.line-uom-hint');
    if (hint) hint.textContent = consumeUom ? `(em ${consumeUom})` : '';
    recalcTotal();
}

function recalcTotal() {
    let total = 0;
    document.querySelectorAll('[data-line]').forEach(line => {
        const qty = parseFloat(line.querySelector('.line-qty').value) || 0;
        const cost = parseFloat(line.querySelector('.line-cost').value) || 0;
        total += qty * cost;
    });
    document.getElementById('grandTotal').textContent = total.toFixed(2);
}

document.getElementById('entryForm').addEventListener('submit', async e => {
    e.preventDefault();
    const f = e.target;
    const lines = [];
    for (const lineDiv of document.querySelectorAll('[data-line]')) {
        const item_id = lineDiv.querySelector('.line-item').value;
        if (!item_id) continue;
        lines.push({
            item_id,
            location_id: lineDiv.querySelector('.line-location').value,
            purchase_qty: parseFloat(lineDiv.querySelector('.line-qty').value),
            conversion_factor: parseFloat(lineDiv.querySelector('.line-factor').value) || 1,
            unit_cost: parseFloat(lineDiv.querySelector('.line-cost').value),
            lot_number: lineDiv.querySelector('.line-lot')?.value || null,
            expiry_date: lineDiv.querySelector('.line-expiry')?.value || null
        });
    }
    if (lines.length === 0) return toast('Adicione pelo menos uma linha', 'error');

    const payload = {
        document_type: f.document_type.value,
        document_number: f.document_number.value,
        document_date: f.document_date.value,
        supplier_id: f.supplier_id.value,
        notes: f.notes.value || null,
        lines
    };
    try {
        await apiCall('/api/inventory/entries', { method: 'POST', body: JSON.stringify(payload) });
        toast('Entrada registada com sucesso');
        closeEntryModal();
        load();
    } catch (err) { toast(err.message, 'error'); }
});

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function viewEntry(e) {
    const lines = e.lines || [];
    const sections = [
        { title: 'Documento', rows: [
            ['Tipo', e.document_type],
            ['Número', e.document_number, { mono: true }],
            ['Data', e.document_date],
            ['Fornecedor', e.supplier?.name],
            ['NIF/Tax ID', e.supplier?.tax_id, { mono: true }],
            ['Valor total', `€ ${parseFloat(e.total_value || 0).toFixed(2)}`, { bold: true }],
            ['Notas', e.notes]
        ]}
    ];
    // Uma secção por linha — mais legível que repetir "Linha N —" como prefixo
    lines.forEach((l, idx) => {
        sections.push({
            title: lines.length > 1 ? `Linha ${idx + 1}` : 'Linha',
            rows: [
                ['Item',               `${l.item?.internal_code || ''} · ${l.item?.name || ''}`],
                ['Localização',        l.location?.name],
                ['Quantidade',         l.consumption_qty ?? l.purchase_qty],
                ...(parseFloat(l.conversion_factor) !== 1 ? [['Fator conversão', l.conversion_factor]] : []),
                ['Custo unitário',     `€ ${parseFloat(l.unit_cost || 0).toFixed(4)}`],
                ['Custo total',        `€ ${parseFloat(l.total_cost || 0).toFixed(2)}`, { bold: true }],
                ['Lote',               l.lot_number, { mono: true }],
                ['Validade',           l.expiry_date]
            ]
        });
    });
    showViewModal({
        title: `Entrada · ${e.document_number}`,
        sections,
        actions: [
            { label: 'Imprimir comprovante', icon: 'fa-print', href: `print-receipt.html?type=entry&id=${e.id}` }
        ]
    });
}

(async () => { await bootstrap(); await load(); })();
</script>
</body>
</html>
